<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<meta name="apple-mobile-web-app-title" content="Daily News">
<meta name="theme-color" content="#111318">
<meta http-equiv="Cache-Control" content="no-cache">
<title>Daily News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=Syne:wght@400;500;600;700&family=IBM+Plex+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
:root{
  --bg:#111318;--card:rgba(255,255,255,.06);--bdr:rgba(255,255,255,.1);--bdr2:rgba(255,255,255,.18);
  --t0:#F2F2F5;--t1:rgba(242,242,245,.8);--t2:rgba(242,242,245,.5);--t3:rgba(242,242,245,.28);
  --blue:#6BA8FF;--green:#4ADE80;--violet:#C4B5FD;--red:#F87171;--gold:#F5A623;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Syne',system-ui,sans-serif;
  --mono:'IBM Plex Mono',monospace;
}
body{background:var(--bg);color:var(--t0);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 700px 500px at 10% 5%,rgba(107,168,255,.1),transparent 60%),radial-gradient(ellipse 500px 400px at 90% 50%,rgba(196,181,253,.07),transparent 60%)}
body>*:not(#splash):not(#onboarding){position:relative;z-index:1}
#onboarding,#splash{z-index:9998}
#splash{z-index:9999}
button{cursor:pointer;font-family:var(--sans);border:none;background:none;color:inherit}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:0;transition:opacity .7s ease}
#splash.out{opacity:0;pointer-events:none}
.sp-wrap{display:flex;flex-direction:column;align-items:center;gap:16px}
.sp-dn{font-family:var(--serif);font-size:88px;font-weight:300;color:#fff;letter-spacing:-5px;line-height:1;opacity:0;transform:translateY(12px);transition:opacity .6s ease,transform .6s ease}
.sp-dn.on{opacity:1;transform:none}
.sp-line{width:0;height:1px;background:linear-gradient(90deg,transparent,rgba(255,255,255,.3),transparent);transition:width .7s ease .5s}
.sp-line.on{width:80px}
.sp-label{opacity:0;transition:opacity .5s ease .9s;text-align:center}
.sp-label.on{opacity:1}
.sp-daily{font-family:var(--mono);font-size:10px;letter-spacing:4px;color:var(--t2);text-transform:uppercase}
.sp-byline{font-family:var(--serif);font-size:13px;font-style:italic;color:var(--t3);margin-top:4px;letter-spacing:.5px}
.sp-walker{margin-top:24px;opacity:0;transition:opacity .4s ease 1.2s;display:flex;gap:6px;align-items:center}
.sp-walker.on{opacity:1}
.sp-dot2{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.2);animation:spdot 1.2s ease infinite}
.sp-dot2:nth-child(1){animation-delay:0s}
.sp-dot2:nth-child(2){animation-delay:.2s}
.sp-dot2:nth-child(3){animation-delay:.4s}
@keyframes spdot{0%,100%{opacity:.15;transform:scale(.7)}50%{opacity:.7;transform:scale(1)}}

/* ── ONBOARDING ── */
#onboarding{position:fixed;inset:0;z-index:9998;background:var(--bg);display:none;flex-direction:column;align-items:center;justify-content:center;padding:32px;text-align:center;transition:opacity .5s ease;box-sizing:border-box}
#onboarding.show{display:flex}
#onboarding.out{opacity:0;pointer-events:none}
.ob-logo{font-family:var(--serif);font-size:64px;font-weight:300;color:#fff;letter-spacing:-4px;line-height:1;margin-bottom:6px}
.ob-sub{font-family:var(--serif);font-size:13px;font-style:italic;color:var(--t3);margin-bottom:36px;letter-spacing:.5px}
.ob-h{font-family:var(--serif);font-size:30px;font-weight:400;color:var(--t0);line-height:1.25;margin-bottom:10px}
.ob-p{font-size:15px;color:var(--t2);line-height:1.7;margin-bottom:36px;max-width:300px}
.ob-lbl{font-family:var(--mono);font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3);margin-bottom:9px;display:block;text-align:left;max-width:280px}
.ob-inp{width:100%;max-width:280px;padding:14px 18px;background:rgba(255,255,255,.07);border:1.5px solid var(--bdr);border-radius:12px;font-family:var(--serif);font-size:20px;color:#fff;outline:none;text-align:center;transition:border-color .2s;-webkit-appearance:none;margin-bottom:14px}
.ob-inp:focus{border-color:var(--blue)}
.ob-inp::placeholder{color:var(--t3);font-style:italic}
.ob-btn{width:100%;max-width:280px;padding:15px;background:#fff;color:#111318;border-radius:12px;font-size:15px;font-weight:700;letter-spacing:.3px;transition:opacity .15s;font-family:var(--sans);border:none;cursor:pointer}
.ob-btn:active{opacity:.8}


.gen-dots{display:flex;gap:6px;margin-top:4px}
.gen-dot{width:5px;height:5px;border-radius:50%;background:rgba(255,255,255,.15);animation:gdot 1.4s ease infinite}
.gen-dot:nth-child(2){animation-delay:.2s}
.gen-dot:nth-child(3){animation-delay:.4s}
@keyframes gdot{0%,100%{opacity:.15;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:200;background:rgba(17,19,24,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--bdr)}
.hdr-in{max-width:720px;margin:0 auto;padding:0 18px;height:54px;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-family:var(--serif);font-size:19px;font-weight:400;color:#fff;letter-spacing:-.2px}
.hdr-logo em{font-style:italic;font-size:12px;opacity:.4;margin-left:5px;letter-spacing:.5px}
.hdr-meta{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:.5px;text-transform:capitalize}
.hdr-btn{width:36px;height:36px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;border-radius:9px;transition:background .15s}
.hdr-btn:hover{background:rgba(255,255,255,.07)}
.hdr-btn span{display:block;width:16px;height:1px;background:var(--t1);border-radius:1px}

/* ── SIDE MENU ── */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;opacity:0;pointer-events:none;transition:opacity .22s}
.ovl.on{opacity:1;pointer-events:all}
.side{position:fixed;top:0;left:0;bottom:0;width:270px;background:rgba(15,17,22,.97);backdrop-filter:blur(32px);z-index:400;border-right:1px solid var(--bdr);transform:translateX(-100%);transition:transform .3s cubic-bezier(.4,0,.2,1);display:flex;flex-direction:column}
.side.on{transform:translateX(0)}
.side-h{padding:20px 16px 14px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
.side-logo{font-family:var(--serif);font-size:17px;font-weight:400;color:#fff}
.side-x{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--t2)}
.side-b{flex:1;overflow-y:auto;padding:10px}
.side-lbl{font-family:var(--mono);font-size:8.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3);padding:10px 8px 6px}
.sday{display:block;width:100%;text-align:left;padding:9px 10px;border-radius:9px;margin-bottom:2px;color:var(--t2);transition:all .12s;cursor:pointer}
.sday:hover,.sday:active{background:rgba(255,255,255,.07);color:var(--t0)}
.sday.act{background:rgba(107,168,255,.18);color:#fff;border:1px solid rgba(107,168,255,.25)}
.sday-n{font-size:13px;font-weight:500}
.sday-d{font-family:var(--mono);font-size:10px;opacity:.4;margin-top:1px}
.side-f{padding:12px 14px;border-top:1px solid var(--bdr)}
.btn-ref{background:rgba(255,255,255,.08);color:var(--t1);padding:10px;border-radius:9px;font-size:12px;font-weight:500;width:100%;text-align:center;display:block;cursor:pointer;border:none;font-family:var(--sans)}

/* ── MAIN ── */
#listView{max-width:720px;margin:0 auto;padding:16px 16px 80px}

/* Date */
.acc{padding:22px 0 20px;border-bottom:1px solid rgba(255,255,255,.12);margin-bottom:18px;text-align:center}
.acc-salut{font-family:var(--sans);font-size:14px;color:var(--t2);margin-bottom:12px;letter-spacing:.2px}
.acc-t{font-family:var(--serif);font-size:30px;font-style:italic;font-weight:400;color:#fff;line-height:1.2;letter-spacing:-.3px;margin-bottom:12px}
.acc-eph{font-family:var(--serif);font-size:13px;font-style:italic;color:var(--t3);line-height:1.5;max-width:480px;margin:0 auto}

/* Ephemeride */


/* Chiffre */
.stat{border-radius:16px;border:1px solid rgba(255,255,255,.1);margin-bottom:20px;overflow:hidden;display:grid;grid-template-columns:auto 1fr;background:rgba(255,255,255,.04);backdrop-filter:blur(20px)}
.stat-l{padding:22px 24px;display:flex;flex-direction:column;justify-content:center;border-right:1px solid rgba(255,255,255,.07)}
.stat-nb{font-family:var(--serif);font-size:56px;font-weight:600;color:#fff;line-height:1;letter-spacing:-2px}
.stat-r{padding:18px 20px;display:flex;flex-direction:column;justify-content:center;gap:5px}
.stat-lbl{font-family:var(--mono);font-size:8px;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3)}
.stat-txt{font-size:14.5px;line-height:1.68;color:var(--t1)}
.stat-src{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:3px}

/* Cards */
.card{background:var(--card);backdrop-filter:blur(20px);border-radius:16px;border:1px solid var(--bdr);margin-bottom:10px;overflow:hidden;position:relative;transition:border-color .2s}
.card:hover{border-color:var(--bdr2)}
.cbar{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:16px 0 0 16px}
.chead{display:flex;align-items:flex-start;gap:13px;padding:16px 18px;cursor:pointer;user-select:none;-webkit-user-select:none;transition:background .15s}
.chead:active{background:rgba(255,255,255,.04)}
.cico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;margin-top:1px}
.cr{flex:1;min-width:0}
.cpill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px 2px 7px;border-radius:100px;font-family:var(--mono);font-size:7.5px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:8px;color:#fff;font-weight:400}
.cpdot{width:3.5px;height:3.5px;border-radius:50%;background:rgba(255,255,255,.45)}
.ctitle{font-family:var(--serif);font-size:21px;font-weight:600;line-height:1.25;color:#fff;margin-bottom:6px;letter-spacing:-.15px}
.cteaser{font-size:14px;color:var(--t2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.cfoot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.csrc{font-family:var(--mono);font-size:9.5px;color:var(--t3);letter-spacing:.2px}
.cchev svg{transition:transform .3s ease;color:var(--t3)}
.card.open .cchev svg{transform:rotate(180deg)}

/* Unroll */
.cbody{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(0,.4,.2,1)}
.card.open .cbody{max-height:700px}
.cbin{padding:16px 18px 20px;border-top:1px solid var(--bdr)}
.ctxt{font-size:15.5px;line-height:1.85;color:var(--t1)}
.ctxt p{margin-bottom:9px}.ctxt p:last-child{margin-bottom:0}
.cact{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px solid var(--bdr)}
.btn-c{display:flex;align-items:center;gap:7px;padding:9px 20px;border-radius:100px;background:var(--blue);color:#111318;font-size:12px;font-weight:700;letter-spacing:.2px;transition:filter .15s;box-shadow:0 4px 14px rgba(107,168,255,.25)}
.btn-c:active{filter:brightness(.9)}

/* Savais-tu */
.bonus{margin-top:26px;background:rgba(196,181,253,.07);backdrop-filter:blur(20px);border-radius:16px;border:1px solid rgba(196,181,253,.16);padding:22px 24px;position:relative;overflow:hidden}
.bonus::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--violet),transparent)}
.bonus-e{font-family:var(--mono);font-size:8.5px;letter-spacing:2.5px;text-transform:uppercase;color:var(--violet);margin-bottom:9px;display:flex;align-items:center;gap:8px}
.bonus-e::before{content:'';width:14px;height:1px;background:var(--violet);flex-shrink:0}
.bonus-t{font-family:var(--serif);font-size:17px;font-style:italic;color:var(--t1);line-height:1.68}

/* Footer */
.foot{display:flex;align-items:center;justify-content:space-between;padding:18px 0;border-top:1px solid var(--bdr);margin-top:8px}
.foot-b{font-family:var(--serif);font-size:13px;color:var(--t2)}
.foot-m{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.3px}

/* Error */
.errc{background:var(--card);backdrop-filter:blur(20px);border-radius:14px;border:1px solid var(--bdr);padding:26px;text-align:center;margin:20px 0}
.errc p{font-size:14px;color:var(--t2);line-height:1.65;margin-bottom:16px;white-space:pre-wrap;word-break:break-word}
.btn-retry{background:#fff;color:#111318;padding:10px 22px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);border:none}

/* Detail */
#detailView{position:fixed;inset:0;z-index:500;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateX(100%);transition:transform .36s cubic-bezier(.4,0,.2,1)}
#detailView.open{transform:translateX(0)}
.dhdr{position:sticky;top:0;background:rgba(17,19,24,.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 18px;height:54px}
.btn-bk{display:flex;align-items:center;gap:6px;font-size:13px;font-weight:500;color:var(--blue);padding:5px 0}
.btn-bk svg{width:16px;height:16px}
.dbody{max-width:720px;margin:0 auto;padding:28px 18px 90px}
.dcat{display:inline-flex;align-items:center;gap:5px;padding:3px 10px 3px 8px;border-radius:100px;font-family:var(--mono);font-size:8px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:14px;color:#fff}
.dtitle{font-family:var(--serif);font-size:34px;font-weight:400;line-height:1.18;color:#fff;letter-spacing:-.4px;margin-bottom:14px}
.dmeta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding-bottom:20px;border-bottom:1px solid var(--bdr);margin-bottom:24px}
.dsrc{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.5px;text-transform:uppercase}
.dlink{font-family:var(--mono);font-size:9.5px;color:var(--blue);letter-spacing:.3px}
.dann{border-top:1px solid var(--bdr);padding-top:22px}
.asec{margin-bottom:22px}
.ashdr{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.ase{font-size:15px}
.asl{font-family:var(--mono);font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:var(--t2)}
.asr{flex:1;height:1px;background:var(--bdr)}
.ast{font-size:15.5px;line-height:1.82;color:var(--t1)}

/* Chat FAB */
.fab{position:fixed;bottom:26px;right:20px;z-index:600;width:52px;height:52px;border-radius:50%;background:var(--blue);display:none!important;align-items:center;justify-content:center;box-shadow:0 4px 20px rgba(107,168,255,.4);transition:transform .2s}
.fab.vis{display:flex!important}
.fab:active{transform:scale(.92)}
.fab-s{font-family:var(--serif);font-size:18px;font-weight:600;color:#111318;line-height:1}

/* Chat Modal */
.covl{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:700;opacity:0;pointer-events:none;transition:opacity .25s}
.covl.on{opacity:1;pointer-events:all}
.cpanel{position:fixed;left:0;right:0;bottom:0;z-index:800;background:rgba(15,17,22,.97);backdrop-filter:blur(32px);border-radius:20px 20px 0 0;border-top:1px solid var(--bdr);max-height:78vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .32s cubic-bezier(.4,0,.2,1)}
.cpanel.on{transform:translateY(0)}
.chandle{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.cphdr{padding:12px 18px;border-bottom:1px solid var(--bdr);flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between}
.cpht{display:flex;align-items:center;gap:8px}
.cpht-av{width:24px;height:24px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.cpht-av span{font-family:var(--serif);font-size:12px;font-weight:600;color:#111318}
.cpht-n{font-size:14px;font-weight:600;color:#fff}
.cphs{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:2px;max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.3px}
.cpx{font-size:19px;color:var(--t2);width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.cmsgs{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.cm{padding:10px 13px;border-radius:13px;font-size:14px;line-height:1.6;max-width:86%}
.cm.u{background:var(--blue);color:#111318;align-self:flex-end;border-radius:13px 13px 3px 13px;font-weight:500}
.cm.a{background:rgba(255,255,255,.07);color:var(--t1);align-self:flex-start;border-radius:13px 13px 13px 3px;border:1px solid var(--bdr)}
.cm.typ{font-style:italic;opacity:.45}
.cirow{display:flex;align-items:flex-end;gap:8px;padding:10px 14px 18px;border-top:1px solid var(--bdr);flex-shrink:0}
.cinp{flex:1;padding:10px 13px;border:1px solid var(--bdr);border-radius:11px;font-size:16px;font-family:var(--sans);background:rgba(255,255,255,.06);color:#fff;outline:none;resize:none;min-height:42px;max-height:88px;transition:border-color .15s;-webkit-appearance:none}
.cinp:focus{border-color:rgba(107,168,255,.5)}
.cinp::placeholder{color:var(--t3)}
.csend{width:38px;height:38px;flex-shrink:0;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;transition:filter .15s;cursor:pointer;font-family:var(--sans);border:none}

@keyframes fu{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.fu{animation:fu .4s ease both}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="sp-wrap">
    <div class="sp-dn" id="spDN">DN</div>
    <div class="sp-line" id="spLine"></div>
    <div class="sp-label" id="spLabel">
      <div class="sp-daily">Daily News</div>
      <div class="sp-byline">by Sam</div>
    </div>
    <div class="sp-walker" id="spWalker">
      <div class="sp-dot2"></div><div class="sp-dot2"></div><div class="sp-dot2"></div>
    </div>
  </div>
</div>

<!-- ONBOARDING -->
<div id="onboarding">
  <div class="ob-logo">DN</div>
  <div class="ob-sub">Daily News <em style="font-style:italic">by Sam</em></div>
  <div class="ob-h">Votre brief quotidien<br>en 5 minutes</div>
  <div class="ob-p">Chaque matin, l'essentiel de l'actualité mondiale. Simple, clair, lisible.</div>
  <span class="ob-lbl">Comment vous appelez-vous ?</span>
  <input class="ob-inp" id="obInp" type="text" placeholder="Votre prénom" maxlength="30" autocomplete="given-name">
  <button class="ob-btn" id="obBtn">Commencer l'aventure →</button>
</div>

<!-- OVERLAY + SIDE -->
<div class="ovl" id="ovl" onclick="closeMenu()"></div>
<div class="side" id="side">
  <div class="side-h">
    <span class="side-logo">Daily News</span>
    <button class="side-x" onclick="closeMenu()">✕</button>
  </div>
  <div class="side-b" id="sideB"></div>
  <div class="side-f">
    <button class="btn-ref" onclick="forceRefresh()">↻ Forcer actualisation</button>
  </div>
</div>

<!-- HEADER -->
<header class="hdr">
  <div class="hdr-in">
    <button class="hdr-btn" onclick="openMenu()"><span></span><span></span><span></span></button>
    <div class="hdr-logo">Daily News <em>by Sam</em></div>
    <div class="hdr-meta" id="hdrMeta"></div>
  </div>
</header>

<!-- LIST -->
<div id="listView"></div>

<!-- DETAIL -->

<script>
'use strict';
// ── CONSTANTS ──
const PROXY = 'https://daily-news-proxy.vercel.app/api/messages';
const NOW = new Date();
const DAYS = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
const MONTHS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const DATE_FR = DAYS[NOW.getDay()]+' '+NOW.getDate()+' '+MONTHS[NOW.getMonth()]+' '+NOW.getFullYear();
const DATE_YEAR = NOW.getFullYear();
function fmtKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
const TODAY = fmtKey(NOW);

const CATS = {
  economie:{l:'Économie',c:'#4F8EF7',e:'📈'}, business:{l:'Business',c:'#2DD4BF',e:'💼'},
  tech:{l:'Tech',c:'#A78BFA',e:'⚡'}, politique:{l:'Politique',c:'#F87171',e:'🏛'},
  sport:{l:'Sport',c:'#4ADE80',e:'⚽'}, culture:{l:'Culture',c:'#FBBF24',e:'🎭'},
  monde:{l:'Le Monde',c:'#38BDF8',e:'🌍'}, bourse:{l:'Bourse',c:'#34D399',e:'📊'},
  science:{l:'Science',c:'#C4B5FD',e:'🔬'}, international:{l:'Le Monde',c:'#38BDF8',e:'🌍'}
};
function getC(s){return CATS[(s||'').toLowerCase()]||{l:s||'',c:'#6B7280',e:'📰'}}
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

let brief = null, artIdx = null, chatCtx = '', chatHist = [], activeDay = TODAY;

// ── STORAGE ──
function getName(){return localStorage.getItem('dn_name')||''}
function gc(k){
  try{
    const raw = localStorage.getItem('sd_'+k);
    if(!raw) return null;
    const d = JSON.parse(raw);
    if(d && Array.isArray(d.articles) && d.articles.length > 0) return d;
    return null;
  }catch(e){return null}
}
function sc(k,v){try{localStorage.setItem('sd_'+k, JSON.stringify(v))}catch(e){}}

// ── SPLASH ──
function runSplash(cb){
  setTimeout(()=>document.getElementById('spDN').classList.add('on'), 150);
  setTimeout(()=>document.getElementById('spLine').classList.add('on'), 400);
  setTimeout(()=>document.getElementById('spLabel').classList.add('on'), 700);
  setTimeout(()=>document.getElementById('spWalker').classList.add('on'), 1100);
  setTimeout(()=>{
    document.getElementById('splash').classList.add('out');
    setTimeout(cb, 600);
  }, 2400);
}

,500);
}

// ── MENU ──
function openMenu(){renderMenu();document.getElementById('side').classList.add('on');document.getElementById('ovl').classList.add('on')}
function closeMenu(){document.getElementById('side').classList.remove('on');document.getElementById('ovl').classList.remove('on')}
function forceRefresh(){localStorage.removeItem('sd_'+activeDay);closeMenu();generate()}
function renderMenu(){
  let h = '<div class="side-lbl">Briefs récents</div>';
  for(let i=0;i<7;i++){
    const d=new Date(); d.setDate(d.getDate()-i);
    const k=fmtKey(d);
    const lbl=i===0?'Aujourd\'hui':i===1?'Hier':DAYS[d.getDay()]+' '+d.getDate();
    if(i===0||gc(k)){
      h+=`<button class="sday${k===activeDay?' act':''}" onclick="switchDay('${k}');closeMenu()"><div class="sday-n">${lbl}</div><div class="sday-d">${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}</div></button>`;
    }
  }
  document.getElementById('sideB').innerHTML = h;
}
function switchDay(k){
  activeDay=k;
  const c=gc(k);
  if(c){brief=c;renderList(c)}
  else if(k===TODAY) generate();
  else document.getElementById('listView').innerHTML='<div class="errc"><p>Brief du '+k+' non disponible.</p></div>';
}

// ── NEWS FETCH ──
async function fetchGuardian(){
  const secs=['business','technology','world','sport','culture','science','us-news','money'];
  const res = await Promise.allSettled(secs.map(async s=>{
    const r = await fetch('https://content.guardianapis.com/search?section='+s+'&order-by=newest&page-size=4&show-fields=trailText&api-key=test',{signal:AbortSignal.timeout(8000)});
    const d = await r.json();
    return (d.response?.results||[]).map(a=>({title:a.webTitle,desc:(a.fields?.trailText||'').replace(/<[^>]+>/g,'').slice(0,350),link:a.webUrl,source:'The Guardian',pub:a.webPublicationDate})).filter(a=>a.title&&a.link?.startsWith('https'));
  }));
  return res.filter(r=>r.status==='fulfilled').flatMap(r=>r.value);
}
async function fetchHN(){
  try{
    const r = await fetch('https://hacker-news.firebaseio.com/v1/topstories.json',{signal:AbortSignal.timeout(5000)});
    const ids = await r.json();
    const stories = await Promise.allSettled(ids.slice(0,20).map(id=>fetch('https://hacker-news.firebaseio.com/v1/item/'+id+'.json',{signal:AbortSignal.timeout(4000)}).then(r=>r.json())));
    return stories.filter(r=>r.status==='fulfilled'&&r.value?.url?.startsWith('https')&&r.value.score>80).map(r=>({title:r.value.title,desc:'',link:r.value.url,source:'Hacker News',pub:new Date(r.value.time*1000).toISOString()})).slice(0,6);
  }catch(e){return[]}
}
const FR = [{url:'https://syndication.lesechos.fr/rss/rss_une.xml',name:'Les Échos'},{url:'https://www.bfmtv.com/rss/economie/',name:'BFM Business'},{url:'https://www.frenchweb.fr/feed',name:'Frenchweb'},{url:'https://www.lefigaro.fr/rss/figaro_actualites.xml',name:'Le Figaro'},{url:'https://www.lequipe.fr/rss/actu_rss.xml',name:"L'Équipe"},{url:'https://techcrunch.com/feed/',name:'TechCrunch'},{url:'https://feeds.bbci.co.uk/news/business/rss.xml',name:'BBC Business'}];
function cx(s){return(s||'').replace(/<!\[CDATA\[/g,'').replace(/\]\]>/g,'').replace(/<[^>]+>/g,' ').replace(/&[a-z#0-9]+;/g,' ').replace(/\s+/g,' ').trim()}
async function fetchFeed(src){
  try{
    const r = await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(src.url),{signal:AbortSignal.timeout(7000)});
    const raw = (await r.json()).contents||'';
    const xml = new DOMParser().parseFromString(raw,'text/xml');
    if(xml.querySelector('parsererror')) return [];
    return Array.from(xml.querySelectorAll('item')).slice(0,5).map(item=>{
      const title=cx(item.querySelector('title')?.textContent||'');
      const desc=cx(item.querySelector('description')?.textContent||'').slice(0,350);
      let link=(item.querySelector('link')?.textContent||'').trim()||(item.querySelector('guid')?.textContent||'').trim();
      return{title,desc,link,source:src.name};
    }).filter(a=>a.title.length>5&&a.link.startsWith('https')&&!a.link.includes('example'));
  }catch(e){return[]}
}

// ── JSON PARSE ──
function safeJ(raw){
  const m=raw.match(/\{[\s\S]*\}/); if(!m) return null;
  let s=m[0].replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g,'');
  try{return JSON.parse(s)}catch(e){
    const last=s.lastIndexOf('}');
    if(last>100){
      let t=s.slice(0,last+1);
      const oa=(t.match(/\[/g)||[]).length-(t.match(/\]/g)||[]).length;
      const ob=(t.match(/\{/g)||[]).length-(t.match(/\}/g)||[]).length;
      for(let i=0;i<oa;i++)t+=']'; for(let i=0;i<ob;i++)t+='}';
      try{return JSON.parse(t)}catch(e2){}
    }
    return null;
  }
}

// ── API CALL ──
async function callAPI(body){
  const r = await fetch(PROXY,{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify(body)});
  if(!r.ok){const t=await r.text();throw new Error('API '+r.status+': '+t.slice(0,200))}
  const d = await r.json();
  if(d.error) throw new Error(d.error.message||JSON.stringify(d.error));
  return (d.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
}

// ── GENERATE BRIEF ──
const BSYS = 'Tu es l\'éditeur d\'un morning brief d\'actualité. Nous sommes le '+DATE_FR+' ('+DATE_YEAR+'). RÈGLES: 1) Utilise UNIQUEMENT les articles fournis. 2) Le champ "lien" = URL_SOURCE exacte, jamais inventée. 3) Résume en français. JSON valide, commence par { : {"titre":"max 10 mots","ephemeride":"fait historique fascinant sur cette date","chiffre":{"nombre":"string","contexte":"2 phrases","source":"media"},"articles":[{"section":"economie|business|tech|politique|sport|culture|monde|bourse|science","emoji":"string","titre":"string","teaser":"1 phrase","contenu":"5 phrases narratives","source":"media","lien":"URL_SOURCE exacte"}],"savais":"curiosité scientifique ou historique amusante"} - 6 articles variés, tout en français.';

async function generate(){
  document.getElementById('listView').innerHTML = '<div style="display:flex;flex-direction:column;align-items:center;padding:80px 20px;gap:14px"><div style="font-family:var(--serif);font-size:48px;font-weight:300;color:rgba(255,255,255,.7);letter-spacing:-3px">DN</div><div style="display:flex;gap:6px"><div class="sp-dot2"></div><div class="sp-dot2"></div><div class="sp-dot2"></div></div><div id="genTxt" style="font-family:var(--mono);font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3)">Chargement</div></div>';
  function setStatus(t){const el=document.getElementById('genTxt');if(el)el.textContent=t}
  try{
    setStatus('Chargement des sources');
    const [g, hn, ...feeds] = await Promise.allSettled([fetchGuardian(), fetchHN(), ...FR.map(fetchFeed)]);
    const frArts = feeds.filter(r=>r.status==='fulfilled').flatMap(r=>r.value);
    const all = [...frArts,...(g.status==='fulfilled'?g.value:[]),...(hn.status==='fulfilled'?hn.value:[])];
    const seen=new Set();
    const arts = all.filter(a=>{if(!a.link||seen.has(a.link))return false;seen.add(a.link);return true;});
    const valid = arts.filter(a=>a.link?.startsWith('https')&&!a.link.includes('example'));
    if(valid.length<3) throw new Error('Seulement '+valid.length+' articles chargés. Vérifiez votre connexion.');
    setStatus('Génération du brief');
    const list = valid.slice(0,26).map((a,i)=>'['+(i+1)+'] '+a.source+'\nTitre: '+a.title+(a.desc?'\nDesc: '+a.desc:'')+'\nURL_SOURCE: '+a.link).join('\n\n');
    const raw = await callAPI({model:'claude-haiku-4-5-20251001',max_tokens:3000,system:BSYS,messages:[{role:'user',content:valid.length+' articles du '+DATE_FR+':\n\n'+list+'\n\nJSON:'}]});
    setStatus('Finalisation');
    const parsed = safeJ(raw);
    if(!parsed) throw new Error('Réponse invalide de l\'IA.\n'+raw.slice(0,200));
    if(parsed.articles) parsed.articles = parsed.articles.filter(a=>a.lien?.startsWith('https')&&!a.lien.includes('example'));
    if(!parsed.articles?.length) throw new Error('Aucun article avec lien valide.');
    parsed._date = activeDay;
    sc(activeDay, parsed);
    brief = parsed;
    renderList(parsed);
  }catch(e){
    document.getElementById('listView').innerHTML = '<div class="errc"><p>'+esc(e.message)+'</p><button class="btn-retry" onclick="generate()">Réessayer</button></div>';
  }
}

// ── RENDER LIST ──
function renderList(b){
  const arts = b.articles||[];
  const name = getName();
  let h = '';
  // Bloc intro unifié
  const dayName = DAYS[NOW.getDay()];
  const dayStr = dayName.charAt(0).toUpperCase()+dayName.slice(1)+' '+NOW.getDate()+' '+MONTHS[NOW.getMonth()];
  const salut = name ? 'Salut '+esc(name)+', on est ' : 'On est ';
  h += '<div class="acc fu">'
    +'<div class="acc-salut">'+salut+'le '+esc(dayStr)+' ☀️</div>'
    +'<div class="acc-t">'+esc(b.titre||'')+'</div>'
    +(b.ephemeride?'<div class="acc-eph">'+esc(b.ephemeride)+'</div>':'')
    +'</div>';
  if(b.chiffre) h += '<div class="stat fu" style="animation-delay:.08s"><div class="stat-l"><div class="stat-nb">'+esc(b.chiffre.nombre||'')+'</div></div><div class="stat-r"><div class="stat-lbl">Chiffre du jour</div><div class="stat-txt">'+esc(b.chiffre.contexte||'')+'</div>'+(b.chiffre.source?'<div class="stat-src">'+esc(b.chiffre.source)+'</div>':'')+'</div></div>';
  arts.forEach(function(a,i){
    const cat = getC(a.section);
    h += '<div class="card fu" id="card'+i+'" style="animation-delay:'+(0.12+i*0.06)+'s">'
      +'<div class="cbar" style="background:'+cat.c+'"></div>'
      +'<div class="chead" onclick="toggleCard('+i+')">'
        +'<div class="cico" style="background:'+cat.c+'1a">'+cat.e+'</div>'
        +'<div class="cr">'
          +'<span class="cpill" style="background:'+cat.c+'"><span class="cpdot"></span>'+esc(cat.l)+'</span>'
          +'<div class="ctitle">'+esc(a.titre||'')+'</div>'
          +'<div class="cteaser">'+esc(a.teaser||'')+'</div>'
          +'<div class="cfoot"><span class="csrc">'+esc(a.source||'')+'</span>'
          +'<span class="cchev"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>'
          +'</div>'
        +'</div>'
      +'</div>'
      +'<div class="cbody" id="cb'+i+'">'
        +'<div class="cbin">'
          +'<div class="ctxt"><p>'+esc(a.contenu||'')+'</p></div>'
          +'<div class="cact">'
            +'<span class="csrc">'+esc(a.source||'')+'</span>'
            +'<button class="btn-c" onclick="openDetail('+i+')">'
              +'<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><circle cx="5.5" cy="5.5" r="4.5" stroke="currentColor" stroke-width="1.3"/><path d="M5.5 3.5v3M5.5 8v.3" stroke="currentColor" stroke-width="1.3" stroke-linecap="round"/></svg>'
              +'Comprendre'
            +'</button>'
          +'</div>'
        +'</div>'
      +'</div>'
      +'</div>';
  });
  if(b.savais) h += '<div class="bonus fu" style="animation-delay:'+(0.12+arts.length*0.06)+'s"><div class="bonus-e">Le savais-tu ?</div><div class="bonus-t">'+esc(b.savais)+'</div></div>';
  h += '<div class="foot"><span class="foot-b">Daily News</span><span class="foot-m">'+arts.length+' sources · '+NOW.toLocaleDateString('fr-FR')+'</span></div>';
  document.getElementById('listView').innerHTML = h;
}

// ── CARD TOGGLE ──
function toggleCard(i){
  const card=document.getElementById('card'+i);
  const body=document.getElementById('cb'+i);
  const open=card.classList.contains('open');
  document.querySelectorAll('.card.open').forEach(c=>{c.classList.remove('open');const b=c.querySelector('.cbody');if(b)b.style.maxHeight='0'});
  if(!open){card.classList.add('open');body.style.maxHeight=body.scrollHeight+'px';setTimeout(()=>{if(card.classList.contains('open'))body.style.maxHeight=body.scrollHeight+'px'},60)}
}

// ── DETAIL + ANALYSIS ──
const ASYS = 'Tu es un journaliste expert. Date: '+DATE_FR+' ('+DATE_YEAR+'). JSON uniquement, commence par {. {"sections":[{"emoji":"string","titre":"string","texte":"string 4-5 phrases claires"}]} 4 sections: 1=📍 Contexte (qui, quoi, depuis quand) 2=📰 Ce qui s\'est passé (faits précis) 3=💥 Impact (conséquences concrètes, pour qui) 4=🔭 À surveiller (prochaines étapes, opportunités). Langage accessible, explique les termes techniques. Tout en français.';

function openDetail(i){
  if(!brief?.articles) return;
  const a = brief.articles[i];
  if(!a) return;
  artIdx = i;
  chatCtx = '"'+a.titre+'" ('+a.source+'). '+a.contenu;
  chatHist = [];
  document.getElementById('chatSub').textContent = (a.titre||'').slice(0,44)+'…';
  document.getElementById('chatMsgs').innerHTML = '';
  const cat = getC(a.section);
  const hasLink = a.lien?.startsWith('https') && !a.lien.includes('example');
  let h = '<div class="dcat" style="background:'+cat.c+'">'+cat.e+' '+esc(cat.l)+'</div>'
    +'<div class="dtitle">'+esc(a.titre||'')+'</div>'
    +'<div class="dmeta"><span class="dsrc">'+esc(a.source||'')+'</span>'+(hasLink?'<a href="'+a.lien+'" target="_blank" rel="noopener" class="dlink">Lire l\'article ↗</a>':'')+'</div>'
    +'<div class="dann" id="dann"><div style="display:flex;flex-direction:column;align-items:center;padding:32px 0;gap:12px"><div style="font-family:var(--serif);font-size:40px;font-weight:300;color:rgba(255,255,255,.6);letter-spacing:-2px">DN</div><div style="display:flex;gap:6px"><div class="gen-dot"></div><div class="gen-dot"></div><div class="gen-dot"></div></div><div style="font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--t3)">Analyse</div></div></div>';
  document.getElementById('dBody').innerHTML = h;
  document.getElementById('detailView').classList.add('open');
  document.getElementById('chatFab').classList.add('vis');
  document.body.style.overflow = 'hidden';
  document.getElementById('detailView').scrollTop = 0;
  const cached = gc('det_'+activeDay+'_'+i);
  if(cached) renderAnn(cached); else genAnn(a,i);
}
function closeDetail(){
  document.getElementById('detailView').classList.remove('open');
  document.getElementById('chatFab').classList.remove('vis');
  closeChat();
  document.body.style.overflow = '';
}
async function genAnn(a,i){
  try{
    const raw = await callAPI({model:'claude-haiku-4-5-20251001',max_tokens:1200,system:ASYS,messages:[{role:'user',content:'Article: "'+a.titre+'". '+a.contenu+'. Source: '+a.source+'. JSON:'}]});
    const det = safeJ(raw);
    if(!det) throw new Error('JSON invalide');
    sc('det_'+activeDay+'_'+i, det);
    renderAnn(det);
  }catch(e){
    const el=document.getElementById('dann');
    if(el) el.innerHTML='<div class="errc" style="margin:0"><p>'+esc(e.message)+'</p></div>';
  }
}
function renderAnn(det){
  const el=document.getElementById('dann'); if(!el) return;
  el.innerHTML=(det.sections||[]).map(s=>'<div class="asec"><div class="ashdr"><span class="ase">'+s.emoji+'</span><span class="asl">'+esc(s.titre)+'</span><div class="asr"></div></div><div class="ast">'+esc(s.texte)+'</div></div>').join('');
}

// ── CHAT ──
function openChat(){document.getElementById('chatOvl').classList.add('on');document.getElementById('chatPanel').classList.add('on');setTimeout(()=>document.getElementById('chatInp').focus(),350)}
function closeChat(){document.getElementById('chatOvl').classList.remove('on');document.getElementById('chatPanel').classList.remove('on')}
function arResize(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,88)+'px'}
function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}}
async function sendMsg(){
  const inp=document.getElementById('chatInp');
  const msgs=document.getElementById('chatMsgs');
  const q=(inp.value||'').trim(); if(!q) return;
  inp.value=''; inp.style.height='auto';
  msgs.innerHTML+='<div class="cm u">'+esc(q)+'</div>';
  const tid='t'+Date.now();
  msgs.innerHTML+='<div class="cm a typ" id="'+tid+'">…</div>';
  msgs.scrollTop=msgs.scrollHeight;
  chatHist.push({role:'user',content:q});
  const name=getName();
  const sys='Tu t\'appelles Sam, assistant journaliste. Date: '+DATE_FR+' ('+DATE_YEAR+').'+(name?' Tu parles à '+name+'.':'')+' Article: '+chatCtx+'. Réponds en français, 3 phrases max, clair et accessible.';
  try{
    const raw=await callAPI({model:'claude-haiku-4-5-20251001',max_tokens:250,system:sys,messages:chatHist.slice(-6)});
    chatHist.push({role:'assistant',content:raw});
    const el=document.getElementById(tid); if(el){el.classList.remove('typ');el.textContent=raw}
  }catch(e){const el=document.getElementById(tid);if(el){el.classList.remove('typ');el.textContent='Erreur: '+e.message}}
  msgs.scrollTop=msgs.scrollHeight;
}

// ── MIDNIGHT REFRESH ──
function scheduleMidnight(){
  const now=new Date(),mid=new Date(now);
  mid.setDate(mid.getDate()+1); mid.setHours(0,0,10,0);
  const ms=mid-now;
  setTimeout(()=>{const keys=Object.keys(localStorage).filter(k=>k.startsWith('sd_20'));keys.sort().slice(0,-3).forEach(k=>localStorage.removeItem(k));location.reload()},ms);
}

// ── BOOT ──
window.addEventListener('load', function(){
  document.getElementById('hdrMeta').textContent = DAYS[NOW.getDay()].slice(0,3)+' '+NOW.getDate();
  scheduleMidnight();

  runSplash(function(){
    // Après le splash, on décide quoi montrer
    const name = getName();
    if(!name){
      // Premier lancement → onboarding
      const ob = document.getElementById('onboarding');
      ob.classList.add('show');
      setTimeout(function(){document.getElementById('obInp').focus()},300);
    } else {
      // Déjà connu → brief
      const cached = gc(activeDay);
      if(cached){brief=cached;renderList(cached);}
      else generate();
    }
  });
});

// Onboarding
document.getElementById('obBtn').addEventListener('click', function(){
  const name = (document.getElementById('obInp').value||'').trim();
  if(!name){
    const inp=document.getElementById('obInp');
    inp.style.borderColor='var(--red)';
    setTimeout(()=>inp.style.borderColor='',1500);
    return;
  }
  localStorage.setItem('dn_name', name);
  const ob=document.getElementById('onboarding');
  ob.classList.add('out');
  setTimeout(function(){ob.classList.remove('show','out');generate()},500);
});
document.getElementById('obInp').addEventListener('keydown', function(e){
  if(e.key==='Enter') document.getElementById('obBtn').click();
});
</script>
</body>
