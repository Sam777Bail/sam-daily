<style>
:root{
  --bg:#1C1E26;
  --card:rgba(255,255,255,.06);--card-h:rgba(255,255,255,.1);
  --bdr:rgba(255,255,255,.1);--bdr-h:rgba(255,255,255,.22);
  --t0:#F5F3F0;
  --t1:rgba(245,243,240,.88);
  --t2:rgba(245,243,240,.60);
  --t3:rgba(245,243,240,.35);
  --blue:#6BA8FF;--green:#4ADE80;--violet:#C4B5FD;--red:#F87171;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Syne',system-ui,sans-serif;
  --mono:ui-monospace,'SF Mono','Courier New',monospace;
  --ease:cubic-bezier(.25,.46,.45,.94);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--t0);font-family:var(--sans);font-size:16px;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh}
body::before{content:'';position:fixed;inset:0;z-index:0;pointer-events:none;background:radial-gradient(ellipse 700px 500px at 10% 0%,rgba(107,168,255,.1),transparent 60%),radial-gradient(ellipse 500px 400px at 90% 50%,rgba(196,181,253,.07),transparent 60%),radial-gradient(ellipse 400px 300px at 50% 100%,rgba(74,222,128,.06),transparent 60%)}
body>*{position:relative;z-index:1}
button{cursor:pointer;font-family:var(--sans);border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:20px;transition:opacity .7s var(--ease)}
#splash.out{opacity:0;pointer-events:none}
.sp-letters{display:flex;gap:12px;align-items:baseline}
.sp-letter{font-family:var(--serif);font-size:96px;font-weight:300;color:rgba(245,243,240,.08);line-height:1;letter-spacing:-2px;transition:color .6s var(--ease),text-shadow .6s var(--ease)}
.sp-letter.on{color:#fff;text-shadow:0 0 60px rgba(255,255,255,.2)}
.sp-byline{font-family:var(--serif);font-size:14px;font-style:italic;color:var(--t3);opacity:0;transition:opacity .5s var(--ease);letter-spacing:.5px}
.sp-byline.on{opacity:1}

/* HEADER */
.hdr{position:sticky;top:0;z-index:200;background:rgba(28,30,38,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--bdr)}
.hdr-in{max-width:740px;margin:0 auto;padding:0 20px;height:56px;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-family:var(--serif);font-size:21px;font-weight:400;color:#fff;letter-spacing:-.2px}
.hdr-logo span{font-size:12px;font-weight:300;font-style:italic;opacity:.4;margin-left:5px}
.hdr-meta{font-family:var(--mono);font-size:11px;color:var(--t3);letter-spacing:.3px;text-transform:capitalize}
.hdr-btn{width:36px;height:36px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;border-radius:9px;transition:background .15s}
.hdr-btn:hover{background:rgba(255,255,255,.08)}
.hdr-btn span{display:block;width:17px;height:1.5px;background:var(--t1);border-radius:2px}

/* SIDE MENU */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.55);z-index:300;opacity:0;pointer-events:none;transition:opacity .22s}
.ovl.on{opacity:1;pointer-events:all}
.side{position:fixed;top:0;left:0;bottom:0;width:278px;background:rgba(14,16,22,.98);backdrop-filter:blur(32px);z-index:400;border-right:1px solid var(--bdr);transform:translateX(-100%);transition:transform .3s var(--ease);display:flex;flex-direction:column}
.side.on{transform:translateX(0)}
.side-h{padding:20px 16px 14px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
.side-logo{font-family:var(--serif);font-size:17px;font-weight:400;color:#fff}
.side-x{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--t2)}
.side-b{flex:1;padding:10px;overflow-y:auto}
.side-lbl{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);padding:10px 8px 6px}
.side-day{display:block;width:100%;text-align:left;padding:10px 11px;border-radius:9px;margin-bottom:2px;color:var(--t2);transition:all .12s;cursor:pointer}
.side-day:hover,.side-day:active{background:rgba(255,255,255,.07);color:var(--t0)}
.side-day.act{background:rgba(107,168,255,.18);color:#fff;border:1px solid rgba(107,168,255,.28)}
.sd-n{font-size:14px;font-weight:500}
.sd-d{font-family:var(--mono);font-size:10px;opacity:.45;margin-top:2px}
.side-f{padding:13px 14px;border-top:1px solid var(--bdr)}
.btn-rf{background:rgba(255,255,255,.08);color:var(--t1);padding:11px;border-radius:9px;font-size:13px;font-weight:500;width:100%;border:1px solid var(--bdr);text-align:center;cursor:pointer;font-family:var(--sans)}

/* MAIN */
#listView{max-width:740px;margin:0 auto;padding:24px 20px 100px}

/* Date */
.date-block{padding:24px 0 20px;border-bottom:1px solid var(--bdr);margin-bottom:4px;text-align:center}
.date-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:2.5px;text-transform:uppercase;color:var(--t2);margin-bottom:12px}
.date-title{font-family:var(--serif);font-size:32px;font-style:italic;font-weight:400;color:#fff;line-height:1.2;letter-spacing:-.3px}

/* Ephemeride */
.eph-block{padding:14px 0 20px;border-bottom:1px solid var(--bdr);margin-bottom:22px;display:flex;align-items:center;gap:14px}
.eph-dash{width:22px;height:1px;background:var(--bdr-h);flex-shrink:0}
.eph-txt{font-family:var(--serif);font-size:16px;font-style:italic;color:var(--t2);line-height:1.55;text-align:center;flex:1}

/* Chiffre */
.stat-block{border-radius:16px;border:1px solid rgba(255,255,255,.11);margin-bottom:22px;overflow:hidden;background:rgba(255,255,255,.05);backdrop-filter:blur(20px);display:grid;grid-template-columns:auto 1fr}
.stat-left{padding:22px 24px;display:flex;flex-direction:column;justify-content:center;border-right:1px solid rgba(255,255,255,.08);background:rgba(255,255,255,.03)}
.stat-number{font-family:var(--serif);font-size:56px;font-weight:600;color:var(--t0);line-height:1;letter-spacing:-2px}
.stat-right{padding:20px 22px;display:flex;flex-direction:column;justify-content:center;gap:5px}
.stat-label{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--t3)}
.stat-context{font-size:15px;line-height:1.68;color:var(--t1)}
.stat-source{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:3px}

/* Cards */
.art-card{background:var(--card);backdrop-filter:blur(20px);border-radius:16px;border:1px solid var(--bdr);margin-bottom:10px;overflow:hidden;position:relative;transition:border-color .2s}
.art-card:hover{border-color:var(--bdr-h)}
.art-accent{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:16px 0 0 16px}
.art-head{display:flex;align-items:flex-start;gap:14px;padding:16px 18px;cursor:pointer;user-select:none;-webkit-user-select:none;transition:background .15s}
.art-head:active{background:rgba(255,255,255,.03)}
.art-ico{width:42px;height:42px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:19px;flex-shrink:0;margin-top:1px}
.art-r{flex:1;min-width:0}
.art-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 9px 2px 7px;border-radius:100px;font-family:var(--sans);font-size:9px;letter-spacing:.3px;text-transform:uppercase;margin-bottom:8px;color:#fff;font-weight:600}
.art-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.45)}
.art-title{font-family:var(--serif);font-size:20px;font-weight:600;line-height:1.26;color:#fff;margin-bottom:6px;letter-spacing:-.1px}
.art-teaser{font-size:14px;color:var(--t2);line-height:1.58;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.art-foot{display:flex;align-items:center;justify-content:space-between;margin-top:8px}
.art-source{font-family:var(--mono);font-size:9.5px;color:var(--t3);letter-spacing:.2px}
.art-chev svg{transition:transform .3s var(--ease);color:var(--t3)}
.art-card.open .art-chev svg{transform:rotate(180deg)}
.art-body{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(0,.4,.2,1)}
.art-card.open .art-body{max-height:700px}
.art-body-in{padding:16px 18px 20px;border-top:1px solid var(--bdr)}
.art-text{font-size:15.5px;line-height:1.88;color:var(--t1)}
.art-text p{margin-bottom:9px}.art-text p:last-child{margin-bottom:0}
.art-actions{display:flex;align-items:center;justify-content:space-between;margin-top:14px;padding-top:14px;border-top:1px solid var(--bdr)}
.btn-analyse{display:flex;align-items:center;gap:7px;padding:9px 20px;border-radius:100px;background:linear-gradient(135deg,var(--blue),#3B82F6);color:#fff;font-size:13px;font-weight:600;letter-spacing:.2px;box-shadow:0 4px 14px rgba(107,168,255,.25);transition:filter .15s}
.btn-analyse:active{filter:brightness(.9)}
.btn-analyse svg{width:12px;height:12px}

/* Savais-tu */
.bonus-block{margin-top:26px;background:rgba(196,181,253,.07);backdrop-filter:blur(20px);border-radius:16px;border:1px solid rgba(196,181,253,.18);padding:22px 24px;position:relative;overflow:hidden}
.bonus-block::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--violet),transparent)}
.bonus-eye{font-family:var(--mono);font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:var(--violet);margin-bottom:9px;display:flex;align-items:center;gap:7px}
.bonus-eye::before{content:'';width:14px;height:1px;background:var(--violet);flex-shrink:0}
.bonus-txt{font-family:var(--serif);font-size:17px;font-style:italic;color:var(--t1);line-height:1.68}

/* Footer */
.list-foot{display:flex;align-items:center;justify-content:space-between;padding:18px 0;border-top:1px solid var(--bdr);margin-top:8px}
.foot-brand{font-family:var(--serif);font-size:13px;color:var(--t2)}
.foot-meta{font-family:var(--mono);font-size:9.5px;color:var(--t3);letter-spacing:.2px}

/* Loader */
.loader{display:flex;flex-direction:column;align-items:center;padding:70px 0;gap:16px}
.loader-d{display:flex;gap:7px}
.ld{width:7px;height:7px;border-radius:50%;background:#fff;animation:ldp 1.3s ease infinite}
.ld:nth-child(2){animation-delay:.18s}.ld:nth-child(3){animation-delay:.36s}
@keyframes ldp{0%,100%{opacity:.1;transform:scale(.6)}50%{opacity:1;transform:scale(1)}}
.loader-t{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--t3)}

/* Error */
.err-card{background:var(--card);border-radius:14px;border:1px solid var(--bdr);padding:26px;text-align:center;margin:20px 0}
.err-card p{font-size:14px;color:var(--t2);line-height:1.65;margin-bottom:16px;white-space:pre-wrap;word-break:break-word}
.btn-retry{background:#fff;color:#1C1E26;padding:9px 20px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);border:none}

@keyframes reveal{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.rv{animation:reveal .45s var(--ease) both}

/* Detail */
#detailView{position:fixed;inset:0;z-index:500;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateX(100%);transition:transform .36s var(--ease)}
#detailView.open{transform:translateX(0)}
.det-hdr{position:sticky;top:0;z-index:10;background:rgba(28,30,38,.92);backdrop-filter:blur(24px);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 20px;height:56px}
.btn-back{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:500;color:var(--blue);padding:5px 0}
.btn-back svg{width:16px;height:16px}
.det-body{max-width:740px;margin:0 auto;padding:28px 20px 90px}
.det-cat{display:inline-flex;align-items:center;gap:5px;padding:3px 11px 3px 9px;border-radius:100px;font-family:var(--sans);font-size:9px;letter-spacing:.3px;text-transform:uppercase;margin-bottom:14px;color:#fff;font-weight:600}
.det-title{font-family:var(--serif);font-size:34px;font-weight:400;line-height:1.18;color:#fff;letter-spacing:-.4px;margin-bottom:14px}
.det-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding-bottom:20px;border-bottom:1px solid var(--bdr);margin-bottom:24px}
.det-source{font-family:var(--mono);font-size:9.5px;color:var(--t3);letter-spacing:.3px;text-transform:uppercase}
.det-link{font-family:var(--mono);font-size:9.5px;color:var(--blue);letter-spacing:.2px}
.det-analysis{border-top:1px solid var(--bdr);padding-top:22px}
.an-sec{margin-bottom:22px}
.an-hdr{display:flex;align-items:center;gap:9px;margin-bottom:10px}
.an-e{font-size:15px}
.an-l{font-family:var(--sans);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t2);font-weight:600}
.an-r{flex:1;height:1px;background:var(--bdr)}
.an-t{font-size:15.5px;line-height:1.82;color:var(--t1)}

/* Chat FAB */
.chat-fab{position:fixed;bottom:28px;right:22px;z-index:600;width:52px;height:52px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#2563EB);display:none;align-items:center;justify-content:center;box-shadow:0 4px 22px rgba(107,168,255,.4);transition:transform .2s}
.chat-fab.vis{display:flex}
.chat-fab:active{transform:scale(.92)}

/* Chat */
.chat-ovl{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:700;opacity:0;pointer-events:none;transition:opacity .25s}
.chat-ovl.on{opacity:1;pointer-events:all}
.chat-panel{position:fixed;left:0;right:0;bottom:0;z-index:800;background:rgba(14,16,22,.98);backdrop-filter:blur(32px);border-radius:20px 20px 0 0;border-top:1px solid var(--bdr);max-height:78vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .32s var(--ease)}
.chat-panel.on{transform:translateY(0)}
.chat-handle{width:36px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:12px auto 0;flex-shrink:0}
.chat-hdr{padding:13px 18px;border-bottom:1px solid var(--bdr);flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between}
.chat-htitle{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:#fff}
.chat-av{width:24px;height:24px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:12px;font-weight:600;color:#fff;flex-shrink:0}
.chat-hs{font-family:var(--mono);font-size:9.5px;color:var(--t3);margin-top:2px;max-width:230px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.2px}
.chat-hx{font-size:18px;color:var(--t2);width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.chat-msgs{flex:1;overflow-y:auto;padding:14px 16px;display:flex;flex-direction:column;gap:9px;-webkit-overflow-scrolling:touch}
.cm{padding:10px 13px;border-radius:13px;font-size:14px;line-height:1.6;max-width:86%}
.cm.u{background:var(--blue);color:#fff;align-self:flex-end;border-radius:13px 13px 3px 13px}
.cm.a{background:rgba(255,255,255,.07);color:var(--t1);align-self:flex-start;border-radius:13px 13px 13px 3px;border:1px solid var(--bdr)}
.cm.typ{font-style:italic;opacity:.45}
.cm-lbl{font-family:var(--mono);font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:3px;padding-left:2px}
.chat-irow{display:flex;align-items:flex-end;gap:8px;padding:10px 14px 18px;border-top:1px solid var(--bdr);flex-shrink:0}
.chat-inp{flex:1;padding:10px 13px;border:1px solid var(--bdr);border-radius:11px;font-size:16px;font-family:var(--sans);background:rgba(255,255,255,.06);color:#fff;outline:none;resize:none;min-height:42px;max-height:88px;transition:border-color .15s;-webkit-appearance:none}
.chat-inp:focus{border-color:rgba(107,168,255,.5)}
.chat-inp::placeholder{color:var(--t3)}
.chat-send{width:38px;height:38px;flex-shrink:0;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none}

/* Background premium aurora */
body::before {
  background:
    radial-gradient(circle at 12% 18%, rgba(107,168,255,.18), transparent 32%),
    radial-gradient(circle at 88% 24%, rgba(196,181,253,.14), transparent 30%),
    radial-gradient(circle at 50% 90%, rgba(74,222,128,.10), transparent 34%),
    linear-gradient(180deg, #1C1E26 0%, #11131A 100%);
  animation: auroraMove 16s ease-in-out infinite alternate;
}

body::after {
  content: "";
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
  opacity: .08;
  background-image:
    linear-gradient(rgba(255,255,255,.4) 1px, transparent 1px),
    linear-gradient(90deg, rgba(255,255,255,.4) 1px, transparent 1px);
  background-size: 42px 42px;
  mask-image: radial-gradient(circle at center, black, transparent 75%);
}

@keyframes auroraMove {
  0% {
    filter: hue-rotate(0deg) saturate(1);
    transform: scale(1);
  }
  100% {
    filter: hue-rotate(18deg) saturate(1.15);
    transform: scale(1.08);
  }
}

/* Grain cinématique */
.hdr::after,
#detailView::after,
.chat-panel::after {
  content: "";
  position: absolute;
  inset: 0;
  pointer-events: none;
  opacity: .035;
  background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 250 250' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='n'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23n)' opacity='0.7'/%3E%3C/svg%3E");
}

/* Header plus iOS / premium */
.hdr {
  box-shadow: 0 12px 40px rgba(0,0,0,.22);
}

.hdr-logo {
  position: relative;
}

.hdr-logo::after {
  content: "";
  position: absolute;
  left: 0;
  right: 35px;
  bottom: -5px;
  height: 1px;
  background: linear-gradient(90deg, transparent, rgba(255,255,255,.5), transparent);
  transform: scaleX(0);
  transform-origin: center;
  transition: transform .4s var(--ease);
}

.hdr:hover .hdr-logo::after {
  transform: scaleX(1);
}

/* Menu burger animé */
.hdr-btn span {
  transition: transform .25s var(--ease), opacity .25s var(--ease), background .25s;
}

.hdr-btn:hover span:nth-child(1) {
  transform: translateX(-3px);
}

.hdr-btn:hover span:nth-child(2) {
  transform: translateX(3px);
}

.hdr-btn:hover span:nth-child(3) {
  transform: translateX(-1px);
}

/* Splash plus luxe */
.sp-letter {
  animation: splashFloat 2.8s ease-in-out infinite;
}

.sp-letter:nth-child(2) {
  animation-delay: .18s;
}

@keyframes splashFloat {
  0%, 100% {
    transform: translateY(0) rotate(-1deg);
  }
  50% {
    transform: translateY(-8px) rotate(1deg);
  }
}

.sp-letters::after {
  content: "";
  position: absolute;
  width: 160px;
  height: 160px;
  border-radius: 999px;

<script>
const NOW=new Date();
const DAYS=['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
const MONTHS=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const DATE_FR=DAYS[NOW.getDay()]+' '+NOW.getDate()+' '+MONTHS[NOW.getMonth()]+' '+NOW.getFullYear();
function fmtKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
const TODAY=fmtKey(NOW);
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function getName(){return localStorage.getItem('dn_name')||''}

const CATS={
  economie:{l:'Économie',c:'#4F8EF7',e:'📈'},business:{l:'Business',c:'#3CB98A',e:'💼'},
  tech:{l:'Tech',c:'#9B6FF5',e:'⚡'},politique:{l:'Politique',c:'#E05252',e:'🏛'},
  sport:{l:'Sport',c:'#3CB98A',e:'⚽'},culture:{l:'Culture',c:'#F59E0B',e:'🎭'},
  monde:{l:'Le Monde',c:'#38B2AC',e:'🌍'},bourse:{l:'Bourse',c:'#C8922A',e:'📊'},
  science:{l:'Science',c:'#9B6FF5',e:'🔬'},international:{l:'Le Monde',c:'#38B2AC',e:'🌍'}
};
function getC(s){return CATS[(s||'').toLowerCase()]||{l:s||'',c:'#6E6A62',e:'📰'}}

let brief=null,chatCtx='',chatHist=[],activeDay=TODAY;
function gc(k){try{const d=JSON.parse(localStorage.getItem('sd_'+k));return(d&&Array.isArray(d.articles)&&d.articles.length>0)?d:null}catch{return null}}
function sc(k,v){try{localStorage.setItem('sd_'+k,JSON.stringify(v))}catch{}}

// SPLASH
function runSplash(){
  setTimeout(()=>document.getElementById('spD').classList.add('on'),300);
  setTimeout(()=>document.getElementById('spN').classList.add('on'),800);
  setTimeout(()=>document.getElementById('spByline').classList.add('on'),1300);
  setTimeout(()=>document.getElementById('splash').classList.add('out'),2600);
}

// MIDNIGHT
function scheduleMidnight(){
  const now=new Date(),mid=new Date(now);
  mid.setDate(mid.getDate()+1);mid.setHours(0,0,10,0);
  setTimeout(()=>{Object.keys(localStorage).filter(k=>k.startsWith('sd_20')).sort().slice(0,-3).forEach(k=>localStorage.removeItem(k));location.reload()},mid-now);
}

// MENU
function openMenu(){renderMenu();document.getElementById('side').classList.add('on');document.getElementById('ovl').classList.add('on')}
function closeMenu(){document.getElementById('side').classList.remove('on');document.getElementById('ovl').classList.remove('on')}
function forceRefresh(){localStorage.removeItem('sd_'+activeDay);closeMenu();init()}
function renderMenu(){
  let h='<div class="side-lbl">Briefs récents</div>';
  for(let i=0;i<7;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const k=fmtKey(d);
    const lbl=i===0?'Aujourd\'hui':i===1?'Hier':DAYS[d.getDay()]+' '+d.getDate();
    if(i===0||gc(k)){
      h+='<button class="side-day'+(k===activeDay?' act':'')+'" onclick="switchDay(\''+k+'\');closeMenu()">'
        +'<div class="sd-n">'+lbl+'</div>'
        +'<div class="sd-d">'+DAYS[d.getDay()]+' '+d.getDate()+' '+MONTHS[d.getMonth()]+'</div></button>';
    }
  }
  document.getElementById('sideBody').innerHTML=h;
}
function switchDay(k){activeDay=k;const c=gc(k);if(c){brief=c;renderList(c)}else if(k===TODAY)init();else setList('<div class="err-card"><p>Brief du '+k+' non disponible.</p></div>')}

// FETCH
async function fetchGuardian(){
  const secs=['business','technology','world','sport','culture','science','us-news','environment','money'];
  const res=await Promise.allSettled(secs.map(async s=>{
    const r=await fetch('https://content.guardianapis.com/search?section='+s+'&order-by=newest&page-size=4&show-fields=trailText&api-key=test',{signal:AbortSignal.timeout(8000)});
    const d=await r.json();
    return(d.response?.results||[]).map(a=>({title:a.webTitle,desc:(a.fields?.trailText||'').replace(/<[^>]+>/g,'').slice(0,400),link:a.webUrl,source:'The Guardian'})).filter(a=>a.title&&a.link?.startsWith('https'));
  }));
  return res.filter(r=>r.status==='fulfilled').flatMap(r=>r.value);
}
async function fetchHN(){
  try{
    const r=await fetch('https://hacker-news.firebaseio.com/v1/topstories.json',{signal:AbortSignal.timeout(5000)});
    const ids=await r.json();
    const stories=await Promise.allSettled(ids.slice(0,22).map(id=>fetch('https://hacker-news.firebaseio.com/v1/item/'+id+'.json',{signal:AbortSignal.timeout(4000)}).then(r=>r.json())));
    return stories.filter(r=>r.status==='fulfilled'&&r.value?.url?.startsWith('https')&&r.value.score>80).map(r=>({title:r.value.title,desc:'',link:r.value.url,source:'Hacker News'})).slice(0,7);
  }catch{return[]}
}
const FR=[{url:'https://syndication.lesechos.fr/rss/rss_une.xml',name:'Les Échos'},{url:'https://www.bfmtv.com/rss/economie/',name:'BFM Business'},{url:'https://www.frenchweb.fr/feed',name:'Frenchweb'},{url:'https://www.lefigaro.fr/rss/figaro_actualites.xml',name:'Le Figaro'},{url:'https://www.lequipe.fr/rss/actu_rss.xml',name:"L'Équipe"},{url:'https://techcrunch.com/feed/',name:'TechCrunch'},{url:'https://feeds.bbci.co.uk/news/business/rss.xml',name:'BBC Business'}];
function cx(s){return(s||'').replace(/<!\[CDATA\[/g,'').replace(/\]\]>/g,'').replace(/<[^>]+>/g,' ').replace(/&[a-z#0-9]+;/g,' ').replace(/\s+/g,' ').trim()}
async function fetchFeed(src){
  try{
    const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(src.url),{signal:AbortSignal.timeout(7000)});
    const raw=(await r.json()).contents||'';
    const xml=new DOMParser().parseFromString(raw,'text/xml');
    if(xml.querySelector('parsererror'))return[];
    return Array.from(xml.querySelectorAll('item')).slice(0,5).map(item=>{
      const title=cx(item.querySelector('title')?.textContent||'');
      const desc=cx(item.querySelector('description')?.textContent||'').slice(0,400);
      let link=(item.querySelector('link')?.textContent||'').trim()||(item.querySelector('guid')?.textContent||'').trim();
      return{title,desc,link,source:src.name};
    }).filter(a=>a.title.length>5&&a.link.startsWith('https')&&!a.link.includes('example'));
  }catch{return[]}
}
async function fetchAll(){
  const[g,hn,...feeds]=await Promise.allSettled([fetchGuardian(),fetchHN(),...FR.map(fetchFeed)]);
  const all=[...feeds.filter(r=>r.status==='fulfilled').flatMap(r=>r.value),...(g.status==='fulfilled'?g.value:[]),...(hn.status==='fulfilled'?hn.value:[])];
  const seen=new Set();
  return all.filter(a=>{if(!a.link||seen.has(a.link))return false;seen.add(a.link);return true});
}

// JSON
function safeJSON(raw){
  const m=raw.match(/\{[\s\S]*\}/);if(!m)return null;
  let s=m[0].replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g,'');
  try{return JSON.parse(s)}catch{
    const last=s.lastIndexOf('}');
    if(last>100){let t=s.slice(0,last+1);const oa=(t.match(/\[/g)||[]).length-(t.match(/\]/g)||[]).length;const ob=(t.match(/\{/g)||[]).length-(t.match(/\}/g)||[]).length;for(let i=0;i<oa;i++)t+=']';for(let i=0;i<ob;i++)t+='}';try{return JSON.parse(t)}catch{}}
    return null;
  }
}

// GENERATE
const SYS='Tu es l\'éditeur d\'un morning brief d\'actualité. Nous sommes le '+DATE_FR+' (2026). RÈGLES: 1) Utilise UNIQUEMENT les articles fournis. 2) "lien"=URL_SOURCE exacte. 3) Résume en français. 4) Titre SANS la date. JSON, commence par {: {"titre":"max 8 mots","ephemeride":"fait historique fascinant","chiffre":{"nombre":"string","contexte":"2 phrases","source":"media"},"articles":[{"section":"economie|business|tech|politique|sport|culture|monde|bourse|science","emoji":"string","titre":"string","teaser":"1 phrase","contenu":"5 phrases","source":"media","lien":"URL_SOURCE"}],"savais":"curiosité amusante"} — 6 articles, tout en français.';

async function generateBrief(articles){
  const valid=articles.filter(a=>a.link?.startsWith('https')&&!a.link.includes('example.com'));
  if(valid.length<3)throw new Error(valid.length+' articles chargés. Vérifiez votre connexion.');
  const list=valid.slice(0,26).map((a,i)=>'['+(i+1)+'] '+a.source+'\nTitre: '+a.title+(a.desc?'\nDesc: '+a.desc:'')+'\nURL_SOURCE: '+a.link).join('\n\n');
  const res=await fetch('https://daily-news-proxy.vercel.app/api/messages',{
    method:'POST',headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:3000,system:SYS,messages:[{role:'user',content:valid.length+' articles du '+DATE_FR+':\n\n'+list+'\n\nJSON:'}]})
  });
  if(!res.ok){const t=await res.text();throw new Error('API '+res.status+':\n'+t.slice(0,200))}
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  const raw=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
  const parsed=safeJSON(raw);
  if(!parsed)throw new Error('Réponse invalide.\n'+raw.slice(0,200));
  if(parsed.articles)parsed.articles=parsed.articles.filter(a=>a.lien?.startsWith('https')&&!a.lien.includes('example'));
  if(!parsed.articles?.length)throw new Error('Aucun article valide.');
  return parsed;
}

// RENDER
function setList(h){document.getElementById('listView').innerHTML=h}
function loader(t){setList('<div class="loader"><div style="font-family:var(--serif);font-size:44px;font-weight:300;color:var(--t0);letter-spacing:-2px;margin-bottom:10px;opacity:.8">DN</div><div class="loader-d"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div><div class="loader-t">'+t+'</div></div>')}

async function init(){
  const cached=gc(activeDay);
  if(cached){brief=cached;renderList(cached);return}
  loader('Chargement des sources');
  const timeout=setTimeout(()=>setList('<div class="err-card"><p>Connexion trop lente. Réessayez.</p><button class="btn-retry" onclick="init()">Réessayer</button></div>'),45000);
  try{
    const arts=await fetchAll();
    loader('Génération du brief');
    const b=await generateBrief(arts);
    clearTimeout(timeout);
    b._date=activeDay;sc(activeDay,b);brief=b;renderList(b);
  }catch(e){clearTimeout(timeout);setList('<div class="err-card"><p>'+esc(e.message)+'</p><button class="btn-retry" onclick="init()">Réessayer</button></div>')}
}

function renderList(b){
  const arts=b.articles||[];
  const name=getName();
  const dayStr=DAYS[NOW.getDay()].charAt(0).toUpperCase()+DAYS[NOW.getDay()].slice(1)+' '+NOW.getDate()+' '+MONTHS[NOW.getMonth()];
  let h='<div class="date-block rv">'
    +'<div class="date-eyebrow">'+(name?'Salut '+esc(name)+' — ':'')+esc(dayStr)+'</div>'
    +'<div class="date-title">'+esc(b.titre||'')+'</div>'
    +'</div>';
  if(b.ephemeride)h+='<div class="eph-block rv" style="animation-delay:.04s"><div class="eph-dash"></div><div class="eph-txt">'+esc(b.ephemeride)+'</div><div class="eph-dash"></div></div>';
  if(b.chiffre)h+='<div class="stat-block rv" style="animation-delay:.08s"><div class="stat-left"><div class="stat-number">'+esc(b.chiffre.nombre||'')+'</div></div><div class="stat-right"><div class="stat-label">Chiffre du jour</div><div class="stat-context">'+esc(b.chiffre.contexte||'')+'</div>'+(b.chiffre.source?'<div class="stat-source">'+esc(b.chiffre.source)+'</div>':'')+'</div></div>';
  arts.forEach(function(a,i){
    const cat=getC(a.section);
    h+='<div class="art-card rv" id="ac'+i+'" style="animation-delay:'+(0.12+i*0.06)+'s">'
      +'<div class="art-accent" style="background:'+cat.c+'"></div>'
      +'<div class="art-head" onclick="toggleCard('+i+')">'
        +'<div class="art-ico" style="background:'+cat.c+'1a">'+cat.e+'</div>'
        +'<div class="art-r">'
          +'<span class="art-pill" style="background:'+cat.c+'"><span class="art-dot"></span>'+esc(cat.l)+'</span>'
          +'<div class="art-title">'+esc(a.titre||'')+'</div>'
          +'<div class="art-teaser">'+esc(a.teaser||'')+'</div>'
          +'<div class="art-foot"><span class="art-source">'+esc(a.source||'')+'</span>'
          +'<span class="art-chev"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>'
          +'</div></div></div>'
      +'<div class="art-body" id="ab'+i+'"><div class="art-body-in">'
        +'<div class="art-text"><p>'+esc(a.contenu||'')+'</p></div>'
        +'<div class="art-actions"><span class="art-source">'+esc(a.source||'')+'</span>'
        +'<button class="btn-analyse" onclick="openDetail('+i+')">'
          +'<svg viewBox="0 0 11 11" fill="none"><circle cx="5.5" cy="5.5" r="4.5" stroke="white" stroke-width="1.3"/><path d="M5.5 3.5v3M5.5 8v.3" stroke="white" stroke-width="1.3" stroke-linecap="round"/></svg>'
          +'Comprendre</button>'
        +'</div></div></div></div>';
  });
  if(b.savais)h+='<div class="bonus-block rv" style="animation-delay:'+(0.12+arts.length*0.06)+'s"><div class="bonus-eye">Le savais-tu ?</div><div class="bonus-txt">'+esc(b.savais)+'</div></div>';
  h+='<div class="list-foot"><span class="foot-brand">Daily News <em style="font-size:10px;opacity:.5">by Sam</em></span><span class="foot-meta">'+arts.length+' sources · '+NOW.toLocaleDateString('fr-FR')+'</span></div>';
  setList(h);
  const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');obs.unobserve(e.target)}})},{threshold:.06});
  document.querySelectorAll('.rv').forEach(el=>obs.observe(el));
}

// CARD
function toggleCard(i){
  const card=document.getElementById('ac'+i);const body=document.getElementById('ab'+i);
  const open=card.classList.contains('open');
  document.querySelectorAll('.art-card.open').forEach(c=>{c.classList.remove('open');const b=c.querySelector('.art-body');if(b)b.style.maxHeight='0'});
  if(!open){card.classList.add('open');body.style.maxHeight=body.scrollHeight+'px';setTimeout(()=>{if(card.classList.contains('open'))body.style.maxHeight=body.scrollHeight+'px'},60)}
}

// DETAIL
const ASYS='Tu es un journaliste expert. Date: '+DATE_FR+' (2026). JSON uniquement, commence par {. {"sections":[{"emoji":"string","titre":"string","texte":"string 4-5 phrases claires"}]} 4 sections: 1=📍 Contexte 2=📰 Ce qui s\'est passé 3=💥 Impact 4=🔭 À surveiller. Accessible, sans jargon, tout en français.';
function openDetail(i){
  if(!brief?.articles)return;
  const a=brief.articles[i];if(!a)return;
  chatCtx='"'+a.titre+'" ('+a.source+'). '+a.contenu;chatHist=[];
  document.getElementById('chatSub').textContent=(a.titre||'').slice(0,44)+'…';
  document.getElementById('chatMsgs').innerHTML='';
  const cat=getC(a.section);
  const hasLink=a.lien?.startsWith('https')&&!a.lien.includes('example');
  document.getElementById('detBody').innerHTML='<div class="det-cat" style="background:'+cat.c+'">'+cat.e+' '+esc(cat.l)+'</div>'
    +'<div class="det-title">'+esc(a.titre||'')+'</div>'
    +'<div class="det-meta"><span class="det-source">'+esc(a.source||'')+'</span>'+(hasLink?'<a href="'+a.lien+'" target="_blank" rel="noopener" class="det-link">Lire l\'article ↗</a>':'')+'</div>'
    +'<div class="det-analysis" id="detAnn"><div class="loader" style="padding:28px 0"><div style="font-family:var(--serif);font-size:38px;font-weight:300;color:var(--t0);letter-spacing:-2px;margin-bottom:10px;opacity:.7">DN</div><div class="loader-d"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div><div class="loader-t">Analyse</div></div></div>';
  document.getElementById('detailView').classList.add('open');
  document.getElementById('chatFab').classList.add('vis');
  document.body.style.overflow='hidden';
  document.getElementById('detailView').scrollTop=0;
  const cached=gc('det_'+activeDay+'_'+i);
  if(cached)renderAnn(cached);else genAnn(a,i);
}
function closeDetail(){document.getElementById('detailView').classList.remove('open');document.getElementById('chatFab').classList.remove('vis');closeChat();document.body.style.overflow=''}
async function genAnn(a,i){
  try{
    const res=await fetch('https://daily-news-proxy.vercel.app/api/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1200,system:ASYS,messages:[{role:'user',content:'Article: "'+a.titre+'". '+a.contenu+'. Source: '+a.source+'. JSON:'}]})});
    if(!res.ok)throw new Error('API '+res.status);
    const data=await res.json();if(data.error)throw new Error(data.error.message);
    const raw=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const det=safeJSON(raw);if(!det)throw new Error('JSON invalide');
    sc('det_'+activeDay+'_'+i,det);renderAnn(det);
  }catch(e){const el=document.getElementById('detAnn');if(el)el.innerHTML='<div class="err-card" style="margin:0"><p>'+esc(e.message)+'</p></div>'}
}
function renderAnn(det){
  const el=document.getElementById('detAnn');if(!el)return;
  el.innerHTML=(det.sections||[]).map(s=>'<div class="an-sec"><div class="an-hdr"><span class="an-e">'+s.emoji+'</span><span class="an-l">'+esc(s.titre)+'</span><div class="an-r"></div></div><div class="an-t">'+esc(s.texte)+'</div></div>').join('');
}

// CHAT
function openChat(){document.getElementById('chatOvl').classList.add('on');document.getElementById('chatPanel').classList.add('on');setTimeout(()=>document.getElementById('chatInp').focus(),350)}
function closeChat(){document.getElementById('chatOvl').classList.remove('on');document.getElementById('chatPanel').classList.remove('on')}
function autoR(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,88)+'px'}
function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}}
async function sendMsg(){
  const inp=document.getElementById('chatInp');const msgs=document.getElementById('chatMsgs');
  const q=(inp.value||'').trim();if(!q)return;
  inp.value='';inp.style.height='auto';
  msgs.innerHTML+='<div class="cm u">'+esc(q)+'</div>';
  const tid='t'+Date.now();
  msgs.innerHTML+='<div class="cm-lbl">Sam</div><div class="cm a typ" id="'+tid+'">…</div>';
  msgs.scrollTop=msgs.scrollHeight;
  chatHist.push({role:'user',content:q});
  const name=getName();
  const sys='Tu t\'appelles Sam, assistant journaliste. Date: '+DATE_FR+' (2026).'+(name?' Tu parles à '+name+'.':'')+' Article: '+chatCtx+'. Réponds en français, 3 phrases max.';
  try{
    const res=await fetch('https://daily-news-proxy.vercel.app/api/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:250,system:sys,messages:chatHist.slice(-6)})});
    const data=await res.json();
    const reply=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('')||'Erreur.';
    chatHist.push({role:'assistant',content:reply});
    const el=document.getElementById(tid);if(el){el.classList.remove('typ');el.textContent=reply}
  }catch(e){const el=document.getElementById(tid);if(el){el.classList.remove('typ');el.textContent='Erreur: '+e.message}}
  msgs.scrollTop=msgs.scrollHeight;
}

// BOOT
window.addEventListener('load',function(){
  document.getElementById('hdrMeta').textContent=DAYS[NOW.getDay()].slice(0,3)+' '+NOW.getDate();
  runSplash();scheduleMidnight();
  // Demander le prénom si première visite
  if(!getName()){
    setTimeout(function(){
      const name=(prompt('Bienvenue sur Daily News !\n\nComment tu t\'appelles ?')||'').trim();
      if(name)localStorage.setItem('dn_name',name);
      init();
    },2700);
  } else {
    init();
  }
});
</script>
