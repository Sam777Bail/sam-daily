<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daily News">
<meta name="theme-color" content="#F5F5F7">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<meta http-equiv="Pragma" content="no-cache">
<meta http-equiv="Expires" content="0">
<title>Daily News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%23F5F5F7'/><text x='90' y='125' text-anchor='middle' font-family='Georgia,serif' font-size='100' font-weight='400' fill='%231D1D1F'>DN</text></svg>">
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Daily%20News%22%2C%22short_name%22%3A%22DN%22%2C%22start_url%22%3A%22.%2Fsam-daily.html%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%23F5F5F7%22%2C%22theme_color%22%3A%22%23F5F5F7%22%7D">
<style>
:root{
  --bg:#F5F5F7;
  --card:#FFFFFF;
  --bdr:rgba(0,0,0,.08);
  --bdr2:rgba(0,0,0,.14);
  --t0:#1D1D1F;
  --t1:#3A3A3C;
  --t2:#6E6E73;
  --t3:#AEAEB2;
  --blue:#0071E3;
  --blue-light:#E8F0FE;
  --green:#34C759;
  --red:#FF3B30;
  --violet:#AF52DE;
  --shadow:0 2px 16px rgba(0,0,0,.08),0 0 0 0.5px rgba(0,0,0,.05);
  --shadow-sm:0 1px 6px rgba(0,0,0,.06),0 0 0 0.5px rgba(0,0,0,.04);
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,'Syne','Segoe UI',sans-serif;
  --mono:ui-monospace,'SF Mono','Courier New',monospace;
  --ease:cubic-bezier(.25,.46,.45,.94);
  --r:16px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--t0);font-family:var(--sans);font-size:16px;-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh}
button{cursor:pointer;font-family:var(--sans);border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}

/* ── SPLASH ── */
#splash{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px;transition:opacity .6s var(--ease)}
#splash.out{opacity:0;pointer-events:none}
.sp-dn{font-family:var(--serif);font-size:88px;font-weight:400;color:var(--t0);letter-spacing:-4px;line-height:1;opacity:0;transform:translateY(12px);transition:opacity .6s var(--ease),transform .6s var(--ease)}
.sp-dn.on{opacity:1;transform:none}
.sp-line{width:0;height:1px;background:linear-gradient(90deg,transparent,var(--bdr2),transparent);transition:width .7s var(--ease) .4s}
.sp-line.on{width:80px}
.sp-sub{font-family:var(--serif);font-size:14px;font-style:italic;color:var(--t3);opacity:0;transition:opacity .5s var(--ease) .9s;letter-spacing:.5px}
.sp-sub.on{opacity:1}

/* ── ONBOARDING ── */
#onboarding{position:fixed;inset:0;z-index:9998;background:var(--bg);display:none;flex-direction:column;overflow-y:auto;-webkit-overflow-scrolling:touch}
#onboarding.show{display:flex}
.ob-screen{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:44px 28px 60px;max-width:440px;margin:0 auto;width:100%}
.ob-logo{font-family:var(--serif);font-size:52px;font-weight:400;color:var(--t0);letter-spacing:-3px;margin-bottom:6px;line-height:1}
.ob-tagline{font-family:var(--serif);font-size:13px;font-style:italic;color:var(--t3);margin-bottom:40px;letter-spacing:.5px}
.ob-title{font-family:var(--serif);font-size:28px;font-weight:400;color:var(--t0);line-height:1.25;margin-bottom:12px;text-align:center}
.ob-desc{font-size:15px;color:var(--t2);line-height:1.65;text-align:center;margin-bottom:36px;max-width:320px}
/* Features list */
.ob-features{display:flex;flex-direction:column;gap:14px;margin-bottom:40px;width:100%;max-width:320px}
.ob-feat{display:flex;align-items:flex-start;gap:12px;text-align:left}
.ob-feat-icon{width:36px;height:36px;border-radius:9px;background:var(--blue-light);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ob-feat-txt{flex:1}
.ob-feat-title{font-size:14px;font-weight:600;color:var(--t0);margin-bottom:2px}
.ob-feat-desc{font-size:12.5px;color:var(--t2);line-height:1.4}
/* Name input */
.ob-lbl{font-size:12px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin-bottom:8px;align-self:flex-start;max-width:320px;width:100%}
.ob-inp{width:100%;max-width:320px;padding:14px 18px;background:var(--card);border:1.5px solid var(--bdr);border-radius:12px;font-family:var(--serif);font-size:20px;color:var(--t0);outline:none;text-align:center;transition:border-color .2s;-webkit-appearance:none;margin-bottom:14px}
.ob-inp:focus{border-color:var(--blue)}
.ob-inp::placeholder{color:var(--t3);font-style:italic}
/* QCM */
.ob-q{font-size:18px;font-weight:600;color:var(--t0);margin-bottom:8px;text-align:center;line-height:1.3}
.ob-qsub{font-size:13px;color:var(--t2);margin-bottom:20px;text-align:center}
.ob-chips{display:flex;flex-wrap:wrap;gap:9px;justify-content:center;margin-bottom:32px;max-width:340px}
.ob-chip{padding:9px 16px;border-radius:100px;border:1.5px solid var(--bdr);background:var(--card);font-size:13.5px;font-weight:500;color:var(--t1);cursor:pointer;transition:all .15s;user-select:none;-webkit-user-select:none}
.ob-chip:active{transform:scale(.95)}
.ob-chip.sel{background:var(--blue);border-color:var(--blue);color:#fff}
/* Progress */
.ob-prog{display:flex;gap:5px;margin-bottom:32px}
.ob-prog-dot{width:6px;height:6px;border-radius:50%;background:var(--bdr2);transition:background .3s}
.ob-prog-dot.act{background:var(--blue)}
/* Buttons */
.ob-btn{width:100%;max-width:320px;padding:15px;background:var(--blue);color:#fff;border-radius:12px;font-size:15px;font-weight:600;letter-spacing:.2px;transition:opacity .15s;font-family:var(--sans);border:none;cursor:pointer}
.ob-btn:active{opacity:.85}
.ob-btn-sec{width:100%;max-width:320px;padding:13px;background:transparent;color:var(--blue);border-radius:12px;font-size:14px;font-weight:500;font-family:var(--sans);border:none;cursor:pointer;margin-top:6px}
/* Step counter */
.ob-step{font-family:var(--mono);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:20px}

/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:200;background:rgba(245,245,247,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr)}
.hdr-in{max-width:740px;margin:0 auto;padding:0 18px;height:52px;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-family:var(--serif);font-size:20px;font-weight:400;color:var(--t0);letter-spacing:-.2px}
.hdr-logo span{font-size:11px;font-weight:400;font-style:italic;opacity:.4;margin-left:4px}
.hdr-meta{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:.3px;text-transform:capitalize}
.hdr-btn{width:34px;height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4.5px;border-radius:8px;transition:background .15s}
.hdr-btn:hover{background:rgba(0,0,0,.06)}
.hdr-btn span{display:block;width:16px;height:1.5px;background:var(--t0);border-radius:2px}

/* ── SIDE MENU ── */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:300;opacity:0;pointer-events:none;transition:opacity .22s}
.ovl.on{opacity:1;pointer-events:all}
.side{position:fixed;top:0;left:0;bottom:0;width:280px;background:var(--bg);z-index:400;border-right:1px solid var(--bdr);transform:translateX(-100%);transition:transform .3s var(--ease);display:flex;flex-direction:column;box-shadow:4px 0 24px rgba(0,0,0,.08)}
.side.on{transform:translateX(0)}
.side-h{padding:20px 16px 14px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
.side-logo{font-family:var(--serif);font-size:17px;font-weight:400;color:var(--t0)}
.side-x{width:28px;height:28px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:17px;color:var(--t2);background:rgba(0,0,0,.05)}
.side-b{flex:1;overflow-y:auto;padding:10px}
.side-lbl{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);padding:12px 8px 6px}
.side-day{display:block;width:100%;text-align:left;padding:10px 11px;border-radius:10px;margin-bottom:2px;color:var(--t2);transition:all .12s;cursor:pointer}
.side-day:hover,.side-day:active{background:rgba(0,0,0,.05);color:var(--t0)}
.side-day.act{background:var(--blue-light);color:var(--blue)}
.sd-n{font-size:13.5px;font-weight:500}
.sd-d{font-family:var(--mono);font-size:10px;opacity:.5;margin-top:1px}
/* Profile in menu */
.side-profile{margin:8px 10px;padding:14px;background:var(--card);border-radius:12px;border:1px solid var(--bdr);cursor:pointer;transition:box-shadow .15s}
.side-profile:hover{box-shadow:var(--shadow-sm)}
.sp-name{font-size:14px;font-weight:600;color:var(--t0)}
.sp-prefs{font-size:11.5px;color:var(--t2);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.sp-edit{font-size:11px;color:var(--blue);margin-top:4px;font-weight:500}
.side-f{padding:12px 14px;border-top:1px solid var(--bdr)}
.btn-rf{background:rgba(0,0,0,.06);color:var(--t1);padding:11px;border-radius:10px;font-size:13px;font-weight:500;width:100%;border:none;cursor:pointer;font-family:var(--sans)}

/* ── MAIN ── */
#listView{max-width:740px;margin:0 auto;padding:20px 16px 90px}

/* Date */
.date-block{padding:20px 0 18px;border-bottom:1px solid var(--bdr);margin-bottom:4px;text-align:center}
.date-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);margin-bottom:10px}
.date-title{font-family:var(--serif);font-size:30px;font-style:italic;font-weight:400;color:var(--t0);line-height:1.2;letter-spacing:-.2px}

/* Ephemeride */
.eph-block{padding:13px 0 18px;border-bottom:1px solid var(--bdr);margin-bottom:20px;display:flex;align-items:center;gap:12px}
.eph-dash{width:20px;height:1px;background:var(--bdr2);flex-shrink:0}
.eph-txt{font-family:var(--serif);font-size:14px;font-style:italic;color:var(--t2);line-height:1.5;text-align:center;flex:1;font-weight:400}

/* Chiffre du jour — strip au top */
.stat-strip{padding:14px 0 16px;border-bottom:2px solid var(--bdr);margin-bottom:0;display:flex;align-items:flex-start;gap:14px}
.stat-strip-icon{font-size:22px;flex-shrink:0;margin-top:2px}
.stat-strip-body{flex:1}
.stat-strip-label{font-family:var(--mono);font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:var(--blue);margin-bottom:4px;font-weight:600}
.stat-strip-fact{font-size:14px;line-height:1.65;color:var(--t1)}
.stat-strip-src{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:3px}
/* Bourse — section pleine largeur */
.bourse-section{padding:16px 0 18px;border-bottom:1px solid var(--bdr);margin-bottom:20px}
.bourse-header{display:flex;align-items:center;gap:8px;margin-bottom:10px}
.bourse-badge{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--card);background:#34C759;padding:3px 9px;border-radius:100px;font-weight:600}
.bourse-date{font-family:var(--mono);font-size:9px;color:var(--t3)}
.bourse-txt{font-size:14px;line-height:1.75;color:var(--t1)}

/* Cards */
.art-card{background:var(--card);border-radius:var(--r);border:none;box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;position:relative;transition:box-shadow .2s}
.art-card:hover{box-shadow:0 4px 24px rgba(0,0,0,.11)}
.art-accent{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:var(--r) 0 0 var(--r)}
.art-head{display:flex;align-items:flex-start;gap:13px;padding:15px 16px;cursor:pointer;user-select:none;-webkit-user-select:none;transition:background .12s}
.art-head:active{background:rgba(0,0,0,.03)}
.art-ico{width:40px;height:40px;border-radius:10px;display:flex;align-items:center;justify-content:center;font-size:18px;flex-shrink:0;margin-top:1px}
.art-r{flex:1;min-width:0}
.art-pill{display:inline-flex;align-items:center;gap:4px;padding:2px 8px 2px 6px;border-radius:100px;font-family:var(--sans);font-size:8.5px;letter-spacing:.3px;text-transform:uppercase;margin-bottom:7px;color:#fff;font-weight:600}
.art-dot{width:3.5px;height:3.5px;border-radius:50%;background:rgba(255,255,255,.55)}
.art-title{font-family:var(--sans);font-size:16px;font-weight:600;line-height:1.3;color:var(--t0);margin-bottom:5px;letter-spacing:-.2px}
.art-teaser{font-size:13.5px;color:var(--t2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.art-foot{display:flex;align-items:center;justify-content:space-between;margin-top:7px}
.art-source{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.2px}
.art-chev svg{transition:transform .3s var(--ease);color:var(--t3)}
.art-card.open .art-chev svg{transform:rotate(180deg)}
.art-body{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(0,.4,.2,1)}
.art-card.open .art-body{max-height:700px}
.art-body-in{padding:14px 16px 18px;border-top:1px solid var(--bdr)}
.art-text{font-size:14.5px;line-height:1.85;color:var(--t1)}
.art-text p{margin-bottom:8px}.art-text p:last-child{margin-bottom:0}
.art-actions{display:flex;align-items:center;justify-content:space-between;margin-top:12px;padding-top:12px;border-top:1px solid var(--bdr)}
.btn-c{display:flex;align-items:center;gap:7px;padding:8px 18px;border-radius:100px;background:var(--blue);color:#fff;font-size:12.5px;font-weight:600;letter-spacing:.1px;transition:opacity .15s}
.btn-c:active{opacity:.8}
.btn-c svg{width:11px;height:11px}

/* Savais-tu */
.bonus-block{margin-top:22px;background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:20px 22px;position:relative;overflow:hidden}
.bonus-block::before{content:'';position:absolute;top:0;left:0;right:0;height:2px;background:linear-gradient(90deg,var(--violet),var(--blue))}
.bonus-eye{font-family:var(--mono);font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:var(--violet);margin-bottom:8px;display:flex;align-items:center;gap:6px}
.bonus-eye::before{content:'';width:12px;height:1px;background:var(--violet);flex-shrink:0}
.bonus-txt{font-family:var(--serif);font-size:16px;font-style:italic;color:var(--t0);line-height:1.65;font-weight:400}

/* Footer */
.list-foot{display:flex;align-items:center;justify-content:space-between;padding:16px 0;border-top:1px solid var(--bdr);margin-top:8px}
.foot-brand{font-family:var(--serif);font-size:13px;color:var(--t2)}
.foot-meta{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.2px}

/* Loader */
.loader{display:flex;flex-direction:column;align-items:center;padding:64px 0;gap:14px}
.loader-d{display:flex;gap:6px}
.ld{width:7px;height:7px;border-radius:50%;background:var(--t0);animation:ldp 1.3s ease infinite}
.ld:nth-child(2){animation-delay:.18s}.ld:nth-child(3){animation-delay:.36s}
@keyframes ldp{0%,100%{opacity:.12;transform:scale(.6)}50%{opacity:.7;transform:scale(1)}}
.loader-t{font-family:var(--mono);font-size:10px;letter-spacing:2px;text-transform:uppercase;color:var(--t3)}

/* Error */
.err-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:24px;text-align:center;margin:20px 0}
.err-card p{font-size:14px;color:var(--t2);line-height:1.65;margin-bottom:14px;white-space:pre-wrap;word-break:break-word}
.btn-retry{background:var(--blue);color:#fff;padding:9px 20px;border-radius:9px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);border:none}

@keyframes reveal{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.rv{animation:reveal .4s var(--ease) both}

/* ── DETAIL ── */
#detailView{position:fixed;inset:0;z-index:500;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateX(100%);transition:transform .36s var(--ease)}
#detailView.open{transform:translateX(0)}
.det-hdr{position:sticky;top:0;background:rgba(245,245,247,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 18px;height:52px;z-index:10}
.btn-bk{display:flex;align-items:center;gap:5px;font-size:13.5px;font-weight:500;color:var(--blue);padding:5px 0}
.btn-bk svg{width:16px;height:16px}
.det-body{max-width:740px;margin:0 auto;padding:24px 16px 90px}
.det-cat{display:inline-flex;align-items:center;gap:5px;padding:3px 10px 3px 8px;border-radius:100px;font-family:var(--sans);font-size:9px;letter-spacing:.3px;text-transform:uppercase;margin-bottom:12px;color:#fff;font-weight:600}
.det-title{font-family:var(--serif);font-size:30px;font-weight:400;line-height:1.18;color:var(--t0);letter-spacing:-.3px;margin-bottom:12px}
.det-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:8px;padding-bottom:18px;border-bottom:1px solid var(--bdr);margin-bottom:22px}
.det-source{font-family:var(--mono);font-size:9px;color:var(--t3);letter-spacing:.3px;text-transform:uppercase}
.det-link{font-family:var(--mono);font-size:9.5px;color:var(--blue);letter-spacing:.2px}
.det-analysis{border-top:1px solid var(--bdr);padding-top:20px}
.an-sec{margin-bottom:20px}
.an-hdr{display:flex;align-items:center;gap:8px;margin-bottom:9px}
.an-e{font-size:14px}
.an-l{font-family:var(--sans);font-size:10px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t2);font-weight:600}
.an-r{flex:1;height:1px;background:var(--bdr)}
.an-t{font-size:15px;line-height:1.82;color:var(--t1)}

/* ── CHAT FAB ── */
.chat-fab{position:fixed;bottom:26px;right:20px;z-index:600;width:52px;height:52px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,113,227,.35);transition:transform .2s,opacity .2s;opacity:0;pointer-events:none}
.chat-fab.vis{opacity:1;pointer-events:all}
.chat-fab:active{transform:scale(.92)}

/* ── CHAT ── */
.chat-ovl{position:fixed;inset:0;background:rgba(0,0,0,.3);z-index:700;opacity:0;pointer-events:none;transition:opacity .25s}
.chat-ovl.on{opacity:1;pointer-events:all}
.chat-panel{position:fixed;left:0;right:0;bottom:0;z-index:800;background:var(--bg);border-radius:22px 22px 0 0;border-top:1px solid var(--bdr);max-height:80vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .32s var(--ease);box-shadow:0 -4px 24px rgba(0,0,0,.1)}
.chat-panel.on{transform:translateY(0)}
.chat-handle{width:36px;height:4px;background:var(--bdr2);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.chat-hdr{padding:12px 16px;border-bottom:1px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.chat-htitle{display:flex;align-items:center;gap:8px;font-size:14px;font-weight:600;color:var(--t0)}
.chat-av{width:24px;height:24px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:12px;font-weight:600;color:#fff;flex-shrink:0}
.chat-hs{font-family:var(--mono);font-size:9.5px;color:var(--t3);margin-top:1px;max-width:220px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap;letter-spacing:.2px}
.chat-hx{font-size:18px;color:var(--t2);width:28px;height:28px;display:flex;align-items:center;justify-content:center}
.chat-msgs{flex:1;overflow-y:auto;padding:12px 14px;display:flex;flex-direction:column;gap:8px;-webkit-overflow-scrolling:touch}
.cm{padding:10px 13px;border-radius:14px;font-size:14px;line-height:1.58;max-width:86%}
.cm.u{background:var(--blue);color:#fff;align-self:flex-end;border-radius:14px 14px 3px 14px}
.cm.a{background:var(--card);color:var(--t1);align-self:flex-start;border-radius:14px 14px 14px 3px;box-shadow:var(--shadow-sm)}
.cm-lbl{font-family:var(--mono);font-size:8px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:2px;padding-left:2px}
/* Thinking dots */
.thinking{display:flex;align-items:center;gap:4px;padding:12px 14px;background:var(--card);border-radius:14px 14px 14px 3px;box-shadow:var(--shadow-sm);align-self:flex-start}
.thinking-dot{width:6px;height:6px;border-radius:50%;background:var(--t3);animation:tdot 1.2s ease infinite}
.thinking-dot:nth-child(2){animation-delay:.2s}
.thinking-dot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,100%{opacity:.3;transform:scale(.8)}50%{opacity:1;transform:scale(1)}}
.chat-irow{display:flex;align-items:flex-end;gap:8px;padding:10px 12px 18px;border-top:1px solid var(--bdr);flex-shrink:0}
.chat-inp{flex:1;padding:10px 13px;border:1.5px solid var(--bdr);border-radius:11px;font-size:16px;font-family:var(--sans);background:var(--card);color:var(--t0);outline:none;resize:none;min-height:42px;max-height:88px;transition:border-color .15s;-webkit-appearance:none}
.chat-inp:focus{border-color:var(--blue)}
.chat-inp::placeholder{color:var(--t3)}
.chat-send{width:38px;height:38px;flex-shrink:0;background:var(--blue);border-radius:10px;display:flex;align-items:center;justify-content:center;cursor:pointer;border:none;transition:opacity .15s}
.chat-send:active{opacity:.8}
</style>
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="sp-dn" id="spDN">DN</div>
  <div class="sp-line" id="spLine"></div>
  <div class="sp-sub" id="spSub">Daily News <em>by Sam</em></div>
</div>

<!-- ONBOARDING -->

  <div class="ob-screen" id="obScreen"></div>

<!-- OVERLAY + SIDE -->
<div class="ovl" id="ovl" onclick="closeMenu()"></div>
<div class="side" id="side">

  </div>
  <div class="side-b" id="sideBody">

      <div class="sp-name" id="sideProfileName">Mon profil</div>
      <div class="sp-prefs" id="sideProfilePrefs"></div>
      <div class="sp-edit">Modifier les préférences →</div>
    </div>
    <div id="sideDays"></div>
  </div>

<!-- HEADER -->
<header class="hdr">

    <button class="hdr-btn" onclick="openMenu()"><span></span><span></span><span></span></button>
    <div class="hdr-logo">Daily News <span>by Sam</span></div>
    <div class="hdr-meta" id="hdrMeta"></div>
  </div>
</header>

<div id="listView">
  <div class="loader"><div class="loader-d"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div><div class="loader-t">Chargement</div></div>
</div>

<div id="detailView">
  <div class="det-hdr">
    <button class="btn-bk" onclick="closeDetail()">
      <svg viewBox="0 0 16 16" fill="none"><path d="M10 3L5 8l5 5" stroke="currentColor" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round"/></svg>
      Retour
    </button>

</div>

<button class="chat-fab" id="chatFab" onclick="openChat()">
  <span style="font-family:var(--serif);font-size:16px;font-weight:600;color:#fff">S</span>
</button>

      <svg width="14" height="14" viewBox="0 0 14 14" fill="white"><path d="M1.5 7L12.5 1.5 9 12.5 7 8 1.5 7z"/></svg>
    </button>

<script>
'use strict';
// ── VERSION (bump = force reset cache) ──
const APP_VER = 'v3';

const NOW = new Date();
const DAYS = ['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
const MONTHS = ['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const DATE_FR = DAYS[NOW.getDay()]+' '+NOW.getDate()+' '+MONTHS[NOW.getMonth()]+' '+NOW.getFullYear();
function fmtKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
const TODAY = fmtKey(NOW);
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

const CATS = {
  economie:{l:'Économie',c:'#0071E3',e:'📈'},business:{l:'Business',c:'#34C759',e:'💼'},
  tech:{l:'Tech',c:'#AF52DE',e:'⚡'},politique:{l:'Politique',c:'#FF3B30',e:'🏛'},
  sport:{l:'Sport',c:'#FF9500',e:'⚽'},culture:{l:'Culture',c:'#FF2D55',e:'🎭'},
  monde:{l:'Le Monde',c:'#007AFF',e:'🌍'},bourse:{l:'Bourse',c:'#34C759',e:'📊'},
  science:{l:'Science',c:'#5856D6',e:'🔬'},international:{l:'Le Monde',c:'#007AFF',e:'🌍'}
};
function getC(s){return CATS[(s||'').toLowerCase()]||{l:s||'',c:'#8E8E93',e:'📰'}}

let brief=null,chatCtx='',chatHist=[],activeDay=TODAY;

// ── STORAGE ──
function gc(k){try{const d=JSON.parse(localStorage.getItem('sd_'+k));return(d&&Array.isArray(d.articles)&&d.articles.length>0)?d:null}catch{return null}}
function sc(k,v){try{localStorage.setItem('sd_'+k,JSON.stringify(v))}catch{}}
function getName(){return localStorage.getItem('dn_name')||''}
function getProfile(){try{return JSON.parse(localStorage.getItem('dn_profile'))||{}}catch{return{}}}
function saveProfile(p){localStorage.setItem('dn_profile',JSON.stringify(p))}

// ── ONBOARDING DATA ──
const OB_QUESTIONS = [
  {
    id:'interests',
    q:'Quels sujets t\'intéressent ?',
    sub:'Plusieurs choix possibles',
    multi:true,
    opts:['Business & Finance','Tech & IA','Politique','Sport','Culture & Arts','Science','Crypto','Immobilier','Santé','Environnement']
  },
  {
    id:'profile',
    q:'Ton profil ?',
    sub:'Un seul choix',
    multi:false,
    opts:['Entrepreneur','Salarié en entreprise','Étudiant','Financier / Investisseur','Indépendant / Freelance','Curieux']
  },
  {
    id:'sector',
    q:'Ton secteur de prédilection ?',
    sub:'Plusieurs choix possibles',
    multi:true,
    opts:['Finance & Marchés','Startups & Innovation','Luxe & Mode','Médias & Entertainment','Industrie & Énergie','Santé & Biotech','Immobilier','Aucun en particulier']
  },
  {
    id:'mustread',
    q:'Ce que tu ne veux jamais rater ?',
    sub:'Plusieurs choix possibles',
    multi:true,
    opts:['Football','Tennis','F1','Basketball','Cinéma','Musique','Gastronomie','Mode','Aucun']
  }
];

let obStep = 0; // 0=welcome, 1=name, 2..=questions
let obData = {};

function startOnboarding(editMode){
  obStep = editMode ? 1 : 0;
  obData = editMode ? {...getProfile()} : {};
  document.getElementById('onboarding').classList.add('show');
  renderObStep();
}
function closeOnboarding(){
  document.getElementById('onboarding').classList.remove('show');
}

function renderObStep(){
  const screen = document.getElementById('obScreen');
  if(obStep === 0){
    screen.innerHTML = `
      <div class="ob-logo">DN</div>
      <div class="ob-tagline">Daily News by Sam</div>
      <div class="ob-title">Ton brief d'actu personnalisé chaque matin</div>
      <div class="ob-desc">5 minutes. L'essentiel de l'actualité mondiale, sélectionné selon tes centres d'intérêt.</div>
      <div class="ob-features">
        <div class="ob-feat"><div class="ob-feat-icon">📰</div><div class="ob-feat-txt"><div class="ob-feat-title">Actus du jour</div><div class="ob-feat-desc">Vraies sources — The Guardian, Les Échos, BFM, TechCrunch et plus</div></div></div>
        <div class="ob-feat"><div class="ob-feat-icon">🔍</div><div class="ob-feat-txt"><div class="ob-feat-title">Comprendre en profondeur</div><div class="ob-feat-desc">Contexte, impact, opportunités — pour chaque article</div></div></div>
        <div class="ob-feat"><div class="ob-feat-icon">💬</div><div class="ob-feat-txt"><div class="ob-feat-title">Demander à Sam</div><div class="ob-feat-desc">Notre IA répond à tes questions sur n'importe quel article en temps réel</div></div></div>
      </div>
      <button class="ob-btn" onclick="obNext()">Commencer →</button>`;
  } else if(obStep === 1){
    screen.innerHTML = `
      <div class="ob-prog">${OB_QUESTIONS.map((_,i)=>'<div class="ob-prog-dot'+(i===0?' act':'')+'"></div>').join('')}</div>
      <div class="ob-step">Étape 1 / ${OB_QUESTIONS.length+1}</div>
      <div class="ob-title">Comment tu t'appelles ?</div>
      <div class="ob-desc" style="margin-bottom:28px">Pour personnaliser ton expérience</div>
      <span class="ob-lbl">Prénom</span>
      <input class="ob-inp" id="obNameInp" type="text" placeholder="Ton prénom" maxlength="30" autocomplete="given-name" value="${esc(getName())}">
      <button class="ob-btn" onclick="obSaveName()">Continuer →</button>`;
    setTimeout(()=>document.getElementById('obNameInp')?.focus(),300);
    document.getElementById('obNameInp')?.addEventListener('keydown',e=>{if(e.key==='Enter')obSaveName()});
  } else {
    const qi = obStep - 2;
    if(qi >= OB_QUESTIONS.length){
      // Done
      saveProfile(obData);
      closeOnboarding();
      updateSideProfile();
      localStorage.removeItem('sd_'+activeDay);
      init();
      return;
    }
    const q = OB_QUESTIONS[qi];
    const sel = obData[q.id] || [];
    const dots = OB_QUESTIONS.map((_,i)=>'<div class="ob-prog-dot'+(i<=qi?' act':'')+'"></div>').join('');
    screen.innerHTML = `
      <div class="ob-prog">${dots}</div>
      <div class="ob-step">Étape ${obStep} / ${OB_QUESTIONS.length+1}</div>
      <div class="ob-q">${q.q}</div>
      <div class="ob-qsub">${q.sub}</div>
      <div class="ob-chips" id="obChips">
        ${q.opts.map(o=>`<div class="ob-chip${sel.includes(o)?' sel':''}" onclick="obToggle('${q.id}','${o}',${q.multi})">${o}</div>`).join('')}
      </div>
      <button class="ob-btn" onclick="obNext()">Continuer →</button>
      <button class="ob-btn-sec" onclick="obSkip()">Passer cette étape</button>`;
  }
}

function obToggle(id, val, multi){
  if(!obData[id]) obData[id] = [];
  if(multi){
    const idx = obData[id].indexOf(val);
    if(idx>=0) obData[id].splice(idx,1);
    else obData[id].push(val);
  } else {
    obData[id] = [val];
  }
  // Re-render chips
  const q = OB_QUESTIONS.find(q=>q.id===id);
  const chips = document.getElementById('obChips');
  if(chips) chips.innerHTML = q.opts.map(o=>`<div class="ob-chip${(obData[id]||[]).includes(o)?' sel':''}" onclick="obToggle('${id}','${o}',${multi})">${o}</div>`).join('');
}

function obSaveName(){
  const v = (document.getElementById('obNameInp')?.value||'').trim();
  if(!v){ document.getElementById('obNameInp').style.borderColor='var(--red)'; return; }
  localStorage.setItem('dn_name', v);
  obStep++;
  renderObStep();
}
function obNext(){obStep++;renderObStep()}
function obSkip(){obStep++;renderObStep()}
function editProfile(){closeMenu();startOnboarding(true)}

// ── SPLASH ──
function runSplash(cb){
  setTimeout(()=>document.getElementById('spDN').classList.add('on'),200);
  setTimeout(()=>document.getElementById('spLine').classList.add('on'),500);
  setTimeout(()=>document.getElementById('spSub').classList.add('on'),800);
  setTimeout(()=>{
    document.getElementById('splash').classList.add('out');
    setTimeout(cb,500);
  },2300);
}

// ── MIDNIGHT ──
function scheduleMidnight(){
  const now=new Date(),mid=new Date(now);
  mid.setDate(mid.getDate()+1);mid.setHours(0,0,10,0);
  setTimeout(()=>{Object.keys(localStorage).filter(k=>k.startsWith('sd_20')).sort().slice(0,-3).forEach(k=>localStorage.removeItem(k));location.reload()},mid-now);
}

// ── MENU ──
function openMenu(){renderMenu();document.getElementById('side').classList.add('on');document.getElementById('ovl').classList.add('on')}
function closeMenu(){document.getElementById('side').classList.remove('on');document.getElementById('ovl').classList.remove('on')}
function forceRefresh(){localStorage.removeItem('sd_'+activeDay);closeMenu();init()}

function updateSideProfile(){
  const name = getName();
  const profile = getProfile();
  document.getElementById('sideProfileName').textContent = name ? 'Bonjour, '+name : 'Mon profil';
  const prefs = [];
  if(profile.interests?.length) prefs.push(profile.interests.slice(0,3).join(', '));
  document.getElementById('sideProfilePrefs').textContent = prefs.join(' · ') || 'Aucune préférence définie';
}

function renderMenu(){
  updateSideProfile();
  let h = '<div class="side-lbl">Historique</div>';
  for(let i=0;i<7;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const k=fmtKey(d);
    const lbl=i===0?'Aujourd\'hui':i===1?'Hier':DAYS[d.getDay()]+' '+d.getDate();
    if(i===0||gc(k)){
      h+='<button class="side-day'+(k===activeDay?' act':'')+'" onclick="switchDay(\''+k+'\');closeMenu()">'
        +'<div class="sd-n">'+lbl+'</div><div class="sd-d">'+DAYS[d.getDay()]+' '+d.getDate()+' '+MONTHS[d.getMonth()]+'</div></button>';
    }
  }
  document.getElementById('sideDays').innerHTML = h;
}
function switchDay(k){activeDay=k;const c=gc(k);if(c){brief=c;renderList(c)}else if(k===TODAY)init();else setList('<div class="err-card"><p>Brief du '+k+' non disponible.</p></div>')}

// ── FETCH MARKETS (Sonnet + web search) ──
async function fetchMarkets(){
  try{
    const res=await fetch('https://daily-news-proxy.vercel.app/api/messages',{
      method:'POST',headers:{'Content-Type':'application/json'},
      body:JSON.stringify({
        model:'claude-sonnet-4-6',max_tokens:350,enable_search:true,
        messages:[{role:'user',content:'Date: '+DATE_FR+' (2026). Génère en français un résumé des marchés financiers du jour, 3-4 phrases. Inclus: CAC 40 (% et niveau), Wall Street (S&P 500/Nasdaq), Brent (pétrole), EUR/USD. Mentionne 1-2 valeurs qui ont particulièrement bougé aujourd'hui ou qui publient leurs résultats prochainement. Raisons principales des mouvements. Précis et direct.'}]
      })
    });
    const data=await res.json();
    return(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('')||null;
  }catch{return null}
}

// ── FETCH ──
async function fetchGuardian(){
  const secs=['business','technology','world','sport','culture','science','us-news','environment','money'];
  const res=await Promise.allSettled(secs.map(async s=>{
    const r=await fetch('https://content.guardianapis.com/search?section='+s+'&order-by=newest&page-size=4&show-fields=trailText&api-key=test',{signal:AbortSignal.timeout(8000)});
    const d=await r.json();
    return(d.response?.results||[]).map(a=>({title:a.webTitle,desc:(a.fields?.trailText||'').replace(/<[^>]+>/g,'').slice(0,400),link:a.webUrl,source:'The Guardian'})).filter(a=>a.title&&a.link?.startsWith('https'));
  }));
  return res.filter(r=>r.status==='fulfilled').flatMap(r=>r.value);
}
async function fetchHN(){
  try{
    const r=await fetch('https://hacker-news.firebaseio.com/v1/topstories.json',{signal:AbortSignal.timeout(5000)});
    const ids=await r.json();
    const stories=await Promise.allSettled(ids.slice(0,20).map(id=>fetch('https://hacker-news.firebaseio.com/v1/item/'+id+'.json',{signal:AbortSignal.timeout(4000)}).then(r=>r.json())));
    return stories.filter(r=>r.status==='fulfilled'&&r.value?.url?.startsWith('https')&&r.value.score>80).map(r=>({title:r.value.title,desc:'',link:r.value.url,source:'Hacker News'})).slice(0,7);
  }catch{return[]}
}
const FR=[{url:'https://syndication.lesechos.fr/rss/rss_une.xml',name:'Les Échos'},{url:'https://www.bfmtv.com/rss/economie/',name:'BFM Business'},{url:'https://www.frenchweb.fr/feed',name:'Frenchweb'},{url:'https://www.lefigaro.fr/rss/figaro_actualites.xml',name:'Le Figaro'},{url:'https://www.lequipe.fr/rss/actu_rss.xml',name:"L'Équipe"},{url:'https://techcrunch.com/feed/',name:'TechCrunch'},{url:'https://feeds.bbci.co.uk/news/business/rss.xml',name:'BBC Business'}];
function cx(s){return(s||'').replace(/<!\[CDATA\[/g,'').replace(/\]\]>/g,'').replace(/<[^>]+>/g,' ').replace(/&[a-z#0-9]+;/g,' ').replace(/\s+/g,' ').trim()}
async function fetchFeed(src){
  try{
    const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(src.url),{signal:AbortSignal.timeout(7000)});
    const raw=(await r.json()).contents||'';
    const xml=new DOMParser().parseFromString(raw,'text/xml');
    if(xml.querySelector('parsererror'))return[];
    return Array.from(xml.querySelectorAll('item')).slice(0,5).map(item=>{
      const title=cx(item.querySelector('title')?.textContent||'');
      const desc=cx(item.querySelector('description')?.textContent||'').slice(0,400);
      let link=(item.querySelector('link')?.textContent||'').trim()||(item.querySelector('guid')?.textContent||'').trim();
      return{title,desc,link,source:src.name};
    }).filter(a=>a.title.length>5&&a.link.startsWith('https')&&!a.link.includes('example'));
  }catch{return[]}
}
async function fetchAll(){
  const[g,hn,...feeds]=await Promise.allSettled([fetchGuardian(),fetchHN(),...FR.map(fetchFeed)]);
  const all=[...feeds.filter(r=>r.status==='fulfilled').flatMap(r=>r.value),...(g.status==='fulfilled'?g.value:[]),...(hn.status==='fulfilled'?hn.value:[])];
  const seen=new Set();
  return all.filter(a=>{if(!a.link||seen.has(a.link))return false;seen.add(a.link);return true});
}

// ── JSON ──
function safeJSON(raw){
  const m=raw.match(/\{[\s\S]*\}/);if(!m)return null;
  let s=m[0].replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g,'');
  try{return JSON.parse(s)}catch{
    const last=s.lastIndexOf('}');
    if(last>100){let t=s.slice(0,last+1);const oa=(t.match(/\[/g)||[]).length-(t.match(/\]/g)||[]).length;const ob=(t.match(/\{/g)||[]).length-(t.match(/\}/g)||[]).length;for(let i=0;i<oa;i++)t+=']';for(let i=0;i<ob;i++)t+='}';try{return JSON.parse(t)}catch{}}
    return null;
  }
}

// ── GENERATE ──
function buildSYS(){
  const p = getProfile();
  const name = getName();
  let personalization = '';
  if(p.interests?.length) personalization += 'Centres d\'intérêt: '+p.interests.join(', ')+'. ';
  if(p.profile?.length) personalization += 'Profil: '+p.profile[0]+'. ';
  if(p.sector?.length) personalization += 'Secteurs: '+p.sector.join(', ')+'. ';
  if(p.mustread?.length && !p.mustread.includes('Aucun')) personalization += 'À ne pas rater: '+p.mustread.join(', ')+'. ';
  // Last 3 briefs titles to avoid repetition
  const recent = [];
  for(let i=1;i<=3;i++){const d=new Date();d.setDate(d.getDate()-i);const c=gc(fmtKey(d));if(c?.articles)c.articles.forEach(a=>recent.push(a.titre))}
  const recentStr = recent.length ? '\nSujets DÉJÀ COUVERTS ces 3 derniers jours (évite la répétition sauf avancée majeure): '+recent.slice(0,12).join(' | ') : '';
  return `Tu es l'éditeur d'un morning brief d'actualité pour un public français. Date: ${DATE_FR} (2026).
${name?'Lecteur: '+name+'. ':''}${personalization}
RÈGLES GÉOGRAPHIQUES: Priorité aux news France, Europe, impact mondial, US ou Chine si impact global. Ignore les news de pays mineurs sans impact.
RÈGLES DE CONTENU: 1) Utilise UNIQUEMENT les articles fournis. 2) "lien"=URL_SOURCE exacte. 3) Résume en français. 4) Titre SANS la date.${recentStr}
JSON, commence par {: {"titre":"max 8 mots","bourse":"résumé marchés du jour 3-4 phrases (utilise marketsData si fourni)","ephemeride":"fait historique fascinant","stat":{"fait":"stat insolite ou curiosité chiffrée non-actualité (ex: prix m² Monaco, nb de piscines privées en France, salaire moyen astronaute NASA...) — surprenante et mémorable","source":"si connue"},"articles":[{"section":"economie|business|tech|politique|sport|culture|monde|bourse|science","emoji":"string","titre":"string","teaser":"1 phrase","contenu":"5 phrases","source":"media","lien":"URL_SOURCE"}],"savais":"fait scientifique, historique, psychologique ou médical SURPRENANT et AMUSANT — formulé comme une révélation, ex: 'Le cerveau humain consomme autant d\'énergie qu\'une ampoule de 20W, même pendant le sommeil.' Évite le banal."} — Sélectionne EXACTEMENT 4 articles (pas plus, pas moins). HIÉRARCHIE: 1) Business/Éco/Finance si événement majeur 2) Tech & IA 3) Politique française ou européenne 4) International (US, Chine, conflits, accords) 5) Sport 1 max (titre: "Sport — [compétition] — [pays/club]") 6) Culture si exceptionnel. IGNORE: politique de pays mineurs sans impact global, faits divers, météo. SPORT: titre clair ex: "Sport — Roland-Garros — Sinner éliminé au 3e tour". Tout en français.`;
}

async function generateBrief(articles, marketsData){
  const valid=articles.filter(a=>a.link?.startsWith('https')&&!a.link.includes('example.com'));
  if(valid.length<3)throw new Error(valid.length+' articles chargés. Vérifiez votre connexion.');
  const list=valid.slice(0,26).map((a,i)=>'['+(i+1)+'] '+a.source+'\nTitre: '+a.title+(a.desc?'\nDesc: '+a.desc:'')+'\nURL_SOURCE: '+a.link).join('\n\n');
  const res=await fetch('https://daily-news-proxy.vercel.app/api/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:3000,system:buildSYS(),messages:[{role:'user',content:valid.length+' articles du '+DATE_FR+(marketsData?'\nMarchés aujourd\'hui: '+marketsData:'')+':\n\n'+list+'\n\nJSON:'}]})});
  if(!res.ok){const t=await res.text();throw new Error('API '+res.status+':\n'+t.slice(0,200))}
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  const raw=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
  const parsed=safeJSON(raw);
  if(!parsed)throw new Error('Réponse invalide.\n'+raw.slice(0,200));
  if(parsed.articles)parsed.articles=parsed.articles.filter(a=>a.lien?.startsWith('https')&&!a.lien.includes('example'));
  if(!parsed.articles?.length)throw new Error('Aucun article valide.');
  return parsed;
}

// ── RENDER ──
function setList(h){document.getElementById('listView').innerHTML=h}
function loader(t){setList('<div class="loader"><div style="font-family:var(--serif);font-size:42px;font-weight:400;color:var(--t0);letter-spacing:-2px;margin-bottom:10px;opacity:.6">DN</div><div class="loader-d"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div><div class="loader-t">'+t+'</div></div>')}

async function init(){
  const cached=gc(activeDay);
  if(cached){brief=cached;renderList(cached);return}
  loader('Chargement des sources');
  const timeout=setTimeout(()=>setList('<div class="err-card"><p>Connexion trop lente.</p><button class="btn-retry" onclick="init()">Réessayer</button></div>'),45000);
  try{
    const [arts, markets]=await Promise.all([fetchAll(), fetchMarkets()]);
    loader('Génération du brief');
    const b=await generateBrief(arts, markets);
    clearTimeout(timeout);b._date=activeDay;sc(activeDay,b);brief=b;renderList(b);
  }catch(e){clearTimeout(timeout);setList('<div class="err-card"><p>'+esc(e.message)+'</p><button class="btn-retry" onclick="init()">Réessayer</button></div>')}
}

function renderList(b){
  const arts=b.articles||[];
  const name=getName();
  const dayStr=DAYS[NOW.getDay()].charAt(0).toUpperCase()+DAYS[NOW.getDay()].slice(1)+' '+NOW.getDate()+' '+MONTHS[NOW.getMonth()];
  let h='<div class="date-block rv"><div class="date-eyebrow">'+(name?'Salut '+esc(name)+' — ':'')+esc(dayStr)+'</div><div class="date-title">'+esc(b.titre||'')+'</div></div>';
  if(b.ephemeride)h+='<div class="eph-block rv" style="animation-delay:.04s"><div class="eph-dash"></div><div class="eph-txt">'+esc(b.ephemeride)+'</div><div class="eph-dash"></div></div>';
  // 1. Chiffre du jour — strip au top
  if(b.stat)h+='<div class="stat-strip rv" style="animation-delay:.02s"><div class="stat-strip-icon">🔢</div><div class="stat-strip-body"><div class="stat-strip-label">Le chiffre du jour</div><div class="stat-strip-fact">'+esc(b.stat.fait||'')+'</div>'+(b.stat.source?'<div class="stat-strip-src">'+esc(b.stat.source)+'</div>':'')+'</div></div>';
  // 2. Bourse — section pleine largeur
  if(b.bourse)h+='<div class="bourse-section rv" style="animation-delay:.05s"><div class="bourse-header"><span class="bourse-badge">📊 Marchés</span><span class="bourse-date">'+esc(DATE_FR)+'</span></div><div class="bourse-txt">'+esc(b.bourse)+'</div></div>';
  arts.forEach((a,i)=>{
    const cat=getC(a.section);
    h+='<div class="art-card rv" id="ac'+i+'" style="animation-delay:'+(0.12+i*0.05)+'s">'
      +'<div class="art-accent" style="background:'+cat.c+'"></div>'
      +'<div class="art-head" onclick="toggleCard('+i+')">'
        +'<div class="art-ico" style="background:'+cat.c+'18">'+cat.e+'</div>'
        +'<div class="art-r"><span class="art-pill" style="background:'+cat.c+'"><span class="art-dot"></span>'+esc(cat.l)+'</span>'
        +'<div class="art-title">'+esc(a.titre||'')+'</div>'
        +'<div class="art-teaser">'+esc(a.teaser||'')+'</div>'
        +'<div class="art-foot"><span class="art-source">'+esc(a.source||'')+'</span><span class="art-chev"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span></div></div></div>'
      +'<div class="art-body" id="ab'+i+'"><div class="art-body-in"><div class="art-text"><p>'+esc(a.contenu||'')+'</p></div>'
        +'<div class="art-actions"><span class="art-source">'+esc(a.source||'')+'</span>'
        +'<button class="btn-c" onclick="openDetail('+i+')">'
          +'<svg viewBox="0 0 11 11" fill="none"><circle cx="5.5" cy="5.5" r="4.5" stroke="white" stroke-width="1.3"/><path d="M5.5 3.5v3M5.5 8v.3" stroke="white" stroke-width="1.3" stroke-linecap="round"/></svg>Comprendre</button>'
        +'</div></div></div></div>';
  });
  if(b.savais)h+='<div class="bonus-block rv" style="animation-delay:'+(0.12+arts.length*0.05)+'s"><div class="bonus-eye">Le savais-tu ?</div><div class="bonus-txt">'+esc(b.savais)+'</div></div>';
  h+='<div class="list-foot"><span class="foot-brand">Daily News <em style="font-size:10px;opacity:.5">by Sam</em></span><span class="foot-meta">'+arts.length+' sources · '+NOW.toLocaleDateString('fr-FR')+'</span></div>';
  setList(h);
  document.getElementById('chatFab').classList.add('vis');
  chatCtx='Brief du '+DATE_FR+': '+((b.articles||[]).map(a=>a.titre).join(', '));
  const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');obs.unobserve(e.target)}})},{threshold:.06});
  document.querySelectorAll('.rv').forEach(el=>obs.observe(el));
}

// ── CARD ──
function toggleCard(i){
  const card=document.getElementById('ac'+i);const body=document.getElementById('ab'+i);
  const open=card.classList.contains('open');
  document.querySelectorAll('.art-card.open').forEach(c=>{c.classList.remove('open');const b=c.querySelector('.art-body');if(b)b.style.maxHeight='0'});
  if(!open){card.classList.add('open');body.style.maxHeight=body.scrollHeight+'px';setTimeout(()=>{if(card.classList.contains('open'))body.style.maxHeight=body.scrollHeight+'px'},60)}
}

// ── DETAIL ──
const ASYS='Tu es un journaliste expert. Date: '+DATE_FR+' (2026). JSON uniquement, commence par {. {"sections":[{"emoji":"string","titre":"string","texte":"string 4-5 phrases claires"}]} 4 sections: 1=📍 Contexte 2=📰 Ce qui s\'est passé 3=💥 Impact 4=🔭 À surveiller. Accessible, sans jargon, tout en français.';
function openDetail(i){
  if(!brief?.articles)return;
  const a=brief.articles[i];if(!a)return;
  chatCtx='"'+a.titre+'" ('+a.source+'). '+a.contenu;chatHist=[];
  document.getElementById('chatSub').textContent=(a.titre||'').slice(0,44)+'…';
  document.getElementById('chatMsgs').innerHTML='';
  const cat=getC(a.section);const hasLink=a.lien?.startsWith('https')&&!a.lien.includes('example');
  document.getElementById('detBody').innerHTML='<div class="det-cat" style="background:'+cat.c+'">'+cat.e+' '+esc(cat.l)+'</div>'
    +'<div class="det-title">'+esc(a.titre||'')+'</div>'
    +'<div class="det-meta"><span class="det-source">'+esc(a.source||'')+'</span>'+(hasLink?'<a href="'+a.lien+'" target="_blank" rel="noopener" class="det-link">Lire l\'article ↗</a>':'')+'</div>'
    +'<div class="det-analysis" id="detAnn"><div class="loader" style="padding:28px 0"><div style="font-family:var(--serif);font-size:36px;color:var(--t0);opacity:.5;letter-spacing:-2px;margin-bottom:10px">DN</div><div class="loader-d"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div><div class="loader-t">Analyse</div></div></div>';
  document.getElementById('detailView').classList.add('open');
  document.getElementById('chatFab').classList.add('vis');
  document.body.style.overflow='hidden';
  document.getElementById('detailView').scrollTop=0;
  const cached=gc('det_'+activeDay+'_'+i);
  if(cached)renderAnn(cached);else genAnn(a,i);
}
function closeDetail(){document.getElementById('detailView').classList.remove('open');closeChat();document.body.style.overflow='';chatCtx='Brief du '+DATE_FR+': '+((brief?.articles||[]).map(a=>a.titre).join(', '));}
async function genAnn(a,i){
  try{
    const res=await fetch('https://daily-news-proxy.vercel.app/api/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1200,system:ASYS,messages:[{role:'user',content:'Article: "'+a.titre+'". '+a.contenu+'. Source: '+a.source+'. JSON:'}]})});
    if(!res.ok)throw new Error('API '+res.status);
    const data=await res.json();if(data.error)throw new Error(data.error.message);
    const raw=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const det=safeJSON(raw);if(!det)throw new Error('JSON invalide');
    sc('det_'+activeDay+'_'+i,det);renderAnn(det);
  }catch(e){const el=document.getElementById('detAnn');if(el)el.innerHTML='<div class="err-card" style="margin:0"><p>'+esc(e.message)+'</p></div>'}
}
function renderAnn(det){
  const el=document.getElementById('detAnn');if(!el)return;
  el.innerHTML=(det.sections||[]).map(s=>'<div class="an-sec"><div class="an-hdr"><span class="an-e">'+s.emoji+'</span><span class="an-l">'+esc(s.titre)+'</span><div class="an-r"></div></div><div class="an-t">'+esc(s.texte)+'</div></div>').join('');
}

// ── CHAT with typewriter + thinking ──
function openChat(){document.getElementById('chatOvl').classList.add('on');document.getElementById('chatPanel').classList.add('on');setTimeout(()=>document.getElementById('chatInp').focus(),350)}
function closeChat(){document.getElementById('chatOvl').classList.remove('on');document.getElementById('chatPanel').classList.remove('on')}
function autoR(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,88)+'px'}
function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}}

function typewrite(el, text, speed){
  el.textContent='';
  let i=0;
  const t=setInterval(()=>{
    if(i>=text.length){clearInterval(t);return}
    el.textContent+=text[i];i++;
    const msgs=document.getElementById('chatMsgs');
    if(msgs)msgs.scrollTop=msgs.scrollHeight;
  },speed||18);
}

async function sendMsg(){
  const inp=document.getElementById('chatInp');const msgs=document.getElementById('chatMsgs');
  const q=(inp.value||'').trim();if(!q)return;
  inp.value='';inp.style.height='auto';
  msgs.innerHTML+='<div class="cm u">'+esc(q)+'</div>';
  // Thinking animation
  const tid='t'+Date.now();
  msgs.innerHTML+='<div class="cm-lbl">Sam</div><div class="thinking" id="'+tid+'"><div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div></div>';
  msgs.scrollTop=msgs.scrollHeight;
  chatHist.push({role:'user',content:q});
  const name=getName();
  const sys='Tu t\'appelles Sam, assistant journaliste avec accès au web en temps réel. Date: '+DATE_FR+' (2026).'+(name?' Tu parles à '+name+'.':'')+' Article de référence: '+chatCtx+'. Réponds en français, concis et précis.';
  try{
    const res=await fetch('https://daily-news-proxy.vercel.app/api/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:500,enable_search:true,system:sys,messages:chatHist.slice(-6)})});
    const data=await res.json();
    const reply=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('')||'Erreur.';
    chatHist.push({role:'assistant',content:reply});
    // Replace thinking with typewriter
    const thinking=document.getElementById(tid);
    if(thinking){
      const newEl=document.createElement('div');
      newEl.className='cm a';
      thinking.replaceWith(newEl);
      typewrite(newEl,reply,16);
    }
  }catch(e){
    const thinking=document.getElementById(tid);
    if(thinking){thinking.outerHTML='<div class="cm a">Erreur: '+esc(e.message)+'</div>'}
  }
}

// ── BOOT ──
window.addEventListener('load',function(){
  document.getElementById('hdrMeta').textContent=DAYS[NOW.getDay()].slice(0,3)+' '+NOW.getDate();
  scheduleMidnight();
  // Version check → reset cache if new version
  const storedVer=localStorage.getItem('dn_ver');
  if(storedVer!==APP_VER){
    Object.keys(localStorage).filter(k=>k.startsWith('sd_')||k.startsWith('det_')).forEach(k=>localStorage.removeItem(k));
    localStorage.setItem('dn_ver',APP_VER);
  }
  runSplash(function(){
    const hasName=getName();
    const hasProfile=Object.keys(getProfile()).length>0;
    if(!hasName||!hasProfile){
      obStep=hasName?2:0;
      startOnboarding(false);
    } else {
      init();
    }
  });
});
