<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="Daily News">
<meta name="theme-color" content="#F5F5F7">
<meta http-equiv="Cache-Control" content="no-cache, no-store, must-revalidate">
<title>Daily News</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,400;0,600;1,400&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#F5F5F7;--card:#FFFFFF;
  --bdr:rgba(0,0,0,.08);--bdr2:rgba(0,0,0,.14);
  --t0:#1D1D1F;--t1:#3A3A3C;--t2:#6E6E73;--t3:#AEAEB2;
  --blue:#0071E3;--blue-bg:#EBF3FD;--green:#34C759;
  --red:#FF3B30;--violet:#AF52DE;--orange:#FF9500;
  --shadow:0 2px 16px rgba(0,0,0,.08),0 0 0 0.5px rgba(0,0,0,.05);
  --shadow-sm:0 1px 8px rgba(0,0,0,.07);
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:-apple-system,BlinkMacSystemFont,'Segoe UI',sans-serif;
  --mono:ui-monospace,'SF Mono',monospace;
  --ease:cubic-bezier(.25,.46,.45,.94);
  --r:14px;
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
body{background:var(--bg);color:var(--t0);font-family:var(--sans);-webkit-font-smoothing:antialiased;overflow-x:hidden;min-height:100vh}
button{cursor:pointer;font-family:var(--sans);border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}

/* SPLASH */
#splash{position:fixed;inset:0;z-index:9999;background:var(--bg);display:flex;flex-direction:column;align-items:center;justify-content:center;gap:14px;transition:opacity .6s}
#splash.out{opacity:0;pointer-events:none}
.sp-dn{font-family:var(--serif);font-size:84px;font-weight:400;color:var(--t0);letter-spacing:-4px;line-height:1;opacity:0;transform:translateY(10px);transition:opacity .6s,transform .6s}
.sp-dn.on{opacity:1;transform:none}
.sp-line{width:0;height:1px;background:var(--bdr2);transition:width .7s var(--ease) .4s}
.sp-line.on{width:70px}
.sp-sub{font-family:var(--serif);font-size:13px;font-style:italic;color:var(--t3);opacity:0;transition:opacity .5s .8s;letter-spacing:.5px}
.sp-sub.on{opacity:1}

/* ONBOARDING */
#onboarding{position:fixed;inset:0;z-index:9998;background:var(--bg);display:none;overflow-y:auto;-webkit-overflow-scrolling:touch}
#onboarding.show{display:block}
.ob-wrap{min-height:100%;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 28px 60px;max-width:420px;margin:0 auto}
.ob-logo{font-family:var(--serif);font-size:48px;font-weight:400;color:var(--t0);letter-spacing:-3px;margin-bottom:4px;line-height:1}
.ob-tagline{font-family:var(--serif);font-size:12px;font-style:italic;color:var(--t3);margin-bottom:36px;letter-spacing:.5px}
.ob-title{font-family:var(--serif);font-size:26px;font-weight:400;color:var(--t0);line-height:1.25;margin-bottom:10px;text-align:center}
.ob-desc{font-size:14.5px;color:var(--t2);line-height:1.65;text-align:center;margin-bottom:32px;max-width:310px}
.ob-features{display:flex;flex-direction:column;gap:12px;margin-bottom:36px;width:100%;max-width:310px}
.ob-feat{display:flex;align-items:flex-start;gap:12px}
.ob-feat-icon{width:34px;height:34px;border-radius:9px;background:var(--blue-bg);display:flex;align-items:center;justify-content:center;font-size:16px;flex-shrink:0}
.ob-feat-title{font-size:13.5px;font-weight:600;color:var(--t0);margin-bottom:1px}
.ob-feat-desc{font-size:12px;color:var(--t2);line-height:1.4}
.ob-lbl{font-size:11px;font-weight:600;color:var(--t2);text-transform:uppercase;letter-spacing:1px;margin-bottom:7px;align-self:flex-start;width:100%;max-width:310px}
.ob-inp{width:100%;max-width:310px;padding:13px 16px;background:var(--card);border:1.5px solid var(--bdr);border-radius:11px;font-family:var(--serif);font-size:19px;color:var(--t0);outline:none;text-align:center;transition:border-color .2s;-webkit-appearance:none;margin-bottom:12px}
.ob-inp:focus{border-color:var(--blue)}
.ob-inp::placeholder{color:var(--t3);font-style:italic}
.ob-q{font-size:17px;font-weight:600;color:var(--t0);margin-bottom:5px;text-align:center;line-height:1.3}
.ob-qsub{font-size:12.5px;color:var(--t2);margin-bottom:18px;text-align:center}
.ob-chips{display:flex;flex-wrap:wrap;gap:8px;justify-content:center;margin-bottom:28px;max-width:340px}
.ob-chip{padding:8px 15px;border-radius:100px;border:1.5px solid var(--bdr);background:var(--card);font-size:13px;font-weight:500;color:var(--t1);cursor:pointer;transition:all .15s;-webkit-user-select:none}
.ob-chip:active{transform:scale(.95)}
.ob-chip.sel{background:var(--blue);border-color:var(--blue);color:#fff}
.ob-prog{display:flex;gap:5px;margin-bottom:28px}
.ob-prog-dot{width:6px;height:6px;border-radius:50%;background:var(--bdr2);transition:background .3s}
.ob-prog-dot.act{background:var(--blue)}
.ob-step{font-family:var(--mono);font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:18px}
.ob-btn{width:100%;max-width:310px;padding:14px;background:var(--blue);color:#fff;border-radius:11px;font-size:15px;font-weight:600;letter-spacing:.1px;font-family:var(--sans);border:none;cursor:pointer;transition:opacity .15s}
.ob-btn:active{opacity:.85}
.ob-btn-sec{width:100%;max-width:310px;padding:11px;background:none;color:var(--blue);border-radius:11px;font-size:13.5px;font-weight:500;font-family:var(--sans);border:none;cursor:pointer;margin-top:4px}

/* HEADER */
.hdr{position:sticky;top:0;z-index:200;background:rgba(245,245,247,.92);backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr)}
.hdr-in{max-width:720px;margin:0 auto;padding:0 16px;height:50px;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-family:var(--serif);font-size:19px;font-weight:400;color:var(--t0)}
.hdr-logo span{font-size:11px;font-style:italic;opacity:.4;margin-left:4px}
.hdr-meta{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:.3px;text-transform:capitalize}
.hdr-btn{width:34px;height:34px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:4px;border-radius:8px;transition:background .15s}
.hdr-btn:hover{background:rgba(0,0,0,.06)}
.hdr-btn span{display:block;width:16px;height:1.5px;background:var(--t0);border-radius:2px}

/* SIDE */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:300;opacity:0;pointer-events:none;transition:opacity .22s}
.ovl.on{opacity:1;pointer-events:all}
.side{position:fixed;top:0;left:0;bottom:0;width:272px;background:var(--bg);z-index:400;border-right:1px solid var(--bdr);box-shadow:4px 0 20px rgba(0,0,0,.07);transform:translateX(-100%);transition:transform .3s var(--ease);display:flex;flex-direction:column}
.side.on{transform:translateX(0)}
.side-h{padding:18px 14px 12px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
.side-logo{font-family:var(--serif);font-size:16px;font-weight:400;color:var(--t0)}
.side-x{width:26px;height:26px;border-radius:6px;display:flex;align-items:center;justify-content:center;font-size:16px;color:var(--t2);background:rgba(0,0,0,.05)}
.side-b{flex:1;overflow-y:auto;padding:8px}
.side-profile{margin:6px 4px 2px;padding:12px;background:var(--card);border-radius:11px;box-shadow:var(--shadow-sm);cursor:pointer}
.sp-name{font-size:13.5px;font-weight:600;color:var(--t0)}
.sp-prefs{font-size:11px;color:var(--t2);margin-top:2px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.sp-edit{font-size:11px;color:var(--blue);margin-top:3px;font-weight:500}
.side-lbl{font-family:var(--mono);font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:var(--t3);padding:10px 8px 5px}
.side-day{display:block;width:100%;text-align:left;padding:9px 10px;border-radius:9px;margin-bottom:1px;color:var(--t2);transition:all .12s}
.side-day:hover,.side-day:active{background:rgba(0,0,0,.05);color:var(--t0)}
.side-day.act{background:var(--blue-bg);color:var(--blue)}
.sd-n{font-size:13px;font-weight:500}
.sd-d{font-family:var(--mono);font-size:9.5px;opacity:.5;margin-top:1px}
.side-f{padding:10px 12px;border-top:1px solid var(--bdr)}
.btn-rf{background:rgba(0,0,0,.06);color:var(--t1);padding:10px;border-radius:9px;font-size:12.5px;font-weight:500;width:100%;border:none;cursor:pointer;font-family:var(--sans)}

/* MAIN */
#listView{max-width:720px;margin:0 auto;padding:16px 16px 90px}

/* Date block */
.date-block{padding:18px 0 16px;border-bottom:1px solid var(--bdr);margin-bottom:0;text-align:center}
.date-greeting{font-family:var(--sans);font-size:14px;color:var(--t2);margin-bottom:6px;letter-spacing:.1px}
.date-greeting strong{color:var(--t0);font-weight:700}
.date-title{font-family:var(--sans);font-size:20px;font-weight:700;color:var(--t0);line-height:1.3;letter-spacing:-.3px;margin-top:0}

/* Chiffre du jour — strip */
.stat-strip{padding:14px 0;border-bottom:1px solid var(--bdr);display:flex;align-items:flex-start;gap:12px}
.stat-strip-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.stat-strip-body{flex:1}
.stat-strip-label{font-family:var(--mono);font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:var(--blue);margin-bottom:3px;font-weight:600}
.stat-strip-fact{font-size:13.5px;line-height:1.62;color:var(--t1)}
.stat-strip-src{font-family:var(--mono);font-size:8.5px;color:var(--t3);margin-top:2px}



.btn-collapse{display:none;width:100%;text-align:center;padding:7px;font-family:var(--mono);font-size:9px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);background:none;border:none;cursor:pointer;border-bottom:1px solid var(--bdr);margin-bottom:12px}
.art-card.open .btn-collapse{display:block}
/* Cards */
.art-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow);margin-bottom:10px;overflow:hidden;position:relative;transition:box-shadow .2s}
.art-card:hover{box-shadow:0 4px 20px rgba(0,0,0,.1)}
.art-accent{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:var(--r) 0 0 var(--r)}
.art-head{display:flex;align-items:flex-start;gap:12px;padding:14px 15px;cursor:pointer;-webkit-user-select:none;transition:background .12s}
.art-head:active{background:rgba(0,0,0,.03)}
.art-ico{width:38px;height:38px;border-radius:9px;display:flex;align-items:center;justify-content:center;font-size:17px;flex-shrink:0;margin-top:1px}
.art-r{flex:1;min-width:0}
.art-pill{display:inline-flex;align-items:center;gap:3px;padding:2px 8px 2px 6px;border-radius:100px;font-family:var(--sans);font-size:8px;letter-spacing:.3px;text-transform:uppercase;margin-bottom:6px;color:#fff;font-weight:600}
.art-dot{width:3px;height:3px;border-radius:50%;background:rgba(255,255,255,.55)}
.art-title{font-family:var(--sans);font-size:15px;font-weight:600;line-height:1.3;color:var(--t0);margin-bottom:4px;letter-spacing:-.2px}
.art-teaser{font-size:13px;color:var(--t2);line-height:1.55;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.art-foot{display:flex;align-items:center;justify-content:space-between;margin-top:7px}
.art-source{font-family:var(--mono);font-size:9px;color:var(--t3)}

.art-body{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(0,.4,.2,1)}
.art-card.open .art-body{max-height:700px}
.art-body-in{padding:13px 15px 16px;border-top:1px solid var(--bdr)}
.art-text{font-size:14px;line-height:1.82;color:var(--t1)}
.art-text p{margin-bottom:8px}.art-text p:last-child{margin-bottom:0}
.art-actions{display:flex;align-items:center;justify-content:space-between;margin-top:11px;padding-top:11px;border-top:1px solid var(--bdr)}
.btn-c{display:flex;align-items:center;gap:6px;padding:7px 16px;border-radius:100px;background:var(--blue);color:#fff;font-size:12px;font-weight:600;transition:opacity .15s}
.btn-c:active{opacity:.8}

/* Ephemeride */
.eph-block{padding:13px 0 15px;border-bottom:1px solid var(--bdr);margin-bottom:16px;display:flex;align-items:center;gap:12px}
.eph-dash{width:18px;height:1px;background:var(--bdr2);flex-shrink:0}
.eph-txt{font-family:var(--serif);font-size:13.5px;font-style:italic;color:var(--t1);line-height:1.55;text-align:center;flex:1}

/* M&A deals box */
.ma-block{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:16px 18px;margin-bottom:10px;position:relative;overflow:hidden;border-left:3px solid var(--blue)}
.ma-eye{font-family:var(--mono);font-size:8px;letter-spacing:2px;text-transform:uppercase;color:var(--blue);margin-bottom:7px;display:flex;align-items:center;gap:6px;font-weight:600}
.ma-txt{font-size:13.5px;line-height:1.65;color:var(--t1)}
/* Savais-tu */
.bonus-block{padding:14px 0;border-top:1px solid var(--bdr);display:flex;align-items:flex-start;gap:12px;margin-top:8px}
.bonus-icon{font-size:20px;flex-shrink:0;margin-top:1px}
.bonus-body{flex:1}
.bonus-eye{font-family:var(--mono);font-size:8.5px;letter-spacing:2px;text-transform:uppercase;color:var(--violet);margin-bottom:3px;font-weight:600}
.bonus-txt{font-family:var(--serif);font-size:14px;font-style:italic;color:var(--t1);line-height:1.65}

/* Footer */
.list-foot{display:flex;align-items:center;justify-content:space-between;padding:14px 0;border-top:1px solid var(--bdr);margin-top:6px}
.foot-brand{font-family:var(--serif);font-size:12px;color:var(--t2)}
.foot-meta{font-family:var(--mono);font-size:8.5px;color:var(--t3)}

/* Loader */
.loader{display:flex;flex-direction:column;align-items:center;padding:60px 0;gap:13px}
.loader-d{display:flex;gap:6px}
.ld{width:6px;height:6px;border-radius:50%;background:var(--t0);animation:ldp 1.3s ease infinite}
.ld:nth-child(2){animation-delay:.18s}.ld:nth-child(3){animation-delay:.36s}
@keyframes ldp{0%,100%{opacity:.1;transform:scale(.6)}50%{opacity:.6;transform:scale(1)}}
.loader-t{font-family:var(--mono);font-size:9.5px;letter-spacing:2px;text-transform:uppercase;color:var(--t3)}

/* Error */
.err-card{background:var(--card);border-radius:var(--r);box-shadow:var(--shadow-sm);padding:22px;text-align:center;margin:16px 0}
.err-card p{font-size:13.5px;color:var(--t2);line-height:1.65;margin-bottom:13px;white-space:pre-wrap;word-break:break-word}
.btn-retry{background:var(--blue);color:#fff;padding:8px 18px;border-radius:8px;font-size:13px;font-weight:600;cursor:pointer;font-family:var(--sans);border:none}

@keyframes rv{from{opacity:0;transform:translateY(8px)}to{opacity:1;transform:translateY(0)}}
.rv{animation:rv .4s var(--ease) both}

/* Detail */
#detailView{position:fixed;inset:0;z-index:500;background:var(--bg);overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateX(100%);transition:transform .35s var(--ease)}
#detailView.open{transform:translateX(0)}
.det-hdr{position:sticky;top:0;background:rgba(245,245,247,.92);backdrop-filter:blur(20px);border-bottom:1px solid var(--bdr);display:flex;align-items:center;padding:0 16px;height:50px;z-index:10}
.btn-bk{display:flex;align-items:center;gap:5px;font-size:13.5px;font-weight:500;color:var(--blue)}
.btn-bk svg{width:15px;height:15px}
.det-body{max-width:720px;margin:0 auto;padding:22px 16px 90px}
.det-cat{display:inline-flex;align-items:center;gap:4px;padding:3px 10px 3px 8px;border-radius:100px;font-family:var(--sans);font-size:8.5px;letter-spacing:.3px;text-transform:uppercase;margin-bottom:12px;color:#fff;font-weight:600}
.det-title{font-family:var(--serif);font-size:28px;font-weight:400;line-height:1.2;color:var(--t0);letter-spacing:-.3px;margin-bottom:12px}
.det-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:7px;padding-bottom:16px;border-bottom:1px solid var(--bdr);margin-bottom:20px}
.det-source{font-family:var(--mono);font-size:8.5px;color:var(--t3);letter-spacing:.3px;text-transform:uppercase}
.det-link{font-family:var(--mono);font-size:9px;color:var(--blue)}
.det-analysis{border-top:1px solid var(--bdr);padding-top:18px}
.an-sec{margin-bottom:18px}
.an-hdr{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.an-e{font-size:13px}
.an-l{font-family:var(--sans);font-size:9.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t2);font-weight:600}
.an-r{flex:1;height:1px;background:var(--bdr)}
.an-t{font-size:14.5px;line-height:1.8;color:var(--t1)}

/* Chat FAB — toujours visible apres onboarding */
.chat-fab{position:fixed;bottom:24px;right:18px;z-index:600;width:50px;height:50px;border-radius:50%;background:var(--blue);display:flex;align-items:center;justify-content:center;box-shadow:0 4px 16px rgba(0,113,227,.35);transition:transform .2s,opacity .2s;opacity:0;pointer-events:none}
.chat-fab.vis{opacity:1;pointer-events:all}
.chat-fab:active{transform:scale(.92)}

/* Chat */
.chat-ovl{position:fixed;inset:0;background:rgba(0,0,0,.25);z-index:700;opacity:0;pointer-events:none;transition:opacity .25s}
.chat-ovl.on{opacity:1;pointer-events:all}
.chat-panel{position:fixed;left:0;right:0;bottom:0;z-index:800;background:var(--bg);border-radius:20px 20px 0 0;border-top:1px solid var(--bdr);max-height:80vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .32s var(--ease);box-shadow:0 -4px 24px rgba(0,0,0,.08)}
.chat-panel.on{transform:translateY(0)}
.chat-handle{width:34px;height:4px;background:var(--bdr2);border-radius:2px;margin:10px auto 0;flex-shrink:0}
.chat-hdr{padding:11px 15px;border-bottom:1px solid var(--bdr);flex-shrink:0;display:flex;align-items:center;justify-content:space-between}
.chat-htitle{display:flex;align-items:center;gap:7px;font-size:13.5px;font-weight:600;color:var(--t0)}
.chat-av{width:22px;height:22px;background:var(--blue);border-radius:50%;display:flex;align-items:center;justify-content:center;font-family:var(--serif);font-size:11px;font-weight:600;color:#fff;flex-shrink:0}
.chat-hs{font-family:var(--mono);font-size:9px;color:var(--t3);margin-top:1px;max-width:200px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.chat-hx{font-size:17px;color:var(--t2);width:26px;height:26px;display:flex;align-items:center;justify-content:center}
.chat-msgs{flex:1;overflow-y:auto;padding:11px 13px;display:flex;flex-direction:column;gap:7px;-webkit-overflow-scrolling:touch}
.cm{padding:9px 12px;border-radius:13px;font-size:13.5px;line-height:1.58;max-width:86%}
.cm.u{background:var(--blue);color:#fff;align-self:flex-end;border-radius:13px 13px 3px 13px}
.cm.a{background:var(--card);color:var(--t1);align-self:flex-start;border-radius:13px 13px 13px 3px;box-shadow:var(--shadow-sm)}
.cm-lbl{font-family:var(--mono);font-size:7.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:2px;padding-left:2px}
.thinking{display:flex;align-items:center;gap:4px;padding:10px 13px;background:var(--card);border-radius:13px 13px 13px 3px;box-shadow:var(--shadow-sm);align-self:flex-start}
.thinking-dot{width:5px;height:5px;border-radius:50%;background:var(--t3);animation:tdot 1.2s ease infinite}
.thinking-dot:nth-child(2){animation-delay:.2s}.thinking-dot:nth-child(3){animation-delay:.4s}
@keyframes tdot{0%,100%{opacity:.3;transform:scale(.7)}50%{opacity:1;transform:scale(1)}}
.chat-irow{display:flex;align-items:flex-end;gap:7px;padding:9px 11px 16px;border-top:1px solid var(--bdr);flex-shrink:0}

<script>
'use strict';
const APP_VER='v4';
const NOW=new Date();
const DAYS=['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
const MONTHS=['janvier','fevrier','mars','avril','mai','juin','juillet','aout','septembre','octobre','novembre','decembre'];
const MONTHS_FR=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const DATE_FR=DAYS[NOW.getDay()]+' '+NOW.getDate()+' '+MONTHS_FR[NOW.getMonth()]+' '+NOW.getFullYear();
function fmtKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
const TODAY=fmtKey(NOW);
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}
function getName(){return localStorage.getItem('dn_name')||''}
function getProfile(){try{return JSON.parse(localStorage.getItem('dn_profile'))||{}}catch{return{}}}
function saveProfile(p){localStorage.setItem('dn_profile',JSON.stringify(p))}

const CATS={

  business:{l:'Business',c:'#34C759',e:'💼'},
  tech:{l:'Tech',c:'#AF52DE',e:'⚡'},
  politique:{l:'Politique',c:'#FF3B30',e:'🏛'},
  football:{l:'Football',c:'#FF9500',e:'⚽'},

  f1:{l:'Formule 1',c:'#E30019',e:'🏎'},
  basketball:{l:'Basketball',c:'#FF6B00',e:'🏀'},
  cyclisme:{l:'Cyclisme',c:'#34C759',e:'🚴'},
  rugby:{l:'Rugby',c:'#5856D6',e:'🏉'},
  sport:{l:'Sport',c:'#FF9500',e:'⚽'},
  culture:{l:'Culture',c:'#FF2D55',e:'🎭'},
  monde:{l:'Le Monde',c:'#007AFF',e:'🌍'},

let brief=null,chatCtx='',chatHist=[],activeDay=TODAY;

// STORAGE
function gc(k){try{const d=JSON.parse(localStorage.getItem('sd_'+k));return(d&&Array.isArray(d.articles)&&d.articles.length>0)?d:null}catch{return null}}
function sc(k,v){try{localStorage.setItem('sd_'+k,JSON.stringify(v))}catch{}}

// ONBOARDING
const OBQ=[
  {id:'interests',q:'Quels sujets t\'interessent ?',sub:'Plusieurs choix possibles',multi:true,
   opts:['Business & Finance','M&A / Finance entreprise','Tech & IA','Politique','Sport','Culture & Arts','Science','Crypto','Sante','Environnement']},
  {id:'profile',q:'Ton profil ?',sub:'Un seul choix',multi:false,
   opts:['Entrepreneur','Salarie en entreprise','Etudiant','Financier / Investisseur','Independant','Curieux']},
  {id:'sector',q:'Ton secteur de predilection ?',sub:'Plusieurs choix possibles',multi:true,
   opts:['Finance & Marches','Startups & Innovation','Luxe & Mode','Medias','Industrie & Energie','Sante & Biotech','Aucun en particulier']},
  {id:'mustread',q:'Ce que tu ne veux jamais rater ?',sub:'Plusieurs choix possibles',multi:true,
   opts:['Football','Tennis','F1','Basketball','Cinema','Musique','Gastronomie','Mode','Aucun']}
];
let obStep=0,obData={};

function startOnboarding(edit){
  obStep=edit?1:0;obData=edit?{...getProfile()}:{};
  document.getElementById('onboarding').classList.add('show');
  renderOb();
}
function closeOnboarding(){document.getElementById('onboarding').classList.remove('show')}

function renderOb(){
  const sc=document.getElementById('obScreen');
  if(obStep===0){
    sc.innerHTML='<div class="ob-logo">DN</div><div class="ob-tagline">Daily News by Sam</div>'
      +'<div class="ob-title">Ton brief quotidien en 5 minutes</div>'
      +'<div class="ob-desc">L\'essentiel de l\'actualite mondiale chaque matin, selectionne selon tes interets.</div>'
      +'<div class="ob-features">'
      +'<div class="ob-feat"><div class="ob-feat-icon">📊</div><div><div class="ob-feat-title">Marches en temps reel</div><div class="ob-feat-desc">CAC 40, Wall Street, Brent, EUR/USD chaque matin</div></div></div>'
      +'<div class="ob-feat"><div class="ob-feat-icon">🔍</div><div><div class="ob-feat-title">Comprendre en profondeur</div><div class="ob-feat-desc">Contexte, impact et perspectives pour chaque article</div></div></div>'
      +'<div class="ob-feat"><div class="ob-feat-icon">💬</div><div><div class="ob-feat-title">Demander a Sam</div><div class="ob-feat-desc">Notre IA repond a tes questions en temps reel</div></div></div>'
      +'</div>'
      +'<button class="ob-btn" onclick="obNext()">Commencer →</button>';
  } else if(obStep===1){
    sc.innerHTML='<div class="ob-prog">'+OBQ.map((_,i)=>'<div class="ob-prog-dot'+(i===0?' act':'')+'"></div>').join('')+'</div>'
      +'<div class="ob-step">Etape 1 / '+(OBQ.length+1)+'</div>'
      +'<div class="ob-title">Comment tu t\'appelles ?</div>'
      +'<div class="ob-desc" style="margin-bottom:22px">Pour personnaliser ton experience</div>'
      +'<span class="ob-lbl">Prenom</span>'
      +'<input class="ob-inp" id="obInp" type="text" placeholder="Ton prenom" maxlength="30" autocomplete="given-name" value="'+esc(getName())+'">'
      +'<button class="ob-btn" onclick="obSaveName()">Continuer →</button>';
    setTimeout(()=>document.getElementById('obInp')?.focus(),300);
    document.getElementById('obInp')?.addEventListener('keydown',e=>{if(e.key==='Enter')obSaveName()});
  } else {
    const qi=obStep-2;
    if(qi>=OBQ.length){saveProfile(obData);closeOnboarding();updateSideProfile();localStorage.removeItem('sd_'+activeDay);init();return}
    const q=OBQ[qi];const sel=obData[q.id]||[];
    const dots=OBQ.map((_,i)=>'<div class="ob-prog-dot'+(i<=qi?' act':'')+'"></div>').join('');
    sc.innerHTML='<div class="ob-prog">'+dots+'</div>'
      +'<div class="ob-step">Etape '+(obStep)+' / '+(OBQ.length+1)+'</div>'
      +'<div class="ob-q">'+q.q+'</div><div class="ob-qsub">'+q.sub+'</div>'
      +'<div class="ob-chips" id="obChips">'+q.opts.map(o=>'<div class="ob-chip'+(sel.includes(o)?' sel':'')+'" onclick="obToggle(\''+q.id+'\',\''+o+'\','+q.multi+')">'+o+'</div>').join('')+'</div>'
      +'<button class="ob-btn" onclick="obNext()">Continuer →</button>'
      +'<button class="ob-btn-sec" onclick="obNext()">Passer</button>';
  }
}
function obToggle(id,val,multi){
  if(!obData[id])obData[id]=[];
  if(multi){const i=obData[id].indexOf(val);if(i>=0)obData[id].splice(i,1);else obData[id].push(val);}
  else obData[id]=[val];
  const q=OBQ.find(q=>q.id===id);const sel=obData[id]||[];
  const chips=document.getElementById('obChips');
  if(chips)chips.innerHTML=q.opts.map(o=>'<div class="ob-chip'+(sel.includes(o)?' sel':'')+'" onclick="obToggle(\''+id+'\',\''+o+'\','+multi+')">'+o+'</div>').join('');
}
function obSaveName(){const v=(document.getElementById('obInp')?.value||'').trim();if(!v){document.getElementById('obInp').style.borderColor='var(--red)';return}localStorage.setItem('dn_name',v);obStep++;renderOb()}
function obNext(){obStep++;renderOb()}
function editProfile(){closeMenu();startOnboarding(true)}

// SPLASH
function runSplash(cb){
  setTimeout(()=>document.getElementById('spDN').classList.add('on'),200);
  setTimeout(()=>document.getElementById('spLine').classList.add('on'),500);
  setTimeout(()=>document.getElementById('spSub').classList.add('on'),800);
  setTimeout(()=>{document.getElementById('splash').classList.add('out');setTimeout(cb,450)},2200);
}

// MIDNIGHT
function scheduleMidnight(){
  const now=new Date(),mid=new Date(now);mid.setDate(mid.getDate()+1);mid.setHours(0,0,10,0);
  setTimeout(()=>{Object.keys(localStorage).filter(k=>k.startsWith('sd_20')).sort().slice(0,-3).forEach(k=>localStorage.removeItem(k));location.reload()},mid-now);
}

// MENU
function openMenu(){renderMenu();document.getElementById('side').classList.add('on');document.getElementById('ovl').classList.add('on')}
function closeMenu(){document.getElementById('side').classList.remove('on');document.getElementById('ovl').classList.remove('on')}
function forceRefresh(){localStorage.removeItem('sd_'+activeDay);closeMenu();init()}
function updateSideProfile(){
  const name=getName(),p=getProfile();
  document.getElementById('sideProfileName').textContent=name?('Bonjour, '+name):'Mon profil';

  let h='<div class="side-lbl">Historique</div>';
  for(let i=0;i<7;i++){
    const d=new Date();d.setDate(d.getDate()-i);

    const lbl=i===0?"Aujourd'hui":i===1?"Hier":DAYS[d.getDay()]+' '+d.getDate();
    if(i===0||gc(k))h+='<button class="side-day'+(k===activeDay?' act':'')+'" onclick="switchDay(\''+k+'\');closeMenu()"><div class="sd-n">'+lbl+'</div><div class="sd-d">'+DAYS[d.getDay()]+' '+d.getDate()+' '+MONTHS_FR[d.getMonth()]+'</div></button>';
  }

}
function switchDay(k){activeDay=k;const c=gc(k);if(c){brief=c;renderList(c)}else if(k===TODAY)init();else setList('<div class="err-card"><p>Brief non disponible.</p></div>')}

// FETCH MARKETS
async function fetchMarkets(){
  try{
    const res=await fetch('https://daily-news-proxy.vercel.app/api/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:300,enable_search:true,messages:[{role:'user',content:'Date: '+DATE_FR+' (2026). En francais: resume des marches financiers du jour en 3-4 phrases. Inclus CAC 40 (% et niveau), Wall Street (S&P 500/Nasdaq), Brent, EUR/USD. Cite 1-2 valeurs qui ont particulierement bouge ce jour ou qui publient leurs resultats prochainement. Direct, precis.'}]})});
    const data=await res.json();
    return(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('')||null;
  }catch{return null}
}

// FETCH NEWS
async function fetchGuardian(){
  const secs=['business','technology','world','sport','culture','science','us-news','money'];
  const res=await Promise.allSettled(secs.map(async s=>{
    const r=await fetch('https://content.guardianapis.com/search?section='+s+'&order-by=newest&page-size=4&show-fields=trailText&api-key=test',{signal:AbortSignal.timeout(8000)});
    const d=await r.json();
    return(d.response?.results||[]).map(a=>({title:a.webTitle,desc:(a.fields?.trailText||'').replace(/<[^>]+>/g,'').slice(0,400),link:a.webUrl,source:'The Guardian'})).filter(a=>a.title&&a.link?.startsWith('https'));
  }));
  return res.filter(r=>r.status==='fulfilled').flatMap(r=>r.value);
}
async function fetchHN(){
  try{
    const r=await fetch('https://hacker-news.firebaseio.com/v1/topstories.json',{signal:AbortSignal.timeout(5000)});
    const ids=await r.json();
    const s=await Promise.allSettled(ids.slice(0,20).map(id=>fetch('https://hacker-news.firebaseio.com/v1/item/'+id+'.json',{signal:AbortSignal.timeout(4000)}).then(r=>r.json())));
    return s.filter(r=>r.status==='fulfilled'&&r.value?.url?.startsWith('https')&&r.value.score>80).map(r=>({title:r.value.title,desc:'',link:r.value.url,source:'Hacker News'})).slice(0,6);
  }catch{return[]}
}
const FR=[
  {url:'https://www.lemonde.fr/rss/une.xml',name:'Le Monde'},
  {url:'https://www.bfmtv.com/rss/economie/',name:'BFM Business'},
  {url:'https://www.lefigaro.fr/rss/figaro_actualites.xml',name:'Le Figaro'},
  {url:'https://www.latribune.fr/rss/une.xml',name:'La Tribune'},
  {url:'https://techcrunch.com/feed/',name:'TechCrunch'},
  {url:'https://feeds.bbci.co.uk/news/business/rss.xml',name:'BBC Business'},
  {url:'https://www.frenchweb.fr/feed',name:'Frenchweb'},
  {url:'https://www.capital.fr/rss',name:'Capital'},
  {url:'https://www.lefigaro.fr/rss/figaro_sports.xml',name:'Le Figaro Sport'}
];
function cx(s){return(s||'').replace(/<!\[CDATA\[/g,'').replace(/\]\]>/g,'').replace(/<[^>]+>/g,' ').replace(/&[a-z#0-9]+;/g,' ').replace(/\s+/g,' ').trim()}
async function fetchFeed(src){
  try{
    const r=await fetch('https://daily-news-proxy.vercel.app/api/rss?url='+encodeURIComponent(src.url),{signal:AbortSignal.timeout(9000)});
    const raw=await r.text();
    const xml=new DOMParser().parseFromString(raw,'text/xml');
    if(xml.querySelector('parsererror'))return[];
    return Array.from(xml.querySelectorAll('item')).slice(0,5).map(item=>{
      const title=cx(item.querySelector('title')?.textContent||'');
      const desc=cx(item.querySelector('description')?.textContent||'').slice(0,400);
      let link=(item.querySelector('link')?.textContent||'').trim()||(item.querySelector('guid')?.textContent||'').trim();
      return{title,desc,link,source:src.name};
    }).filter(a=>a.title.length>5&&a.link.startsWith('https')&&!a.link.includes('example'));
  }catch{return[]}
}
async function fetchAll(){
  const[g,...feeds]=await Promise.allSettled([fetchGuardian(),...FR.map(fetchFeed)]);
  const all=[...feeds.filter(r=>r.status==='fulfilled').flatMap(r=>r.value),...(g.status==='fulfilled'?g.value:[])];
  const seen=new Set();
  return all.filter(a=>{if(!a.link||seen.has(a.link))return false;seen.add(a.link);return true});
}

// JSON
function safeJSON(raw){
  const m=raw.match(/\{[\s\S]*\}/);if(!m)return null;
  let s=m[0].replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g,'');
  try{return JSON.parse(s)}catch{
    const last=s.lastIndexOf('}');
    if(last>100){let t=s.slice(0,last+1);const oa=(t.match(/\[/g)||[]).length-(t.match(/\]/g)||[]).length;const ob=(t.match(/\{/g)||[]).length-(t.match(/\}/g)||[]).length;for(let i=0;i<oa;i++)t+=']';for(let i=0;i<ob;i++)t+='}';try{return JSON.parse(t)}catch{}}
    return null;
  }
}

// GENERATE
function buildSYS(){
  const p=getProfile(),name=getName();
  let pers='';
  if(p.interests?.length)pers+='Interets: '+p.interests.join(', ')+'. ';
  if(p.profile?.length)pers+='Profil: '+p.profile[0]+'. ';
  if(p.sector?.length&&!p.sector.includes('Aucun en particulier'))pers+='Secteurs: '+p.sector.join(', ')+'. ';
  if(p.mustread?.length&&!p.mustread.includes('Aucun'))pers+='A ne pas rater: '+p.mustread.join(', ')+'. ';
  const recent=[];
  for(let i=1;i<=3;i++){const d=new Date();d.setDate(d.getDate()-i);const c=gc(fmtKey(d));if(c?.articles)c.articles.forEach(a=>recent.push(a.titre))}
  const recentStr=recent.length?`\nSujets deja couverts ces 3 derniers jours (evite la repetition sauf avancee majeure): ${recent.slice(0,12).join(' | ')}`:'';
  return `Tu es editeur d'un morning brief pour un public francais. Date: ${DATE_FR} (2026).
${name?'Lecteur: '+name+'. ':''}${pers}
REGLES GEOGRAPHIQUES STRICTES:
- INCLURE: France, Union Europeenne (politiques EU, BCE), USA, Chine, conflits ou accords a impact mondial
- EXCLURE: politique interieure UK (Starmer, scandales britanniques), politique interieure d'un pays qui n'est pas la France/USA/Chine, chomage ou stats d'un seul pays non-France, faits divers, meteo
- OBLIGATION: au moins 1 article sur la France ou impliquant directement la France (hors sport)
${recentStr}
SOURCES: varie les sources - evite que tous les articles viennent de The Guardian. Privilege Les Echos, BFM, Le Figaro, L'Equipe pour la France.
JSON valide, commence par {: {"titre":"titre de presse accrocheur 8-12 mots, UN seul sujet principal clair","bourse":"resume marches du jour 3-4 phrases: CAC40, Wall Street, Brent, EURUSD + 1-2 valeurs qui ont bouge (utilise les donnees marches fournies)","ephemeride":"fait historique fascinant sur cette date","stat":{"fait":"stat insolite et memorable non-actualite (prix m2 Monaco, nb piscines privees France, salaire astronaute NASA...)","source":"si connue"},"articles":[{"section":"economie|business|tech|politique|football|tennis|f1|basketball|cyclisme|rugby|culture|monde|science","emoji":"string","titre":"string","teaser":"1 phrase","contenu":"5 phrases","source":"media","lien":"URL_SOURCE"}],"ma":"SI et SEULEMENT SI une grande transaction M&A, IPO, LBO, OPA ou fusion majeure est annoncee ce jour: 2 phrases dessus. Sinon: null","savais":"1 phrase courte, simple et amusante sur la science, le corps humain, les animaux, la geographie ou l'histoire. Accessible a tous, sans jargon, sans politique. Ex: Les pieuvres ont 3 coeurs et un sang bleu. Ou: La tour Eiffel grandit de 15 cm en ete a cause de la dilatation thermique."}
Selectionne EXACTEMENT 5 articles. Hierarchie: 1) France (business/eco/politique, OBLIGATOIRE) 2) Business/Tech international 3) Politique EU ou USA 4) International (Chine/conflits) 5) Sport max 1 (section = type exact: football/tennis/f1/basketball, jamais le mot sport). Culture si exceptionnel.`;
}

async function generateBrief(articles,marketsData){
  const valid=articles.filter(a=>a.link?.startsWith('https')&&!a.link.includes('example.com'));
  if(valid.length<3)throw new Error(valid.length+' articles charges. Verifiez votre connexion.');
  const list=valid.slice(0,26).map((a,i)=>'['+(i+1)+'] '+a.source+'\nTitre: '+a.title+(a.desc?'\nDesc: '+a.desc:'')+'\nURL_SOURCE: '+a.link).join('\n\n');
  const mktCtx=marketsData?'\nDONNEES MARCHES DU JOUR (utilise pour le champ bourse): '+marketsData:'\nPas de donnees marches disponibles - genere le champ bourse avec des donnees approximatives si possible';
  const res=await fetch('https://daily-news-proxy.vercel.app/api/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:3000,system:buildSYS(),messages:[{role:'user',content:valid.length+' articles du '+DATE_FR+':'+mktCtx+'\n\n'+list+'\n\nJSON:'}]})});
  if(!res.ok){const t=await res.text();throw new Error('API '+res.status+':\n'+t.slice(0,200))}
  const data=await res.json();if(data.error)throw new Error(data.error.message);
  const raw=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
  const parsed=safeJSON(raw);if(!parsed)throw new Error('Reponse invalide.\n'+raw.slice(0,200));
  if(parsed.articles)parsed.articles=parsed.articles.filter(a=>a.lien?.startsWith('https')&&!a.lien.includes('example'));
  if(!parsed.articles?.length)throw new Error('Aucun article valide.');
  return parsed;
}

// RENDER
function setList(h){document.getElementById('listView').innerHTML=h}
function loader(t){setList('<div class="loader"><div style="font-family:var(--serif);font-size:40px;color:var(--t0);opacity:.5;letter-spacing:-2px;margin-bottom:8px">DN</div><div class="loader-d"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div><div class="loader-t">'+t+'</div></div>')}

async function init(){
  const cached=gc(activeDay);
  if(cached){brief=cached;renderList(cached);return}
  loader('Chargement des sources');
  const timeout=setTimeout(()=>setList('<div class="err-card"><p>Connexion trop lente.</p><button class="btn-retry" onclick="init()">Reessayer</button></div>'),45000);
  try{
    const[arts,markets]=await Promise.all([fetchAll(),fetchMarkets()]);
    loader('Generation du brief');
    const b=await generateBrief(arts,markets);
    clearTimeout(timeout);b._date=activeDay;sc(activeDay,b);brief=b;renderList(b);
  }catch(e){clearTimeout(timeout);setList('<div class="err-card"><p>'+esc(e.message)+'</p><button class="btn-retry" onclick="init()">Reessayer</button></div>')}
}

function renderList(b){
  const arts=b.articles||[];
  const name=getName();

  // Sort: sport last
  const sportCats=['football','tennis','f1','basketball','cyclisme','rugby','sport'];
  arts.sort((a,b)=>{const as=sportCats.includes((a.section||'').toLowerCase());const bs=sportCats.includes((b.section||'').toLowerCase());return as===bs?0:as?1:-1});
  const dayFull=DAYS[NOW.getDay()].charAt(0).toUpperCase()+DAYS[NOW.getDay()].slice(1)+' '+NOW.getDate()+' '+MONTHS_FR[NOW.getMonth()];
  let h='<div class="date-block rv">'
    +'<div class="date-greeting">'+(name?'Salut '+esc(name)+', ':'')+'aujourd\'hui on est le '+esc(dayFull)+'</div>'
    +'<div class="date-title">'+esc(b.titre||'')+'</div>'
    +'</div>';
  // Ephemeride en italique gris
  if(b.ephemeride)h+='<div class="eph-block rv" style="animation-delay:.03s"><div class="eph-dash"></div><div class="eph-txt">'+esc(b.ephemeride)+'</div><div class="eph-dash"></div></div>';
  // Chiffre du jour
  if(b.stat)h+='<div class="stat-strip rv" style="animation-delay:.05s"><div class="stat-strip-icon">🔢</div><div class="stat-strip-body"><div class="stat-strip-label">Le chiffre du jour</div><div class="stat-strip-fact">'+esc(b.stat.fait||'')+'</div>'+(b.stat.source?'<div class="stat-strip-src">'+esc(b.stat.source)+'</div>':'')+'</div></div>';
  // Bourse — meme format que chiffre du jour
  if(b.bourse)h+='<div class="stat-strip rv" style="animation-delay:.07s"><div class="stat-strip-icon">📊</div><div class="stat-strip-body"><div class="stat-strip-label">Marches du jour</div><div class="stat-strip-fact">'+esc(b.bourse)+'</div></div></div>';
  // M&A deals box (optionnel)
  if(b.ma)h+='<div class="ma-block rv" style="animation-delay:.09s"><div class="ma-eye">🏦 M&A / Deals</div><div class="ma-txt">'+esc(b.ma)+'</div></div>';
  // Articles (sport en dernier)
  arts.forEach((a,i)=>{
    const cat=getC(a.section);
    h+='<div class="art-card rv" id="ac'+i+'" style="animation-delay:'+(0.1+i*0.05)+'s">'
      +'<div class="art-accent" style="background:'+cat.c+'"></div>'
      +'<div class="art-head" onclick="toggleCard('+i+')">'
        +'<div class="art-ico" style="background:'+cat.c+'18">'+cat.e+'</div>'
        +'<div class="art-r">'
          +'<span class="art-pill" style="background:'+cat.c+'"><span class="art-dot"></span>'+esc(cat.l)+'</span>'
          +'<div class="art-title">'+esc(a.titre||'')+'</div>'
          +'<div class="art-teaser">'+esc(a.teaser||'')+'</div>'
        +'</div>'
      +'</div>'
      +'<div class="art-body" id="ab'+i+'">'
        +'<div class="art-body-in">'
          +'<button class="btn-collapse" onclick="toggleCard('+i+')">↑ Réduire</button>'
          +'<div class="art-text"><p>'+esc(a.contenu||'')+'</p></div>'
          +'<div class="art-actions">'
            +'<button class="btn-c" onclick="openDetail('+i+')">'
              +'<svg width="11" height="11" viewBox="0 0 11 11" fill="none"><circle cx="5.5" cy="5.5" r="4.5" stroke="white" stroke-width="1.3"/><path d="M5.5 3.5v3M5.5 8v.3" stroke="white" stroke-width="1.3" stroke-linecap="round"/></svg>Comprendre'
            +'</button>'
          +'</div>'
        +'</div>'
      +'</div>'
    +'</div>';
  });
  if(b.savais)h+='<div class="stat-strip rv" style="animation-delay:'+(0.1+arts.length*0.05)+'s;border-top:1px solid var(--bdr);margin-top:8px"><div class="stat-strip-icon">💡</div><div class="stat-strip-body"><div class="stat-strip-label">Le savais-tu ?</div><div class="stat-strip-fact" style="font-style:italic;font-family:var(--serif);font-size:15px">'+esc(b.savais)+'</div></div></div>';
  h+='<div class="list-foot"><span class="foot-brand">Daily News <em style="font-size:10px;opacity:.4">by Sam</em></span><span class="foot-meta">'+arts.length+' sources · '+NOW.toLocaleDateString('fr-FR')+'</span></div>';
  setList(h);
  // Show FAB
  chatCtx='Brief du '+DATE_FR+': '+arts.map(a=>a.titre).join(', ');
  document.getElementById('chatFab').classList.add('vis');
  const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');obs.unobserve(e.target)}})},{threshold:.06});
  document.querySelectorAll('.rv').forEach(el=>obs.observe(el));
}

// CARD
function toggleCard(i){
  const card=document.getElementById('ac'+i);const body=document.getElementById('ab'+i);
  const open=card.classList.contains('open');
  document.querySelectorAll('.art-card.open').forEach(c=>{c.classList.remove('open');const b=c.querySelector('.art-body');if(b)b.style.maxHeight='0'});
  if(!open){card.classList.add('open');body.style.maxHeight=body.scrollHeight+'px';setTimeout(()=>{if(card.classList.contains('open'))body.style.maxHeight=body.scrollHeight+'px'},60)}
}

// DETAIL
const ASYS='Tu es journaliste expert. Date: '+DATE_FR+' (2026). JSON uniquement, commence par {. {"sections":[{"emoji":"string","titre":"string","texte":"4-5 phrases claires"}]} 4 sections: 1=Contexte 2=Ce qui s\'est passe 3=Impact 4=A surveiller. En francais, accessible.';
function openDetail(i){
  if(!brief?.articles)return;
  const a=brief.articles[i];if(!a)return;
  chatCtx='"'+a.titre+'" ('+a.source+'). '+a.contenu;chatHist=[];
  document.getElementById('chatSub').textContent=(a.titre||'').slice(0,42)+'...';
  document.getElementById('chatMsgs').innerHTML='';
  const cat=getC(a.section);const hasLink=a.lien?.startsWith('https')&&!a.lien.includes('example');
  document.getElementById('detBody').innerHTML='<div class="det-cat" style="background:'+cat.c+'">'+cat.e+' '+esc(cat.l)+'</div>'
    +'<div class="det-title">'+esc(a.titre||'')+'</div>'
    +'<div class="det-meta"><span class="det-source">'+esc(a.source||'')+'</span>'+(hasLink?'<a href="'+a.lien+'" target="_blank" rel="noopener" class="det-link">Lire l\'article ↗</a>':'')+'</div>'
    +'<div class="det-analysis" id="detAnn"><div class="loader" style="padding:24px 0"><div class="loader-d"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div><div class="loader-t">Analyse</div></div></div>';
  document.getElementById('detailView').classList.add('open');
  document.body.style.overflow='hidden';
  document.getElementById('detailView').scrollTop=0;
  const cached=gc('det_'+activeDay+'_'+i);
  if(cached)renderAnn(cached);else genAnn(a,i);
}
function closeDetail(){document.getElementById('detailView').classList.remove('open');closeChat();document.body.style.overflow='';if(brief?.articles)chatCtx='Brief du '+DATE_FR+': '+brief.articles.map(a=>a.titre).join(', ')}
async function genAnn(a,i){
  try{
    const res=await fetch('https://daily-news-proxy.vercel.app/api/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1200,system:ASYS,messages:[{role:'user',content:'Article: "'+a.titre+'". '+a.contenu+'. Source: '+a.source+'. JSON:'}]})});
    if(!res.ok)throw new Error('API '+res.status);
    const data=await res.json();if(data.error)throw new Error(data.error.message);
    const raw=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const det=safeJSON(raw);if(!det)throw new Error('JSON invalide');
    sc('det_'+activeDay+'_'+i,det);renderAnn(det);
  }catch(e){const el=document.getElementById('detAnn');if(el)el.innerHTML='<div class="err-card" style="margin:0"><p>'+esc(e.message)+'</p></div>'}
}
function renderAnn(det){
  const el=document.getElementById('detAnn');if(!el)return;
  el.innerHTML=(det.sections||[]).map(s=>'<div class="an-sec"><div class="an-hdr"><span class="an-e">'+s.emoji+'</span><span class="an-l">'+esc(s.titre)+'</span><div class="an-r"></div></div><div class="an-t">'+esc(s.texte)+'</div></div>').join('');
}

// CHAT
function openChat(){document.getElementById('chatOvl').classList.add('on');document.getElementById('chatPanel').classList.add('on');setTimeout(()=>document.getElementById('chatInp').focus(),350)}
function closeChat(){document.getElementById('chatOvl').classList.remove('on');document.getElementById('chatPanel').classList.remove('on')}
function autoR(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,86)+'px'}
function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}}
function typewrite(el,text){
  el.textContent='';let i=0;
  const t=setInterval(()=>{if(i>=text.length){clearInterval(t);return}el.textContent+=text[i];i++;const m=document.getElementById('chatMsgs');if(m)m.scrollTop=m.scrollHeight},16);
}
async function sendMsg(){
  const inp=document.getElementById('chatInp');const msgs=document.getElementById('chatMsgs');
  const q=(inp.value||'').trim();if(!q)return;
  inp.value='';inp.style.height='auto';
  msgs.innerHTML+='<div class="cm u">'+esc(q)+'</div>';
  const tid='t'+Date.now();
  msgs.innerHTML+='<div class="cm-lbl">Sam</div><div class="thinking" id="'+tid+'"><div class="thinking-dot"></div><div class="thinking-dot"></div><div class="thinking-dot"></div></div>';
  msgs.scrollTop=msgs.scrollHeight;
  chatHist.push({role:'user',content:q});
  const name=getName();
  const sys='Tu es Sam, assistant journaliste avec acces au web en temps reel. Date: '+DATE_FR+' (2026).'+(name?' Tu parles a '+name+'.':'')+' Contexte: '+chatCtx+'. Reponds en francais, concis et precis.';
  try{
    const res=await fetch('https://daily-news-proxy.vercel.app/api/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-sonnet-4-6',max_tokens:400,enable_search:true,system:sys,messages:chatHist.slice(-6)})});
    const data=await res.json();
    const reply=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('')||'Erreur.';
    chatHist.push({role:'assistant',content:reply});
    const thinking=document.getElementById(tid);
    if(thinking){const el=document.createElement('div');el.className='cm a';thinking.replaceWith(el);typewrite(el,reply)}
  }catch(e){const thinking=document.getElementById(tid);if(thinking)thinking.outerHTML='<div class="cm a">Erreur: '+esc(e.message)+'</div>'}
}

// BOOT
window.addEventListener('load',function(){
  document.getElementById('hdrMeta').textContent=DAYS[NOW.getDay()].slice(0,3)+' '+NOW.getDate();
  scheduleMidnight();
  const storedVer=localStorage.getItem('dn_ver');
  if(storedVer!==APP_VER){
    Object.keys(localStorage).filter(k=>k.startsWith('sd_')||k.startsWith('det_')).forEach(k=>localStorage.removeItem(k));
    localStorage.setItem('dn_ver',APP_VER);
  }
  runSplash(function(){
    const hasName=getName(),hasProfile=Object.keys(getProfile()).length>0;
    if(!hasName||!hasProfile){obStep=hasName?2:0;startOnboarding(false);}
    else init();
  });
});
</script>
