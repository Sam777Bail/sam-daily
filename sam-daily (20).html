<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black">
<title>Sam Daily</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600&family=Syne:wght@400;500;600;700;800&family=IBM+Plex+Mono:wght@300;400;500&display=swap" rel="stylesheet">
<style>
:root{
  --bg:#1C1E26;
  --card:rgba(255,255,255,.06);
  --card-h:rgba(255,255,255,.1);
  --bdr:rgba(255,255,255,.1);
  --bdr-h:rgba(255,255,255,.22);
  --t0:#F2F2F5;
  --t1:rgba(242,242,245,.82);
  --t2:rgba(242,242,245,.52);
  --t3:rgba(242,242,245,.3);
  --gold:#9CA3AF;
  --blue:#6BA8FF;
  --green:#4ADE80;
  --violet:#C4B5FD;
  --red:#F87171;
  --teal:#5EEAD4;
  --serif:'Cormorant Garamond',Georgia,serif;
  --sans:'Syne',system-ui,sans-serif;
  --mono:'IBM Plex Mono',monospace;
  --ease:cubic-bezier(.25,.46,.45,.94);
}
*{box-sizing:border-box;margin:0;padding:0;-webkit-tap-highlight-color:transparent}
html{scroll-behavior:smooth}

body{
  background:var(--bg);color:var(--t0);
  font-family:var(--sans);font-size:16px;
  -webkit-font-smoothing:antialiased;
  overflow-x:hidden;min-height:100vh;
}

/* Gradient background mesh — visible but not overwhelming */
body::before{
  content:'';position:fixed;inset:0;z-index:0;pointer-events:none;
  background:
    radial-gradient(ellipse 700px 500px at 10% 0%,rgba(107,168,255,.12) 0%,transparent 60%),
    radial-gradient(ellipse 500px 400px at 90% 50%,rgba(196,181,253,.08) 0%,transparent 60%),
    radial-gradient(ellipse 400px 300px at 50% 100%,rgba(74,222,128,.07) 0%,transparent 60%);
}
body > *{position:relative;z-index:1}

button{cursor:pointer;font-family:var(--sans);border:none;background:none;color:inherit}
a{color:inherit;text-decoration:none}

/* ── SPLASH ── */
#splash{
  position:fixed;inset:0;z-index:9999;
  background:var(--bg);
  display:flex;flex-direction:column;align-items:center;justify-content:center;gap:24px;
  transition:opacity .7s var(--ease);
}
#splash.out{opacity:0;pointer-events:none}
.sp-mark{
  font-family:var(--serif);font-size:96px;font-weight:300;
  color:#fff;letter-spacing:-6px;line-height:1;
  opacity:0;transform:translateY(18px);
  transition:opacity .6s var(--ease),transform .6s var(--ease);
}
.sp-mark.on{opacity:1;transform:none}
.sp-rule{width:0;height:1px;background:linear-gradient(90deg,transparent,var(--gold),transparent);transition:width .7s var(--ease) .4s}
.sp-rule.on{width:100px}
.sp-words{display:flex;gap:0;margin-top:4px}
.sp-words.on{opacity:1}
.sp-char{font-family:var(--serif);font-size:14px;letter-spacing:2px;color:var(--t2);font-weight:400}
.sp-byline{font-family:var(--serif);font-size:14px;font-style:italic;color:var(--t2);opacity:0;transition:opacity .4s var(--ease) 1.2s;letter-spacing:1px}
.sp-byline.on{opacity:1}



/* ── HEADER ── */
.hdr{position:sticky;top:0;z-index:200;background:rgba(28,30,38,.9);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--bdr)}
.hdr-in{max-width:740px;margin:0 auto;padding:0 20px;height:58px;display:flex;align-items:center;justify-content:space-between}
.hdr-logo{font-family:var(--serif);font-size:22px;font-weight:400;color:#fff;letter-spacing:-.2px}
.hdr-meta{font-family:var(--mono);font-size:11px;color:var(--t3);letter-spacing:.5px;text-transform:capitalize}
.hdr-btn{width:38px;height:38px;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:5px;border-radius:10px;transition:background .15s}
.hdr-btn:hover{background:rgba(255,255,255,.08)}
.hdr-btn span{display:block;width:18px;height:1.5px;background:var(--t1);border-radius:2px}

/* ── SIDE MENU ── */
.ovl{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:300;opacity:0;pointer-events:none;transition:opacity .22s}
.ovl.on{opacity:1;pointer-events:all}
.side{position:fixed;top:0;left:0;bottom:0;width:280px;background:rgba(15,17,22,.97);backdrop-filter:blur(32px);z-index:400;border-right:1px solid var(--bdr);transform:translateX(-100%);transition:transform .3s var(--ease);display:flex;flex-direction:column}
.side.on{transform:translateX(0)}
.side-h{padding:22px 18px 16px;border-bottom:1px solid var(--bdr);display:flex;justify-content:space-between;align-items:center}
.side-logo{font-family:var(--serif);font-size:18px;font-weight:400;color:#fff}
.side-x{width:30px;height:30px;border-radius:7px;display:flex;align-items:center;justify-content:center;font-size:18px;color:var(--t2);transition:background .15s}
.side-x:hover{background:rgba(255,255,255,.08)}
.side-b{flex:1;padding:12px;overflow-y:auto}
.side-lbl{font-family:var(--mono);font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3);padding:10px 8px 6px}
.side-day{display:block;width:100%;text-align:left;padding:10px 12px;border-radius:10px;margin-bottom:3px;color:var(--t2);transition:all .12s}
.side-day:hover,.side-day:active{background:rgba(255,255,255,.07);color:var(--t0)}
.side-day.act{background:rgba(91,158,255,.18);color:#fff;border:1px solid rgba(91,158,255,.3)}
.sd-n{font-size:14px;font-weight:500}
.sd-d{font-family:var(--mono);font-size:10.5px;opacity:.4;margin-top:2px}
.side-f{padding:14px;border-top:1px solid var(--bdr);display:flex;flex-direction:column;gap:8px}
.btn-rf{background:#fff;color:#111318;padding:12px;border-radius:10px;font-size:14px;font-weight:600;width:100%;transition:opacity .15s}
.btn-rf:hover{opacity:.88}
.btn-rk{font-size:12px;color:var(--t3);text-decoration:underline;text-align:center;padding:3px}

/* ── MAIN ── */
#listView{max-width:740px;margin:0 auto;padding:28px 20px 100px}

/* Date block */
.date-block{padding:28px 0 24px;border-bottom:1px solid var(--bdr);margin-bottom:4px;text-align:center}
.date-eyebrow{font-family:var(--mono);font-size:10px;letter-spacing:3px;text-transform:uppercase;color:var(--t3);margin-bottom:14px}
.date-title{font-family:var(--serif);font-size:34px;font-style:italic;font-weight:400;color:#fff;line-height:1.2;letter-spacing:-.3px}

/* Ephemeride */
.eph-block{padding:16px 0 22px;border-bottom:1px solid var(--bdr);margin-bottom:24px;display:flex;align-items:center;gap:16px}
.eph-dash{width:24px;height:1px;background:var(--bdr-h);flex-shrink:0}
.eph-txt{font-family:var(--serif);font-size:17px;font-style:italic;color:var(--t2);line-height:1.55;text-align:center;flex:1}

/* Chiffre */
.stat-block{
  border-radius:18px;border:1px solid rgba(255,255,255,.12);
  margin-bottom:24px;overflow:hidden;
  background:rgba(255,255,255,.05);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  display:grid;grid-template-columns:auto 1fr;
  box-shadow:inset 0 1px 0 rgba(255,255,255,.08);
}
.stat-left{
  padding:26px 28px;display:flex;flex-direction:column;justify-content:center;
  border-right:1px solid rgba(255,255,255,.08);
  background:rgba(255,255,255,.03);
}
.stat-number{
  font-family:var(--serif);font-size:60px;font-weight:600;
  color:var(--t0);line-height:1;letter-spacing:-2px;
}
.stat-right{padding:22px 24px;display:flex;flex-direction:column;justify-content:center;gap:6px}
.stat-label{font-family:var(--mono);font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3)}
.stat-context{font-size:15.5px;line-height:1.7;color:var(--t1)}
.stat-source{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:4px;letter-spacing:.3px}

/* Article cards */
.art-card{
  background:var(--card);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-radius:18px;border:1px solid var(--bdr);
  margin-bottom:12px;overflow:hidden;position:relative;
  box-shadow:0 4px 32px rgba(0,0,0,.25),inset 0 1px 0 rgba(255,255,255,.07);
  transition:border-color .2s var(--ease),background .2s var(--ease);
}
.art-card:hover{border-color:var(--bdr-h);background:var(--card-h)}
.art-accent{position:absolute;left:0;top:0;bottom:0;width:3px;border-radius:18px 0 0 18px}
.art-head{display:flex;align-items:flex-start;gap:16px;padding:18px 20px;cursor:pointer;user-select:none;-webkit-user-select:none;transition:background .15s}
.art-head:active{background:rgba(255,255,255,.04)}
.art-ico{width:44px;height:44px;border-radius:11px;display:flex;align-items:center;justify-content:center;font-size:20px;flex-shrink:0;margin-top:2px}
.art-r{flex:1;min-width:0}
.art-pill{display:inline-flex;align-items:center;gap:4px;padding:3px 10px 3px 8px;border-radius:100px;font-family:var(--mono);font-size:8.5px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:9px;color:#fff;font-weight:500}
.art-dot{width:4px;height:4px;border-radius:50%;background:rgba(255,255,255,.45)}
.art-title{font-family:var(--serif);font-size:22px;font-weight:600;line-height:1.25;color:#fff;margin-bottom:7px;letter-spacing:-.15px}
.art-teaser{font-size:15px;color:var(--t2);line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.art-foot{display:flex;align-items:center;justify-content:space-between;margin-top:9px}
.art-source{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:.3px}
.art-chev svg{transition:transform .3s var(--ease);color:var(--t3)}
.art-card.open .art-chev svg{transform:rotate(180deg)}

/* Unroll */
.art-body{max-height:0;overflow:hidden;transition:max-height .5s cubic-bezier(0,.4,.2,1)}
.art-card.open .art-body{max-height:700px}
.art-body-in{padding:18px 20px 22px;border-top:1px solid var(--bdr)}
.art-text{font-size:16px;line-height:1.88;color:var(--t1)}
.art-text p{margin-bottom:10px}
.art-text p:last-child{margin-bottom:0}
.art-actions{display:flex;align-items:center;justify-content:space-between;margin-top:16px;padding-top:16px;border-top:1px solid var(--bdr)}
.btn-analyse{
  display:flex;align-items:center;gap:7px;
  padding:10px 22px;border-radius:100px;
  background:linear-gradient(135deg,var(--blue),#3B82F6);
  color:#fff;font-size:13px;font-weight:600;letter-spacing:.2px;
  box-shadow:0 4px 16px rgba(91,158,255,.3);
  transition:filter .15s,transform .15s;
}
.btn-analyse:hover{filter:brightness(1.1);transform:translateY(-1px)}
.btn-analyse:active{transform:none}
.btn-analyse svg{width:12px;height:12px}

/* Le savais-tu */
.bonus-block{
  margin-top:28px;
  background:rgba(167,139,250,.08);
  backdrop-filter:blur(20px);-webkit-backdrop-filter:blur(20px);
  border-radius:18px;border:1px solid rgba(167,139,250,.2);
  padding:24px 26px;position:relative;overflow:hidden;
  box-shadow:0 0 40px rgba(167,139,250,.08);
}
.bonus-block::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,var(--violet),transparent)}
.bonus-eye{font-family:var(--mono);font-size:9px;letter-spacing:2.5px;text-transform:uppercase;color:var(--violet);margin-bottom:10px;display:flex;align-items:center;gap:8px}
.bonus-eye::before{content:'';width:16px;height:1px;background:var(--violet);flex-shrink:0}
.bonus-txt{font-family:var(--serif);font-size:18px;font-style:italic;color:var(--t1);line-height:1.7}

/* Footer */
.list-foot{display:flex;align-items:center;justify-content:space-between;padding:20px 0;border-top:1px solid var(--bdr);margin-top:10px}
.foot-brand{font-family:var(--serif);font-size:14px;color:var(--t2)}
.foot-meta{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:.3px}

/* Loader */
.loader{display:flex;flex-direction:column;align-items:center;padding:80px 0;gap:18px}
.loader-d{display:flex;gap:8px}
.ld{width:8px;height:8px;border-radius:50%;background:#fff;animation:ldp 1.3s ease infinite}
.ld:nth-child(2){animation-delay:.18s}.ld:nth-child(3){animation-delay:.36s}
@keyframes ldp{0%,100%{opacity:.1;transform:scale(.6)}50%{opacity:1;transform:scale(1)}}
.loader-t{font-family:var(--mono);font-size:11px;letter-spacing:2.5px;text-transform:uppercase;color:var(--t3)}

/* Error */
.err-card{background:var(--card);backdrop-filter:blur(20px);border-radius:16px;border:1px solid var(--bdr);padding:28px;text-align:center;margin:20px 0}
.err-card p{font-size:14px;color:var(--t2);line-height:1.65;margin-bottom:18px;white-space:pre-wrap;word-break:break-word}
.btn-retry{background:#fff;color:#111318;padding:10px 22px;border-radius:10px;font-size:14px;font-weight:600}

/* Animations */
@keyframes reveal{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
.rv{animation:reveal .5s var(--ease) both}

/* ── DETAIL VIEW ── */
#detailView{position:fixed;inset:0;z-index:500;background:#1C1E26;overflow-y:auto;-webkit-overflow-scrolling:touch;transform:translateX(100%);transition:transform .38s var(--ease)}
#detailView.open{transform:translateX(0)}
.det-hdr{position:sticky;top:0;z-index:10;background:rgba(28,30,38,.92);backdrop-filter:blur(24px);-webkit-backdrop-filter:blur(24px);border-bottom:1px solid var(--bdr);display:flex;align-items:center;gap:12px;padding:0 20px;height:58px}
.btn-back{display:flex;align-items:center;gap:6px;font-size:14px;font-weight:500;color:var(--blue);padding:5px 0}
.btn-back svg{width:17px;height:17px}
.det-body{max-width:740px;margin:0 auto;padding:32px 20px 100px}
.det-cat{display:inline-flex;align-items:center;gap:5px;padding:4px 12px 4px 10px;border-radius:100px;font-family:var(--mono);font-size:9px;letter-spacing:.5px;text-transform:uppercase;margin-bottom:16px;color:#fff;font-weight:500}
.det-title{font-family:var(--serif);font-size:38px;font-weight:400;line-height:1.16;color:#fff;letter-spacing:-.5px;margin-bottom:16px}
.det-meta{display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px;padding-bottom:22px;border-bottom:1px solid var(--bdr);margin-bottom:26px}
.det-source{font-family:var(--mono);font-size:10px;color:var(--t3);letter-spacing:.5px;text-transform:uppercase}
.det-link{font-family:var(--mono);font-size:10px;color:var(--blue);letter-spacing:.3px}
.det-txt{font-size:17px;line-height:1.9;color:var(--t1);margin-bottom:32px}
.det-txt p{margin-bottom:12px}
.det-txt p:last-child{margin-bottom:0}
.det-analysis{border-top:1px solid var(--bdr);padding-top:26px}
.an-sec{margin-bottom:24px}
.an-hdr{display:flex;align-items:center;gap:10px;margin-bottom:11px}
.an-e{font-size:16px}
.an-l{font-family:var(--mono);font-size:9px;letter-spacing:2px;text-transform:uppercase;color:var(--t2)}
.an-r{flex:1;height:1px;background:var(--bdr)}
.an-t{font-size:16px;line-height:1.85;color:var(--t1)}

/* ── CHAT FAB ── */
.chat-fab{position:fixed;bottom:28px;right:22px;z-index:600;width:54px;height:54px;border-radius:50%;background:linear-gradient(135deg,var(--blue),#2563EB);display:none;align-items:center;justify-content:center;box-shadow:0 4px 24px rgba(91,158,255,.45),0 0 0 1px rgba(91,158,255,.25);transition:transform .2s}
.chat-fab.vis{display:flex}
.chat-fab:active{transform:scale(.92)}

/* ── CHAT MODAL ── */
.chat-ovl{position:fixed;inset:0;background:rgba(0,0,0,.5);z-index:700;opacity:0;pointer-events:none;transition:opacity .25s}
.chat-ovl.on{opacity:1;pointer-events:all}
.chat-panel{position:fixed;left:0;right:0;bottom:0;z-index:800;background:rgba(15,17,22,.97);backdrop-filter:blur(32px);-webkit-backdrop-filter:blur(32px);border-radius:22px 22px 0 0;border-top:1px solid var(--bdr);border-left:1px solid var(--bdr);border-right:1px solid var(--bdr);max-height:78vh;display:flex;flex-direction:column;transform:translateY(100%);transition:transform .34s var(--ease)}
.chat-panel.on{transform:translateY(0)}
.chat-handle{width:38px;height:4px;background:rgba(255,255,255,.15);border-radius:2px;margin:13px auto 0;flex-shrink:0}
.chat-hdr{padding:14px 20px;border-bottom:1px solid var(--bdr);flex-shrink:0;display:flex;align-items:flex-start;justify-content:space-between}
.chat-ht{font-size:15px;font-weight:600;color:#fff}
.chat-hs{font-family:var(--mono);font-size:10px;color:var(--t3);margin-top:3px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;max-width:240px;letter-spacing:.3px}
.chat-hx{font-size:19px;color:var(--t2);width:30px;height:30px;display:flex;align-items:center;justify-content:center;border-radius:7px;transition:background .15s}
.chat-hx:hover{background:rgba(255,255,255,.08)}
.chat-msgs{flex:1;overflow-y:auto;padding:16px 18px;display:flex;flex-direction:column;gap:10px;-webkit-overflow-scrolling:touch}
.cm{padding:11px 14px;border-radius:14px;font-size:14px;line-height:1.6;max-width:86%}
.cm.u{background:var(--blue);color:#fff;align-self:flex-end;border-radius:14px 14px 3px 14px}
.cm.a{background:rgba(255,255,255,.07);color:var(--t1);align-self:flex-start;border-radius:14px 14px 14px 3px;border:1px solid var(--bdr)}
.cm.typ{font-style:italic;opacity:.45}
.cm-label{font-family:var(--mono);font-size:8.5px;letter-spacing:1.5px;text-transform:uppercase;color:var(--t3);margin-bottom:3px;padding-left:2px}
.chat-irow{display:flex;align-items:flex-end;gap:10px;padding:12px 16px 20px;border-top:1px solid var(--bdr);flex-shrink:0}
.chat-inp{flex:1;padding:11px 14px;border:1px solid var(--bdr);border-radius:12px;font-size:14px;font-family:var(--sans);background:rgba(255,255,255,.06);color:#fff;outline:none;resize:none;min-height:42px;max-height:90px;transition:border-color .15s;-webkit-appearance:none}
.chat-inp:focus{border-color:rgba(91,158,255,.5)}
.chat-inp::placeholder{color:var(--t3)}
.chat-send{width:40px;height:40px;flex-shrink:0;background:var(--blue);border-radius:11px;display:flex;align-items:center;justify-content:center;transition:filter .15s}
.chat-send:hover{filter:brightness(1.1)}
</style>

<!-- PWA -->
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
<meta name="apple-mobile-web-app-title" content="Daily News">
<meta name="theme-color" content="#1C1E26">
<link rel="apple-touch-icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 180 180'><rect width='180' height='180' rx='40' fill='%231C1E26'/><text x='90' y='125' text-anchor='middle' font-family='Georgia,serif' font-size='100' font-weight='300' fill='white'>DN</text></svg>">
<link rel="manifest" href="data:application/manifest+json,%7B%22name%22%3A%22Daily%20News%22%2C%22short_name%22%3A%22DN%22%2C%22description%22%3A%22Votre%20brief%20d%27actualit%C3%A9%20quotidien%22%2C%22start_url%22%3A%22.%2Fsam-daily.html%22%2C%22display%22%3A%22standalone%22%2C%22background_color%22%3A%22%231C1E26%22%2C%22theme_color%22%3A%22%231C1E26%22%2C%22orientation%22%3A%22portrait%22%7D">
</head>
<body>

<!-- SPLASH -->
<div id="splash">
  <div class="sp-logo">
    <div class="sp-letters">
      <span class="sp-letter" id="spD">D</span>
      <span class="sp-letter" id="spN">N</span>
    </div>
    <div class="sp-byline" id="spByline">Daily News <em>by Sam</em></div>
  </div>
</div>


<!-- OVERLAY + SIDE -->
<div class="ovl" id="ovl" onclick="closeMenu()"></div>
<div class="side" id="side">
  <div class="side-h">
    <span class="side-logo">Daily News <span style="font-size:12px;font-weight:300;font-style:italic;opacity:.5">by Sam</span></span>
    <button class="side-x" onclick="closeMenu()">✕</button>
  </div>
  <div class="side-b" id="sideBody"></div>
  <div class="side-f">
    <button class="btn-rf" onclick="forceRefresh()" style="background:rgba(255,255,255,.08);color:var(--t1);font-size:12px;font-weight:500">↻ Forcer actualisation</button>
  </div>
</div>

<!-- HEADER -->

<script>
const VER='FINAL';
const NOW=new Date();
const DAYS=['dimanche','lundi','mardi','mercredi','jeudi','vendredi','samedi'];
const MONTHS=['janvier','février','mars','avril','mai','juin','juillet','août','septembre','octobre','novembre','décembre'];
const DATE_FR=DAYS[NOW.getDay()]+' '+NOW.getDate()+' '+MONTHS[NOW.getMonth()]+' '+NOW.getFullYear();
function fmtKey(d){return d.getFullYear()+'-'+String(d.getMonth()+1).padStart(2,'0')+'-'+String(d.getDate()).padStart(2,'0')}
const TODAY=fmtKey(NOW);
function esc(s){return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;')}

const CATS={
  economie:{l:'Économie',c:'#4F8EF7',e:'📈'},business:{l:'Business',c:'#3CB98A',e:'💼'},
  tech:{l:'Tech',c:'#9B6FF5',e:'⚡'},politique:{l:'Politique',c:'#E05252',e:'🏛'},
  sport:{l:'Sport',c:'#3CB98A',e:'⚽'},culture:{l:'Culture',c:'#F59E0B',e:'🎭'},
  monde:{l:'Le Monde',c:'#38B2AC',e:'🌍'},bourse:{l:'Bourse',c:'#C8922A',e:'📊'},
  science:{l:'Science',c:'#9B6FF5',e:'🔬'},international:{l:'Le Monde',c:'#38B2AC',e:'🌍'},
  us:{l:'États-Unis',c:'#E05252',e:'🇺🇸'}
};
function getC(s){return CATS[(s||'').toLowerCase()]||{l:s||'',c:'#6E6A62',e:'📰'}}

let brief=null,art=null,chatCtx='',chatHist=[],activeDay=TODAY;
// Clé encodée - remplace la valeur entre les guillemets par ta clé encodée en base64
// Pour encoder: ouvre la console du navigateur (F12) et tape: btoa('ta-cle-sk-ant-...')
const _k=(s)=>{try{return atob(s)}catch(e){return s}};
const HARDCODED_KEY=_k('ANTHROPIC_KEY_PLACEHOLDER_B64');
const getKey=()=>localStorage.getItem('sd_key')||HARDCODED_KEY;
function gc(k){
  try{
    const d=JSON.parse(localStorage.getItem('sd_'+k));
    if(!d)return null;
    // Accept brief if it has articles (regardless of VER)
    if(d.articles&&d.articles.length>0)return d;
    return null;
  }catch{return null}
}
function sc(k,v){try{localStorage.setItem('sd_'+k,JSON.stringify({...v,_ver:VER}))}catch{}}

// ── SPLASH ──
function runSplash(){
  setTimeout(()=>document.getElementById('spD').classList.add('on'),300);
  setTimeout(()=>document.getElementById('spN').classList.add('on'),800);
  setTimeout(()=>document.getElementById('spByline').classList.add('on'),1300);
  setTimeout(()=>document.getElementById('splash').classList.add('out'),2600);
}

// ── MIDNIGHT REFRESH ──
function scheduleMidnightRefresh(){
  const now=new Date();
  const mid=new Date(now);
  mid.setDate(mid.getDate()+1);mid.setHours(0,0,10,0);
  const ms=mid-now;
  setTimeout(async()=>{
    // Garde uniquement les 3 derniers jours dans le cache
    const keys=Object.keys(localStorage).filter(k=>k.startsWith('sd_20'));
    keys.sort().slice(0,-3).forEach(k=>localStorage.removeItem(k));
    location.reload();
  },ms);
}

// ── MENU ──
function openMenu(){renderMenu();document.getElementById('side').classList.add('on');document.getElementById('ovl').classList.add('on')}
function closeMenu(){document.getElementById('side').classList.remove('on');document.getElementById('ovl').classList.remove('on')}
function resetKey(){if(confirm('Réinitialiser ?')){localStorage.clear();location.reload()}}
function forceRefresh(){localStorage.removeItem('sd_'+activeDay);closeMenu();init()}
function renderMenu(){
  let h='<div class="side-lbl">Briefs récents</div>';
  for(let i=0;i<7;i++){
    const d=new Date();d.setDate(d.getDate()-i);
    const k=fmtKey(d);
    const lbl=i===0?'Aujourd\'hui':i===1?'Hier':DAYS[d.getDay()]+' '+d.getDate();
    if(i===0||gc(k)){
      h+=`<button class="side-day${k===activeDay?' act':''}" onclick="switchDay('${k}');closeMenu()">
        <div class="sd-n">${lbl}</div>
        <div class="sd-d">${DAYS[d.getDay()]} ${d.getDate()} ${MONTHS[d.getMonth()]}</div>
      </button>`;
    }
  }
  document.getElementById('sideBody').innerHTML=h;
}
function switchDay(k){
  activeDay=k;const c=gc(k);
  if(c){brief=c;renderList(c)}
  else if(k===TODAY)init();
  else setList('<div class="err-card"><p>Brief du '+k+' non disponible.</p></div>');
}


// ── NEWS FETCH ──
async function fetchGuardian(){
  const secs=['business','technology','world','sport','culture','science','us-news','environment','money','media'];
  const res=await Promise.allSettled(secs.map(async s=>{
    const r=await fetch(`https://content.guardianapis.com/search?section=${s}&order-by=newest&page-size=4&show-fields=trailText&api-key=test`,{signal:AbortSignal.timeout(8000)});
    const d=await r.json();
    return(d.response?.results||[]).map(a=>({title:a.webTitle,desc:(a.fields?.trailText||'').replace(/<[^>]+>/g,'').slice(0,400),link:a.webUrl,source:'The Guardian',pub:a.webPublicationDate})).filter(a=>a.title&&a.link?.startsWith('https'));
  }));
  return res.filter(r=>r.status==='fulfilled').flatMap(r=>r.value);
}
async function fetchHN(){
  try{
    const r=await fetch('https://hacker-news.firebaseio.com/v1/topstories.json',{signal:AbortSignal.timeout(5000)});
    const ids=await r.json();
    const stories=await Promise.allSettled(ids.slice(0,25).map(id=>fetch(`https://hacker-news.firebaseio.com/v1/item/${id}.json`,{signal:AbortSignal.timeout(4000)}).then(r=>r.json())));
    return stories.filter(r=>r.status==='fulfilled'&&r.value?.url?.startsWith('https')&&r.value.score>80).map(r=>({title:r.value.title,desc:'',link:r.value.url,source:'Hacker News',pub:new Date(r.value.time*1000).toISOString()})).slice(0,8);
  }catch(e){return[]}
}
const FR_FEEDS=[
  {url:'https://syndication.lesechos.fr/rss/rss_une.xml',name:'Les Échos'},
  {url:'https://www.bfmtv.com/rss/economie/',name:'BFM Business'},
  {url:'https://www.frenchweb.fr/feed',name:'Frenchweb'},
  {url:'https://www.lefigaro.fr/rss/figaro_actualites.xml',name:'Le Figaro'},
  {url:'https://www.lequipe.fr/rss/actu_rss.xml',name:"L'Équipe"},
  {url:'https://techcrunch.com/feed/',name:'TechCrunch'},
  {url:'https://feeds.bbci.co.uk/news/business/rss.xml',name:'BBC Business'},
];
function cx(s){return(s||'').replace(/<!\[CDATA\[/g,'').replace(/\]\]>/g,'').replace(/<[^>]+>/g,' ').replace(/&[a-z#0-9]+;/g,' ').replace(/\s+/g,' ').trim()}
async function fetchFeed(src){
  try{
    const r=await fetch('https://api.allorigins.win/get?url='+encodeURIComponent(src.url),{signal:AbortSignal.timeout(7000)});
    const raw=(await r.json()).contents||'';
    const xml=new DOMParser().parseFromString(raw,'text/xml');
    if(xml.querySelector('parsererror'))return[];
    return Array.from(xml.querySelectorAll('item')).slice(0,5).map(item=>{
      const title=cx(item.querySelector('title')?.textContent||'');
      const desc=cx(item.querySelector('description')?.textContent||'').slice(0,400);
      let link=(item.querySelector('link')?.textContent||'').trim()||(item.querySelector('guid')?.textContent||'').trim();
      return{title,desc,link,source:src.name,pub:item.querySelector('pubDate')?.textContent||''};
    }).filter(a=>a.title.length>5&&a.link.startsWith('https')&&!a.link.includes('example'));
  }catch(e){return[]}
}
async function fetchAll(){
  const [g,hn,...feeds]=await Promise.allSettled([fetchGuardian(),fetchHN(),...FR_FEEDS.map(fetchFeed)]);
  const fr=feeds.filter(r=>r.status==='fulfilled').flatMap(r=>r.value);
  const all=[...fr,...(g.status==='fulfilled'?g.value:[]),...(hn.status==='fulfilled'?hn.value:[])];
  const seen=new Set();
  return all.filter(a=>{if(!a.link||seen.has(a.link))return false;seen.add(a.link);return true});
}

// ── JSON PARSE ──
function safeJSON(raw){
  const m=raw.match(/\{[\s\S]*\}/);if(!m)return null;
  let s=m[0].replace(/[\x00-\x08\x0B\x0C\x0E-\x1F]/g,'');
  try{return JSON.parse(s)}catch(e){
    const last=s.lastIndexOf('}');
    if(last>100){let t=s.slice(0,last+1);const oa=(t.match(/\[/g)||[]).length-(t.match(/\]/g)||[]).length;const ob=(t.match(/\{/g)||[]).length-(t.match(/\}/g)||[]).length;for(let i=0;i<oa;i++)t+=']';for(let i=0;i<ob;i++)t+='}';try{return JSON.parse(t)}catch(e2){}}
    return null;
  }
}

// ── GENERATE ──
const SYS=`Tu es l'éditeur d'un morning brief d'actualité quotidien. Nous sommes le ${DATE_FR} (année 2026). Tu résumes des vrais articles fournis.

RÈGLES ABSOLUES:
1. Utilise UNIQUEMENT les articles fournis. Zéro invention.
2. Le champ "lien" = URL_SOURCE exacte copiée. Jamais d'autre URL.
3. Résume EN FRANÇAIS même si l'article est en anglais.

JSON valide, commence par {
{"titre":"max 10 mots, accroche éditoriale","ephemeride":"fait historique fascinant sur cette date (peut être inventé)","chiffre":{"nombre":"chiffre réel d'un article","contexte":"2 phrases","source":"media"},"articles":[{"section":"economie|business|tech|politique|sport|culture|monde|bourse|science","emoji":"emoji","titre":"titre","teaser":"1 phrase","contenu":"5 phrases narratives complètes","source":"media","lien":"URL_SOURCE"}],"savais":"fait scientifique ou historique amusant (inventé librement)"}

Sélectionne 6 articles variés. Priorité: business, tech, monde. Inclus culture ou sport.`;

async function generateBrief(articles){
  const valid=articles.filter(a=>a.link?.startsWith('https')&&!a.link.includes('example.com'));
  if(valid.length<3)throw new Error(`${valid.length} articles valides chargés. Vérifie ta connexion.`);
  const list=valid.slice(0,28).map((a,i)=>`[${i+1}] ${a.source}\nTitre: ${a.title}${a.desc?'\nDesc: '+a.desc:''}\nURL_SOURCE: ${a.link}`).join('\n\n');
  const res=await fetch('https://daily-news-proxy.vercel.app/api/messages',{
    method:'POST',
    headers:{'Content-Type':'application/json'},
    body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:3000,system:SYS,messages:[{role:'user',content:`${valid.length} articles réels du ${DATE_FR} (2026).\nIMPORTANT: nous sommes en 2026, pas en 2024. Utilise uniquement ces articles.\n\n${list}\n\nJSON:`}]})
  });
  if(!res.ok){const t=await res.text();throw new Error(`API ${res.status}:\n${t.slice(0,300)}`)}
  const data=await res.json();
  if(data.error)throw new Error(data.error.message);
  const raw=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
  const parsed=safeJSON(raw);
  if(!parsed)throw new Error('JSON invalide:\n'+raw.slice(0,300));
  if(parsed.articles){parsed.articles=parsed.articles.filter(a=>a.lien?.startsWith('https')&&!a.lien.includes('example'))}
  if(!parsed.articles?.length)throw new Error('Aucun article avec lien valide. Réessaie.');
  return parsed;
}

// ── RENDER ──
function setList(html){document.getElementById('listView').innerHTML=html}
function loader(t){setList(`
  <div class="loader">
    <div style="font-family:var(--serif);font-size:48px;font-weight:300;color:var(--t0);letter-spacing:-3px;margin-bottom:12px;opacity:.85">DN</div>
    <div style="font-family:var(--mono);font-size:9px;letter-spacing:3px;text-transform:uppercase;color:var(--t3);margin-bottom:20px">Daily News</div>
    <div class="loader-d"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
    <div class="loader-t">${t}</div>
  </div>`)}

async function init(){
  // Cache trouvé → affichage instantané
  const cached=gc(activeDay);
  if(cached){brief=cached;renderList(cached);return}

  // Pas de cache → génère (une seule fois par jour)
  loader('Chargement des actus');
  try{
    const arts=await fetchAll();
    loader('Génération du brief');
    const b=await generateBrief(arts);
    b._date=activeDay;
    sc(activeDay,b);
    brief=b;
    renderList(b);
  }catch(e){
    setList(`<div class="err-card"><p>${esc(e.message)}</p><button class="btn-retry" onclick="init()">Réessayer</button></div>`);
  }
}

function renderList(b){
  const arts=b.articles||[];
  let h='';
  h+=`<div class="date-block rv"><div class="date-eyebrow">${DATE_FR}</div><div class="date-title">${esc(b.titre||'')}</div></div>`;
  if(b.ephemeride)h+=`<div class="eph-block rv" style="animation-delay:.05s"><div class="eph-dash"></div><div class="eph-txt">${esc(b.ephemeride)}</div><div class="eph-dash"></div></div>`;
  if(b.chiffre){
    h+=`<div class="stat-block rv" style="animation-delay:.09s">
      <div class="stat-left"><div class="stat-number">${esc(b.chiffre.nombre||'')}</div></div>
      <div class="stat-right">
        <div class="stat-label">Chiffre du jour</div>
        <div class="stat-context">${esc(b.chiffre.contexte||'')}</div>
        ${b.chiffre.source?`<div class="stat-source">${esc(b.chiffre.source)}</div>`:''}
      </div>
    </div>`;
  }
  arts.forEach((a,i)=>{
    const cat=getC(a.section);
    h+=`<div class="art-card rv" id="ac${i}" style="animation-delay:${0.13+i*0.06}s">
      <div class="art-accent" style="background:${cat.c}"></div>
      <div class="art-head" onclick="toggleCard(${i})">
        <div class="art-ico" style="background:${cat.c}18">${cat.e}</div>
        <div class="art-r">
          <span class="art-pill" style="background:${cat.c}"><span class="art-dot"></span>${cat.l}</span>
          <div class="art-title">${esc(a.titre||'')}</div>
          <div class="art-teaser">${esc(a.teaser||'')}</div>
          <div class="art-foot">
            <span class="art-source">${esc(a.source||'')}</span>
            <span class="art-chev"><svg width="12" height="12" viewBox="0 0 12 12" fill="none"><path d="M2 4l4 4 4-4" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/></svg></span>
          </div>
        </div>
      </div>
      <div class="art-body" id="ab${i}">
        <div class="art-body-in">
          <div class="art-text"><p>${esc(a.contenu||'')}</p></div>
          <div class="art-actions">
            <span class="art-source">${esc(a.source||'')}</span>
            <button class="btn-analyse" onclick="openDetail(${i})">
              <svg viewBox="0 0 11 11" fill="none"><circle cx="5.5" cy="5.5" r="4.5" stroke="white" stroke-width="1.3"/><path d="M5.5 3.5v3M5.5 8v.3" stroke="white" stroke-width="1.3" stroke-linecap="round"/></svg>
              Comprendre
            </button>
          </div>
        </div>
      </div>
    </div>`;
  });
  if(b.savais){
    h+=`<div class="bonus-block rv" style="animation-delay:${0.13+arts.length*0.06}s">
      <div class="bonus-eye">Le savais-tu ?</div>
      <div class="bonus-txt">${esc(b.savais)}</div>
    </div>`;
  }
  h+=`<div class="list-foot"><span class="foot-brand">Daily News <em style="font-size:11px;opacity:.5">by Sam</em></span><span class="foot-meta">${arts.length} sources · ${NOW.toLocaleDateString('fr-FR')}</span></div>`;
  setList(h);
  // Scroll reveal
  const obs=new IntersectionObserver(entries=>{entries.forEach(e=>{if(e.isIntersecting){e.target.classList.add('in');obs.unobserve(e.target)}})},{threshold:.06});
  document.querySelectorAll('.rv').forEach(el=>obs.observe(el));
}

// ── CARD ──
function toggleCard(i){
  const card=document.getElementById('ac'+i);
  const body=document.getElementById('ab'+i);
  const open=card.classList.contains('open');
  document.querySelectorAll('.art-card.open').forEach(c=>{c.classList.remove('open');const b=c.querySelector('.art-body');if(b)b.style.maxHeight='0'});
  if(!open){card.classList.add('open');body.style.maxHeight=body.scrollHeight+'px';setTimeout(()=>{if(card.classList.contains('open'))body.style.maxHeight=body.scrollHeight+'px'},60)}
}

// ── DETAIL ──
const ASYS=`Tu es un journaliste qui explique l'actualité de façon claire et accessible. Nous sommes le ${DATE_FR} (année 2026). JSON uniquement, commence par {.
{"sections":[{"emoji":"string","titre":"string","texte":"string 4-5 phrases claires"}]}
4 sections obligatoires:
1. emoji 📍 titre "Contexte" — Explique le contexte et l'arrière-plan. Qui sont les acteurs ? Depuis quand ? Pourquoi c'est important ?
2. emoji 📰 titre "Ce qui s'est passé" — Décris l'événement précisément avec des faits concrets et des chiffres si disponibles.
3. emoji 💥 titre "Impact" — Quelles sont les conséquences concrètes ? Pour qui ? À quelle échelle ?
4. emoji 🔭 titre "À surveiller" — Quelles sont les prochaines étapes ? Les opportunités ou risques à anticiper ?
Langage simple, accessible, sans jargon. Explique les termes techniques. Tout en français.`;

async function openDetail(i){
  if(!brief?.articles)return;
  const a=brief.articles[i];if(!a)return;
  art=a;chatCtx=`"${a.titre}" (${a.source}). ${a.contenu}`;chatHist=[];
  document.getElementById('chatSub').textContent=(a.titre||'').slice(0,44)+'…';
  document.getElementById('chatMsgs').innerHTML='';
  const cat=getC(a.section);
  const hasLink=a.lien?.startsWith('https')&&!a.lien.includes('example');
  document.getElementById('detBody').innerHTML=`
    <div class="det-cat" style="background:${cat.c}">${cat.e} ${cat.l}</div>
    <div class="det-title">${esc(a.titre||'')}</div>
    <div class="det-meta">
      <span class="det-source">${esc(a.source||'')}</span>
      ${hasLink?`<a href="${a.lien}" target="_blank" rel="noopener" class="det-link">Lire l'article complet ↗</a>`:''}
    </div>
    <div class="det-analysis" id="detAnn">
      <div class="loader" style="padding:28px 0">
        <div style="font-family:var(--serif);font-size:40px;font-weight:300;color:var(--t0);letter-spacing:-2px;margin-bottom:12px;opacity:.75">DN</div>
        <div class="loader-d"><div class="ld"></div><div class="ld"></div><div class="ld"></div></div>
        <div class="loader-t">Analyse en cours</div>
      </div>
    </div>`;
  document.getElementById('detailView').classList.add('open');
  document.getElementById('chatFab').classList.add('vis');
  document.body.style.overflow='hidden';
  document.getElementById('detailView').scrollTop=0;
  const cached=gc('det_'+activeDay+'_'+i);
  if(cached)renderAnn(cached);else genAnn(a,i);
}
function closeDetail(){document.getElementById('detailView').classList.remove('open');document.getElementById('chatFab').classList.remove('vis');closeChat();document.body.style.overflow=''}

async function genAnn(a,i){
  try{
    const res=await fetch('https://daily-news-proxy.vercel.app/api/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1200,system:ASYS,messages:[{role:'user',content:`Article: "${a.titre}". ${a.contenu}. Source: ${a.source}. JSON:`}]})});
    if(!res.ok)throw new Error('API '+res.status);
    const data=await res.json();if(data.error)throw new Error(data.error.message);
    const raw=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('');
    const det=safeJSON(raw);if(!det)throw new Error('JSON invalide');
    sc('det_'+activeDay+'_'+i,det);renderAnn(det);
  }catch(e){const el=document.getElementById('detAnn');if(el)el.innerHTML=`<div class="err-card" style="margin:0"><p>${esc(e.message)}</p></div>`}
}
function renderAnn(det){
  const el=document.getElementById('detAnn');if(!el)return;
  el.innerHTML=(det.sections||[]).map(s=>`<div class="an-sec"><div class="an-hdr"><span class="an-e">${s.emoji}</span><span class="an-l">${s.titre}</span><div class="an-r"></div></div><div class="an-t">${esc(s.texte)}</div></div>`).join('');
}

// ── CHAT ──
function openChat(){document.getElementById('chatOvl').classList.add('on');document.getElementById('chatPanel').classList.add('on');setTimeout(()=>document.getElementById('chatInp').focus(),350)}
function closeChat(){document.getElementById('chatOvl').classList.remove('on');document.getElementById('chatPanel').classList.remove('on')}
function autoR(el){el.style.height='auto';el.style.height=Math.min(el.scrollHeight,90)+'px'}
function chatKey(e){if(e.key==='Enter'&&!e.shiftKey){e.preventDefault();sendMsg()}}
async function sendMsg(){
  const inp=document.getElementById('chatInp');const msgs=document.getElementById('chatMsgs');
  const q=(inp.value||'').trim();if(!q)return;
  inp.value='';inp.style.height='auto';
  msgs.innerHTML+=`<div class="cm u">${esc(q)}</div>`;
  const tid='t'+Date.now();
  msgs.innerHTML+=`<div class="cm-label">Sam</div><div class="cm a typ" id="${tid}">…</div>`;
  msgs.scrollTop=msgs.scrollHeight;
  chatHist.push({role:'user',content:q});
  const sys=`Tu t'appelles Sam. Tu es un assistant journaliste qui aide à comprendre l'actualité. Nous sommes le ${DATE_FR} (2026). Article: ${chatCtx}. Réponds en français, 3 phrases max, ton accessible.`;
  try{
    const res=await fetch('https://daily-news-proxy.vercel.app/api/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:250,system:sys,messages:chatHist.slice(-6)})});
    const data=await res.json();
    const reply=(data.content||[]).filter(b=>b.type==='text').map(b=>b.text).join('')||'Erreur.';
    chatHist.push({role:'assistant',content:reply});
    const el=document.getElementById(tid);if(el){el.classList.remove('typ');el.textContent=reply}
  }catch(e){const el=document.getElementById(tid);if(el){el.classList.remove('typ');el.textContent='Erreur: '+e.message}}
  msgs.scrollTop=msgs.scrollHeight;
}

// ── BOOT ──
window.addEventListener('load',async()=>{
  document.getElementById('hdrMeta').textContent=DAYS[NOW.getDay()].slice(0,3)+' '+NOW.getDate();
  runSplash();loadTicker();scheduleMidnightRefresh();
  // Cache géré par gc()
  // Clé API pré-configurée (encodée base64)
  if(HARDCODED_KEY&&HARDCODED_KEY.length>20&&HARDCODED_KEY!=='ANTHROPIC_KEY_PLACEHOLDER_B64'){
    localStorage.setItem('sd_key',HARDCODED_KEY);
  }
  if(!getKey()||getKey()==='ANTHROPIC_KEY_PLACEHOLDER_B64'){
    setList('<div class="err-card"><p>Clé API non configurée.</p></div>');return;
  }
  // Ping Vercel pour réduire le cold start
  fetch('https://daily-news-proxy.vercel.app/api/messages',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({model:'claude-haiku-4-5-20251001',max_tokens:1,messages:[{role:'user',content:'ping'}]})}).catch(()=>{});
  init();
});
</script>
